<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#eef2f6;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:100%;
max-width:400px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

h1{
margin-bottom:20px;
color:#223243;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:15px;
font-family:'Cairo';
}

button{
width:100%;
padding:12px;
border:none;
background:#223243;
color:white;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
display:none;
}

</style>
</head>

<body>

<div class="card">

<h1>تسجيل الدخول</h1>

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<div class="error" id="error">كلمة المرور غير صحيحة</div>

</div>

<script>

const PASSWORD="1234";   // غير كلمة المرور هنا
const SESSION_HOURS=12;

function login(){

const pass=document.getElementById("password").value;

if(pass!==PASSWORD){

document.getElementById("error").style.display="block";
return;

}

const expire=Date.now()+SESSION_HOURS*60*60*1000;

localStorage.setItem("session","ok");
localStorage.setItem("expire",expire);

const params=new URLSearchParams(window.location.search);
const redirect=params.get("redirect") || "main.html";

window.location.href=redirect;

}

</script>

</body>
</html>
