<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>

  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
        url('https://siei-tracking.github.io/system/company.jpg');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    .box{
      width:100%;
      max-width:380px;
      background:rgba(255,255,255,.95);
      border-radius:20px;
      padding:30px 24px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.28);
      backdrop-filter: blur(6px);
    }

    .logo{
      width:92px;
      height:92px;
      object-fit:cover;
      border-radius:50%;
      border:3px solid #fff;
      box-shadow:0 8px 24px rgba(0,0,0,.22);
      margin:0 auto 14px;
      display:block;
      background:#fff;
    }

    h2{
      margin:0 0 6px;
      color:#223243;
      font-size:24px;
      font-weight:900;
    }

    .sub{
      margin:0 0 18px;
      color:#6b7785;
      font-size:14px;
      font-weight:700;
      line-height:1.7;
    }

    input{
      width:100%;
      padding:13px 14px;
      border-radius:12px;
      border:1px solid #ccd5dd;
      margin-bottom:14px;
      font-size:16px;
      font-family:'Cairo',sans-serif;
      outline:none;
      text-align:center;
      background:#fff;
    }

    input:focus{
      border-color:#223243;
      box-shadow:0 0 0 4px rgba(34,50,67,.08);
    }

    button{
      width:100%;
      padding:13px;
      border:none;
      background:linear-gradient(135deg,#223243,#2f4356);
      color:#fff;
      border-radius:12px;
      font-size:16px;
      font-family:'Cairo',sans-serif;
      font-weight:900;
      cursor:pointer;
      transition:.2s;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(0,0,0,.18);
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    #msg{
      margin-top:12px;
      min-height:24px;
      font-size:14px;
      font-weight:800;
      color:#c0392b;
    }

    .ok{
      color:#1e8449 !important;
    }
  </style>
</head>
<body>

  <div class="box">
    <img src="https://siei-tracking.github.io/system/logo.png" class="logo" alt="Logo">

    <h2>تسجيل الدخول</h2>

    <div class="sub">
      منصة تتبع اوامر العمل<br>
      الشركة العامة للفحص والتأهيل الهندسي
    </div>

    <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="off">
    <input type="password" id="pass" placeholder="أدخل كلمة المرور" autocomplete="off">

    <button id="btnLogin" type="button">دخول</button>

    <div id="msg"></div>
  </div>

<script>
const API_BASE = "https://script.google.com/macros/s/AKfycbynblM19U7GXBhqu6-ostKDQ_oE5e-tEgXDFjDIqyEtTX8SzMuUbODPQfhCWlWABOw/exec";

const params = new URLSearchParams(window.location.search);
const PAGE = String(params.get("p") || "main").trim().toLowerCase();

const STORAGE_KEY_PAGE = "tracking_session_token_" + PAGE;
const STORAGE_KEY_GLOBAL = "tracking_session_token";

function setMsg(text, isOk = false){
  const el = document.getElementById("msg");
  el.textContent = text || "";
  el.className = isOk ? "ok" : "";
}

function clearAllSessionTokens(){
  try{
    Object.keys(sessionStorage).forEach(function(key){
      if(key.indexOf("tracking_session_token") === 0){
        sessionStorage.removeItem(key);
      }
    });

    Object.keys(localStorage).forEach(function(key){
      if(key.indexOf("tracking_session_token") === 0){
        localStorage.removeItem(key);
      }
    });
  }catch(err){}
}

function saveSessionAndGo(token){
  const safeToken = String(token || "").trim();

  if(!safeToken){
    setMsg("لم يتم استلام رمز الجلسة !");
    return;
  }

  clearAllSessionTokens();

  // تخزين مؤقت
  sessionStorage.setItem(STORAGE_KEY_PAGE, safeToken);
  sessionStorage.setItem(STORAGE_KEY_GLOBAL, safeToken);

  // تخزين دائم (المهم 👇)
  localStorage.setItem(STORAGE_KEY_PAGE, safeToken);
  localStorage.setItem(STORAGE_KEY_GLOBAL, safeToken);

  window.location.href = PAGE + ".html";
}


async function login(){
  const usernameEl = document.getElementById("username");
  const passEl = document.getElementById("pass");
  const btn = document.getElementById("btnLogin");

  const username = usernameEl.value.trim();
  const pass = passEl.value.trim();

  if(!username){
    setMsg("⚠️ أدخل اسم المستخدم");
    usernameEl.focus();
    return;
  }

  if(!pass){
    setMsg("⚠️ أدخل كلمة المرور");
    passEl.focus();
    return;
  }

  btn.disabled = true;
  setMsg("جاري التحقق...", true);

  try{
    const res = await fetch(API_BASE, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        action: "login",
        username: username,
        password: pass,
        page: PAGE
      })
    });

    const text = await res.text();
    let data = null;

    try{
      data = JSON.parse(text);
    }catch(parseErr){
      btn.disabled = false;
      setMsg("❌ استجابة غير صالحة من الخادم");
      return;
    }

    btn.disabled = false;

    if(!data || !data.ok){
      setMsg((data && data.message) || "❌ فشل تسجيل الدخول");
      return;
    }

    setMsg("✅ تم تسجيل الدخول بنجاح", true);
    saveSessionAndGo(data.token);

  }catch(err){
    btn.disabled = false;
    setMsg("❌ خطأ اتصال بالخادم");
  }
}

document.getElementById("btnLogin").addEventListener("click", login);

document.getElementById("username").addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});

document.getElementById("pass").addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});
</script>

</body>
</html>
