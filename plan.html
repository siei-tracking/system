<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const tokenFromUrl = params.get("token") || "";
  const roleFromUrl  = params.get("role") || "";
  const userFromUrl  = params.get("user") || "";

  const tokenFromStorage = localStorage.getItem("wo_auth_token") || "";
  const roleFromStorage  = localStorage.getItem("wo_auth_role") || "";
  const userFromStorage  = localStorage.getItem("wo_auth_user") || "";

  const finalToken = tokenFromUrl || tokenFromStorage;
  const finalRole  = roleFromUrl || roleFromStorage;
  const finalUser  = userFromUrl || userFromStorage;

  if (!finalToken) {
    window.location.replace("login.html?p=plan");
    return;
  }

  try {
    localStorage.setItem("wo_auth_token", finalToken);
    if (finalRole) localStorage.setItem("wo_auth_role", finalRole);
    if (finalUser) localStorage.setItem("wo_auth_user", finalUser);
  } catch (e) {}

  if (tokenFromUrl || roleFromUrl || userFromUrl) {
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
  }
})();
</script>

<style>
:root{
  --primary:#223243;
  --accent:#f5a623;
  --accent-dark:#e59712;
  --bg:#eef2f6;
  --card:rgba(255,255,255,0.88);
  --line:#e5ebf1;
  --muted:#758292;
  --ok:#27ae60;
  --danger:#e74c3c;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:
    radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
    radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
    var(--bg);
  color:#111;
}

.company-header{
  background-image:
    linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
    url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');
  background-size:cover;
  background-position:center;
  padding:28px 5% 60px;
  display:flex;
  align-items:center;
  gap:16px;
  color:#fff;
  flex-wrap:wrap;
  justify-content:center;
  text-align:center;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  position:relative;
  overflow:hidden;
}

.logo{
  width:100px;
  height:100px;
  background:#fff;
  border-radius:50%;
  padding:5px;
  object-fit:contain;
  display:block;
  flex-shrink:0;
  box-shadow:
  -1px -1px 0 rgba(0,0,0,0.1),
   1px -1px 0 rgba(0,0,0,0.1),
  -1px  1px 0 rgba(0,0,0,0.1),
   1px  1px 0 rgba(0,0,0,0.1),
  0 1px 4px rgba(0,0,0,0.1) !important;
}

.header-text{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.header-text h1{
  color:#fff !important;
  margin:0;
  font-size:30px !important;
  font-weight:900 !important;
  text-shadow:
  -1px -1px 0 rgba(0,0,0,0.9),
   1px -1px 0 rgba(0,0,0,0.9),
  -1px  1px 0 rgba(0,0,0,0.9),
   1px  1px 0 rgba(0,0,0,0.9),
   0 4px 10px rgba(0,0,0,0.8) !important;
}

.header-text p{
  color:#fff !important;
  margin:0;
  font-size:18px !important;
  font-weight:900 !important;
  text-shadow:
  -1px -1px 0 rgba(0,0,0,0.9),
   1px -1px 0 rgba(0,0,0,0.9),
  -1px  1px 0 rgba(0,0,0,0.9),
   1px  1px 0 rgba(0,0,0,0.9),
   0 4px 10px rgba(0,0,0,0.8) !important;
}

.user-pill{
  margin-top:6px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:2px 14px;
  border-radius:999px;
  background:rgba(128,0,32,0.4);
  border:1px solid rgba(231,76,60,0.45);
  color:#fff;
  font-weight:900;
  font-size:13px;
  box-shadow:0 4px 12px rgba(231,76,60,.25);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
     1px -1px 0 rgba(0,0,0,0.9),
    -1px  1px 0 rgba(0,0,0,0.9),
     1px  1px 0 rgba(0,0,0,0.9),
     0 4px 10px rgba(0,0,0,0.8) !important;
}

.main-content{
  padding:0 5% 30px;
  display:flex;
  justify-content:center;
  margin-top:-40px;
  position:relative;
  z-index:2;
}

.card{
  width:100%;
  max-width:820px;
  background:rgba(255,255,255,0.88);
  border-radius:22px;
  padding:8px 12px;
  box-shadow:
    0 20px 50px rgba(0,0,0,.12),
    0 6px 18px rgba(0,0,0,.06);
  position:relative;
  z-index:2;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition:.25s;
  border:1px solid rgba(255,255,255,.65);
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:
    0 26px 60px rgba(0,0,0,.16),
    0 8px 22px rgba(0,0,0,.08);
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
  border-radius:22px 22px 0 0;
  pointer-events:none;
}

.success{
  display:none;
  text-align:center;
  padding:34px 18px;
}

.success i{
  font-size:74px;
  color:var(--ok);
  margin-bottom:12px;
}

.success h2{
  margin:0 0 10px;
  font-weight:900;
  color:#1f2b36;
  font-size:24px;
}

.success p{
  margin:0 0 18px;
  color:var(--muted);
  font-weight:800;
  font-size:18px;
}

.again{
  border:none;
  border-radius:16px;
  padding:18px 20px;
  background:linear-gradient(180deg,#2ebf68,#26a65b);
  color:#fff;
  font-family:'Cairo';
  font-weight:900;
  font-size:20px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  width:60%;
  max-width:420px;
  margin:25px auto 0;
  text-align:center;
  box-shadow:0 10px 20px rgba(39,174,96,.20);
  position:relative;
  overflow:hidden;
}

.again::before{
  content:"";
  position:absolute;
  top:0;
  right:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 20%,
    rgba(255,255,255,.18) 40%,
    rgba(255,255,255,.35) 50%,
    rgba(255,255,255,.18) 60%,
    transparent 80%
  );
  transition:.65s;
}

.again:hover::before{
  right:120%;
}

.again:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.again i{
  font-size:18px;
}

.tabs{
  display:flex;
  gap:6px;
  justify-content:center;
  margin-bottom:8px;
  flex-wrap:wrap;
  background:#f9fbfd;
  border:1px solid var(--line);
  border-radius:14px;
  padding:4px;
  position:relative;
  z-index:2;
}

.tab-btn{
  width:min(385px,100%);
  border-radius:10px;
  padding:6px 8px;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  border:none;
  background:transparent;
  font-family:'Cairo',sans-serif;
  transition:.2s;
}

.tab-btn.primary{
  background:linear-gradient(180deg,var(--accent),var(--accent-dark));
  color:#fff;
  box-shadow:0 8px 16px rgba(245,166,35,.20);
}

.tab-btn.ghost{
  color:#344454;
}

.tab-btn.ghost:hover{
  background:#fff;
}

.section{display:none;}
.section.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.row-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:4px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.field label{
  font-weight:900;
  font-size:15px;
  color:#253444;
}

input,select{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:10px;
  padding:5px 10px;
  font-weight:800;
  font-size:14px;
  background:#fff;
  text-align:right;
  font-family:'Cairo',sans-serif;
  color:#1f2d3a;
  outline:none;
  transition:.2s;
}

input:focus,select:focus{
  border-color:#d8b15d;
  box-shadow:0 0 0 4px rgba(245,166,35,.10);
}

input::placeholder{
  color:#9aa6b2;
  font-weight:800;
}

.main-action{
  margin-top:8px;
  width:100%;
  border:none;
  border-radius:12px;
  padding:7px 10px;
  background:linear-gradient(180deg,var(--accent),var(--accent-dark));
  color:#fff;
  font-weight:900;
  font-size:17px;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  box-shadow:0 10px 20px rgba(245,166,35,.20);
  transition:.2s;
  position:relative;
  overflow:hidden;
}

.main-action::before{
  content:"";
  position:absolute;
  top:0;
  right:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 20%,
    rgba(255,255,255,.18) 40%,
    rgba(255,255,255,.35) 50%,
    rgba(255,255,255,.18) 60%,
    transparent 80%
  );
  transition:.65s;
}

.main-action:hover::before{
  right:120%;
}

.main-action:hover{
  transform:translateY(-1px);
  filter:brightness(1.02);
}

.main-action:disabled{
  opacity:.65;
  cursor:not-allowed;
  box-shadow:none;
  transform:none;
}

.lab-box{
  margin-top:4px;
  display:none;
}

.toast{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#223243;
  color:#fff;
  padding:14px 18px;
  border-radius:12px;
  font-weight:900;
  font-size:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
  opacity:0;
  pointer-events:none;
  transition:.35s;
  z-index:9999;
  min-width:220px;
  max-width:90%;
  text-align:center;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.toast.success{ background:#27ae60; }
.toast.error{ background:#e74c3c; }
.toast.warn{ background:#f39c12; }

@media (max-width:820px){
  .header-text h1{ font-size:24px; }
  .header-text p{ font-size:15px; }
  .grid,.row-2{ grid-template-columns:1fr; }
  .card{ padding:10px; }
  .tab-btn{ width:100%; }
  .again{ width:100%; }
}

#nID , #pID {
  font-size:20px;
  font-weight:600;
  color:#000;
  text-align:center;
  height:40px;
  width:100%;
}

#nID::placeholder , #pID::placeholder {
  height:40px;
  width:100%;
  font-size:16px;
  font-weight:600;
  color:#999;
  opacity:1;
}

#nClient{
  font-size:20px;
  font-weight:600;
  color:#000;
  text-align:center;
  height:40px;
  width:100%;
  text-align:right;
}

#nClient::placeholder{
  height:40px;
  width:100%;
  font-size:16px;
  font-weight:600;
  color:#999;
  opacity:1;
}

#pVal, #pDays{
  font-size:20px;
  font-weight:600;
  color:#000;
  text-align:right;
  height:40px;
  width:100%;
}

#pVal::placeholder, #pDays::placeholder{
  font-size:16px;
  font-weight:600;
  color:#000;
  text-align:right;
  height:40px;
  width:100%;
}
</style>
</head>

<body>
<div class="page-shell">

<header class="company-header">
  <img class="logo" src="https://drive.google.com/thumbnail?id=1NN7G2zhk7nhgXuPWGW4qE_pdGC-Ptjkt&sz=w500" alt="logo">

  <div class="header-text">
    <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
    <p>
      <i class="fas fa-clipboard-list"></i>
      منصة تتبع اوامر العمل - اصدار امر العمل والتسعيرة
    </p>
    <div id="welcomeUser" class="user-pill"></div>
  </div>
</header>

<div class="page-content">
<main class="main-content">

  <div class="card" id="cardForm">
    <div class="tabs">
      <button class="tab-btn primary" id="tabNew" type="button" onclick="switchTab('new')">
        <i class="fas fa-plus-circle"></i>
        إضافة أمر عمل
      </button>

      <button class="tab-btn ghost" id="tabPrice" type="button" onclick="switchTab('price')">
        <i class="fas fa-receipt"></i>
        تثبيت التسعيرة
      </button>
    </div>

    <div class="section active" id="secNew">
      <div class="grid">
        <div class="field">
          <label>رقم أمر العمل</label>
          <input id="nID" type="text" placeholder="ادخل رقم أمر العمل" inputmode="numeric">
        </div>

        <div class="field">
          <label>اسم الجهة المستفيدة</label>
          <input id="nClient" type="text" placeholder="اسم الجهة">
        </div>
      </div>

      <button class="main-action" id="btnNew" type="button">
        اعتماد وحفظ البيانات
      </button>
    </div>

    <div class="section" id="secPrice">
      <div class="field">
        <label>رقم أمر العمل</label>
        <input id="pID" type="text" placeholder="ادخل رقم أمر العمل" inputmode="numeric">
      </div>

      <div class="row-2">
        <div class="field">
          <label>التسعيرة</label>
          <input id="pVal" type="number" placeholder="0">
        </div>

        <div class="field">
          <label>عدد الأيام</label>
          <input id="pDays" type="number" placeholder="0">
        </div>
      </div>

      <div class="field">
        <label>نوع الفحص</label>
        <select id="pType">
          <option value="">اختر النوع</option>
          <option value="مختبرات">الفحص المختبري</option>
          <option value="مصاعد">فحص المصاعد</option>
        </select>
      </div>

      <div class="lab-box" id="labBox">
        <div class="field">
          <label>التوجيه</label>
          <select id="pLabVal">
            <option value="ورشة">ورشة</option>
            <option value="مختبرات فقط">مختبرات فقط</option>
          </select>
        </div>
      </div>

      <button class="main-action" id="btnPrice" type="button">
        اعتماد وحفظ البيانات
      </button>
    </div>
  </div>

  <div class="card success" id="cardSuccess">
    <i class="fas fa-check-circle"></i>
    <h2>تم الحفظ بنجاح</h2>
    <p id="successText">تم توثيق العملية في السجل الموحد.</p>

    <button class="again" type="button" id="btnAgain">
      <i class="fas fa-plus"></i>
      معاملة جديدة
    </button>
  </div>

</main>
</div>

</div>

<div id="toast" class="toast"></div>

<script>
const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx3dhMys8Cw0NZY2RlizWyCFkHcwOOvvnSR5Q2A4NIizHMqZ6fm2WmklwCSNaEeVCk0/exec";
const PAGE_NAME = "plan";
const AUTH_TOKEN = localStorage.getItem("wo_auth_token") || "";
const CURRENT_USER = localStorage.getItem("wo_auth_user") || "";

window.addEventListener("load", async function(){
  const w = document.getElementById("welcomeUser");
  if(CURRENT_USER && CURRENT_USER !== "مخول غير معروف"){
    w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: ' + escapeHtml(CURRENT_USER);
  } else {
    w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: مخول غير معروف';
  }

  const allowed = await ensureCurrentPageAccess();
  if(!allowed) return;

  document.getElementById("btnNew").addEventListener("click", saveNew);
  document.getElementById("btnPrice").addEventListener("click", savePrice);
  document.getElementById("btnAgain").addEventListener("click", resetAll);
  document.getElementById("pType").addEventListener("change", function(){
    toggleLab(this.value);
  });
});

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function safeErr(err){
  try{
    if(!err) return "Unknown error";
    if(typeof err === "string") return err;
    if(err.message) return err.message;
    return JSON.stringify(err);
  }catch(e){
    return String(err);
  }
}

function showToast(msg, type){
  const t = document.getElementById("toast");
  t.className = "toast " + (type || "success");
  t.innerText = msg || "";
  t.classList.add("show");

  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(function(){
    t.classList.remove("show");
  }, 3000);
}

async function apiGet(action, params){
  const qs = new URLSearchParams({ action: action });

  Object.keys(params || {}).forEach(function(key){
    const val = params[key];
    if(val !== undefined && val !== null && val !== ""){
      qs.append(key, val);
    }
  });

  const res = await fetch(GAS_WEBAPP_URL + "?" + qs.toString(), {
    method: "GET",
    mode: "cors"
  });

  const text = await res.text();

  if(!res.ok){
    throw new Error("HTTP " + res.status + " | " + text.slice(0, 300));
  }

  try{
    return JSON.parse(text);
  }catch(e){
    throw new Error("JSON parse error | " + text.slice(0, 300));
  }
}

async function apiPost(payload){
  const res = await fetch(GAS_WEBAPP_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload || {})
  });

  const text = await res.text();

  if(!res.ok){
    throw new Error("HTTP " + res.status + " | " + text.slice(0, 300));
  }

  try{
    return JSON.parse(text);
  }catch(e){
    throw new Error("JSON parse error | " + text.slice(0, 300));
  }
}

async function ensureCurrentPageAccess(){
  const token = localStorage.getItem("wo_auth_token") || "";

  if(!token){
    window.location.href = "login.html?p=" + PAGE_NAME;
    return false;
  }

  try{
    const data = await apiGet("checkAccess", {
      token: token,
      page: PAGE_NAME
    });

    if(!data || !data.ok){
      showToast((data && data.error) ? data.error : "❌ غير مخول", "error");
      setTimeout(function(){
        window.location.href = "main.html";
      }, 1200);
      return false;
    }

    return true;
  }catch(err){
    const msg = safeErr(err);

    if(msg.includes("انتهت الجلسة") || msg.includes("تسجيل الدخول غير صالح")){
      showToast("❌ انتهت الجلسة", "error");
      setTimeout(function(){
        window.location.href = "login.html?p=" + PAGE_NAME;
      }, 1200);
      return false;
    }

    showToast("❌ تعذر التحقق من صلاحية الصفحة", "error");
    setTimeout(function(){
      window.location.href = "main.html";
    }, 1200);
    return false;
  }
}

function switchTab(which){
  const tabNew = document.getElementById("tabNew");
  const tabPrice = document.getElementById("tabPrice");
  const secNew = document.getElementById("secNew");
  const secPrice = document.getElementById("secPrice");

  if(which === "new"){
    secNew.classList.add("active");
    secPrice.classList.remove("active");
    tabNew.classList.add("primary");
    tabNew.classList.remove("ghost");
    tabPrice.classList.add("ghost");
    tabPrice.classList.remove("primary");
  }else{
    secPrice.classList.add("active");
    secNew.classList.remove("active");
    tabPrice.classList.add("primary");
    tabPrice.classList.remove("ghost");
    tabNew.classList.add("ghost");
    tabNew.classList.remove("primary");
  }
}

function toggleLab(v){
  document.getElementById("labBox").style.display = (v === "مختبرات") ? "block" : "none";
}

function showSuccess(text){
  document.getElementById("successText").innerText = text || "تم توثيق العملية في السجل الموحد.";
  document.getElementById("cardForm").style.display = "none";
  document.getElementById("cardSuccess").style.display = "block";
}

function resetAll(){
  document.getElementById("cardSuccess").style.display = "none";
  document.getElementById("cardForm").style.display = "block";

  document.querySelectorAll("input").forEach(function(i){ i.value = ""; });
  document.querySelectorAll("select").forEach(function(s){ s.selectedIndex = 0; });

  toggleLab("");
  switchTab("new");

  const btnNew = document.getElementById("btnNew");
  const btnPrice = document.getElementById("btnPrice");

  btnNew.disabled = false;
  btnNew.innerHTML = "اعتماد وحفظ البيانات";

  btnPrice.disabled = false;
  btnPrice.innerHTML = "اعتماد وحفظ البيانات";
}

async function saveNew(){
  const id = document.getElementById("nID").value.trim();
  const cl = document.getElementById("nClient").value.trim();

  if(!id || !cl){
    showToast("اكمل البيانات", "warn");
    return;
  }

  const btn = document.getElementById("btnNew");
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

  try{
    const res = await apiPost({
      action: "addNewOrder",
      token: AUTH_TOKEN,
      orderNo: id,
      clientName: cl,
      userName: CURRENT_USER
    });

    if(res && (res.ok || String(res.msg || "").includes("✅") || String(res.message || "").includes("✅"))){
      showSuccess("تم إضافة أمر العمل وتوثيقة");
      showToast("تم الحفظ بنجاح", "success");
    }else{
      showToast((res && (res.error || res.msg || res.message)) || "تعذر حفظ البيانات", "error");
      btn.disabled = false;
      btn.innerHTML = "اعتماد وحفظ البيانات";
    }
  }catch(err){
    const msg = safeErr(err);

    if(msg.includes("غير مصرح")){
      showToast("❌ غير مصرح لك بالدخول إلى صفحة التخطيط", "error");
      setTimeout(function(){
        window.location.href = "main.html";
      }, 1200);
      return;
    }

    if(msg.includes("انتهت الجلسة") || msg.includes("تسجيل الدخول غير صالح")){
      showToast("❌ انتهت الجلسة", "error");
      setTimeout(function(){
        window.location.href = "login.html?p=" + PAGE_NAME;
      }, 1200);
      return;
    }

    showToast("خطأ: " + msg, "error");
    btn.disabled = false;
    btn.innerHTML = "اعتماد وحفظ البيانات";
  }
}
