<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<script src="/system/config.js"></script>
<script src="/system/pwa-install.js"></script>  
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="watermark.css">
<title>قسم التخطيط / إصدار أمر العمل والتسعيرة - منصة تتبع أوامر العمل</title>
<link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --primary:#223243;
  --accent:#f5a623;
  --accent-dark:#e59712;
  --bg:#eef2f6;
  --card:rgba(255,255,255,0.92);
  --line:#e5ebf1;
  --muted:#758292;
  --ok:#27ae60;
  --danger:#e74c3c;
  --warn:#f39c12;
  --soft:#f8fafc;
  --transition-fast:.15s ease;
  --transition-med:.25s ease;
  --radius-sm:10px;
  --radius-md:14px;
  --radius-lg:22px;
}

*, *::before, *::after{ box-sizing:border-box; }

html, body{
  width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:
    radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
    radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
    var(--bg);
  color:#111;
}

#pageWrap{ display:block; }

#pageWrap.loading .card,
#pageWrap.loading .main-content{
  opacity:0;
  pointer-events:none;
}
#pageWrap .card,
#pageWrap .main-content{
  transition: opacity .3s ease;
}

.company-header{
  background-image:
    linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
    url('https://siei-tracking.github.io/system/company.jpg');
  background-size:cover;
  background-position:center;
  padding:28px 5% 60px;
  display:flex;
  align-items:center;
  gap:16px;
  color:#fff;
  flex-wrap:wrap;
  justify-content:center;
  text-align:center;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  position:relative;
  overflow:hidden;
}

.logo{
  width:100px;
  height:100px;
  background:#fff;
  border-radius:50%;
  padding:5px;
  object-fit:contain;
  display:block;
  flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}

.header-text{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  max-width:100%;
}

.header-text h1{
  color:#fff;
  margin:0;
  font-size:30px;
  font-weight:900;
  line-height:1.45;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}

.header-text p{
  color:#fff;
  margin:0;
  font-size:18px;
  font-weight:900;
  line-height:1.5;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}

.user-row{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:6px;
}

.user-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:4px 16px;
  border-radius:999px;
  background:rgba(128,0,32,0.4);
  border:1px solid rgba(231,76,60,0.45);
  color:#fff;
  font-weight:900;
  font-size:13px;
  box-shadow:0 4px 12px rgba(231,76,60,.25);
  max-width:100%;
  word-break:break-word;
}

.main-content{
  padding:0 5% 30px;
  display:flex;
  justify-content:center;
  margin-top:-40px;
  position:relative;
  z-index:2;
}

.card{
  width:100%;
  max-width:820px;
  background:rgba(255,255,255,0.92);
  border-radius:var(--radius-lg);
  padding:8px 12px;
  box-shadow:
    0 20px 50px rgba(0,0,0,.12),
    0 6px 18px rgba(0,0,0,.06);
  position:relative;
  z-index:2;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:transform var(--transition-med), box-shadow var(--transition-med);
  border:1px solid rgba(255,255,255,.65);
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:
    0 26px 60px rgba(0,0,0,.16),
    0 8px 22px rgba(0,0,0,.08);
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  pointer-events:none;
}

.success{
  display:none;
  text-align:center;
  padding:34px 18px;
}

.success i{
  font-size:74px;
  color:var(--ok);
  margin-bottom:12px;
}

.success h2{
  margin:0 0 10px;
  font-weight:900;
  color:#1f2b36;
  font-size:24px;
}

.success p{
  margin:0 0 18px;
  color:var(--muted);
  font-weight:800;
  font-size:18px;
}

.again{
  border:none;
  border-radius:16px;
  padding:18px 20px;
  background:linear-gradient(180deg,#2ebf68,#26a65b);
  color:#fff;
  font-family:'Cairo';
  font-weight:900;
  font-size:20px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  width:60%;
  max-width:420px;
  margin:25px auto 0;
  text-align:center;
  box-shadow:0 10px 20px rgba(39,174,96,.20);
  position:relative;
  overflow:hidden;
}

.again::before{
  content:"";
  position:absolute;
  top:0;
  right:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 20%,
    rgba(255,255,255,.18) 40%,
    rgba(255,255,255,.35) 50%,
    rgba(255,255,255,.18) 60%,
    transparent 80%
  );
  transition:.65s;
}

.again:hover::before{
  right:120%;
}

.again:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.again i{
  font-size:18px;
}

.tabs{
  display:flex;
  gap:6px;
  justify-content:center;
  margin-bottom:8px;
  flex-wrap:wrap;
  background:#f9fbfd;
  border:1px solid var(--line);
  border-radius:14px;
  padding:4px;
  position:relative;
  z-index:2;
}

.tab-btn{
  width:min(385px,100%);
  border-radius:10px;
  padding:6px 8px;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  border:none;
  background:transparent;
  font-family:'Cairo',sans-serif;
  transition:.2s;
}

.tab-btn.primary{
  background:linear-gradient(180deg,var(--accent),var(--accent-dark));
  color:#fff;
  box-shadow:0 8px 16px rgba(245,166,35,.20);
}

.tab-btn.ghost{
  color:#344454;
}

.tab-btn.ghost:hover{
  background:#fff;
}

.section{display:none;}
.section.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.row-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:4px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.field label{
  font-weight:900;
  font-size:15px;
  color:#253444;
}

input,select{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:var(--radius-sm);
  padding:5px 10px;
  font-weight:800;
  font-size:14px;
  background:#fff;
  text-align:right;
  font-family:'Cairo',sans-serif;
  color:#1f2d3a;
  outline:none;
  transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
  min-height:44px;
  -webkit-tap-highlight-color:transparent;
}

input:focus,select:focus{
  border-color:#d8b15d;
  box-shadow:0 0 0 4px rgba(245,166,35,.12);
}

input::placeholder{
  color:#9aa6b2;
  font-weight:800;
}

.main-action{
  margin-top:8px;
  width:100%;
  border:none;
  border-radius:var(--radius-md);
  padding:7px 10px;
  background:linear-gradient(180deg,var(--accent),var(--accent-dark));
  color:#fff;
  font-weight:900;
  font-size:17px;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  box-shadow:0 10px 20px rgba(245,166,35,.20);
  transition:transform var(--transition-fast), opacity var(--transition-fast);
  position:relative;
  overflow:hidden;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  min-height:46px;
}

.main-action::before{
  content:"";
  position:absolute;
  top:0;
  right:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 20%,
    rgba(255,255,255,.18) 40%,
    rgba(255,255,255,.35) 50%,
    rgba(255,255,255,.18) 60%,
    transparent 80%
  );
  transition:.65s;
}

.main-action:hover::before{ right:120%; }
.main-action:hover{ transform:translateY(-1px); opacity:.96; }
.main-action:active{ transform:translateY(0); opacity:.9; }
.main-action:disabled{
  opacity:.65;
  cursor:not-allowed;
  box-shadow:none;
  transform:none;
  pointer-events:none;
}

.lab-box{
  margin-top:4px;
  display:none;
}

.toast{
  position:fixed;
  bottom:22px;
  left:50%;
  transform:translateX(-50%) translateY(0);
  background:#223243;
  color:#fff;
  padding:12px 20px;
  border-radius:var(--radius-md);
  font-weight:900;
  font-size:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.28);
  opacity:0;
  pointer-events:none;
  transition:opacity .35s ease, transform .35s ease;
  z-index:99999;
  min-width:240px;
  max-width:90%;
  text-align:center;
  font-family:'Cairo',sans-serif;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.toast.success{ background:#27ae60; }
.toast.error  { background:#e74c3c; }
.toast.warn   { background:#f39c12; }

@media (max-width:820px){
  .company-header{ padding:28px 14px 48px; gap:12px; }
  .logo{ width:78px; height:78px; }
  .header-text h1{ font-size:22px; }
  .header-text p{ font-size:14px; }
  .main-content{ padding:0 10px 24px; margin-top:-24px; }
  .card{ border-radius:18px; padding:10px; }
  .grid,.row-2{ grid-template-columns:1fr; }
  .tab-btn{ width:100%; }
  .again{ width:100%; }
}

@media (max-width:480px){
  .company-header{ padding:22px 12px 38px; }
  .logo{ width:68px; height:68px; }
  .header-text h1{ font-size:18px; }
  .header-text p{ font-size:13px; }
  .user-pill{ font-size:12px; padding:4px 12px; }
}

#nID , #pID{
  font-size:20px;
  font-weight:600;
  color:#000;
  text-align:center;
  height:40px;
  width:100%;
}

#nID::placeholder , #pID::placeholder{
  height:40px;
  width:100%;
  font-size:16px;
  font-weight:600;
  color:#999;
  opacity:1;
}

#nClient{
  font-size:20px;
  font-weight:600;
  color:#000;
  text-align:right;
  height:40px;
  width:100%;
}

#nClient::placeholder{
  height:40px;
  width:100%;
  font-size:16px;
  font-weight:600;
  color:#999;
  opacity:1;
}

#pVal, #pDays{
  font-size:20px;
  font-weight:600;
  color:#000;
  text-align:right;
  height:40px;
  width:100%;
}

#pVal::placeholder, #pDays::placeholder{
  font-size:16px;
  font-weight:600;
  color:#000;
  text-align:right;
  height:40px;
  width:100%;
}
</style>
</head>

<body>

<div id="pageWrap" class="loading">
  <div class="page-shell">
    <header class="company-header">
      <img class="logo" src="https://siei-tracking.github.io/system/logo.png" alt="logo">

      <div class="header-text">
        <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>

        <p>
          <i class="fas fa-clipboard-list"></i>
          منصة تتبع اوامر العمل - قسم التخطيط / أصدار أمر العمل و التسعيرة
        </p>

        <div class="user-row">
          <div id="welcomeUser" class="user-pill"></div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="card" id="cardForm">

        <div class="tabs">
          <button class="tab-btn primary" id="tabNew" type="button" onclick="switchTab('new')">
            <i class="fas fa-plus-circle"></i>
            إضافة أمر عمل
          </button>

          <button class="tab-btn ghost" id="tabPrice" type="button" onclick="switchTab('price')">
            <i class="fas fa-receipt"></i>
            تثبيت التسعيرة
          </button>
        </div>

        <div class="section active" id="secNew">
          <div class="grid">
            <div class="field">
              <label>رقم أمر العمل</label>
              <input id="nID" type="text" placeholder="ادخل رقم أمر العمل" inputmode="numeric">
            </div>

            <div class="field">
              <label>اسم الجهة المستفيدة</label>
              <input id="nClient" type="text" placeholder="اسم الجهة">
            </div>
          </div>

          <button class="main-action" id="btnNew" type="button" onclick="saveNew()">
            اعتماد وحفظ البيانات
          </button>
        </div>

        <div class="section" id="secPrice">
          <div class="field">
            <label>رقم أمر العمل</label>
            <input id="pID" type="text" placeholder="ادخل رقم أمر العمل" inputmode="numeric">
          </div>

          <div class="row-2">
            <div class="field">
              <label>التسعيرة</label>
              <input id="pVal" type="number" placeholder="0">
            </div>

            <div class="field">
              <label>عدد الأيام</label>
              <input id="pDays" type="number" placeholder="0">
            </div>
          </div>

          <div class="field">
            <label>نوع الفحص</label>
            <select id="pType" onchange="toggleLab(this.value)">
              <option value="">اختر النوع</option>
              <option value="مختبرات">الفحص المختبري</option>
              <option value="مصاعد">فحص المصاعد</option>
            </select>
          </div>

          <div class="lab-box" id="labBox">
            <div class="field">
              <label>التوجيه</label>
              <select id="pLabVal">
                <option value="ورشة">ورشة</option>
                <option value="مختبرات فقط">مختبرات فقط</option>
              </select>
            </div>
          </div>

          <button class="main-action" id="btnPrice" type="button" onclick="savePrice()">
            اعتماد وحفظ البيانات
          </button>
        </div>
      </div>

      <div class="card success" id="cardSuccess">
        <i class="fas fa-check-circle"></i>
        <h2>تم الحفظ بنجاح</h2>
        <p id="successText">تم توثيق العملية في السجل الموحد.</p>

        <button class="again" type="button" onclick="resetAll()">
          <i class="fas fa-plus"></i>
          معاملة جديدة
        </button>
      </div>
    </main>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API_BASE = window.APP_CONFIG.API_BASE;
const PAGE_NAME = "plan";
const STORAGE_KEY_PAGE   = "tracking_session_token_" + PAGE_NAME;
const STORAGE_KEY_GLOBAL = "tracking_session_token";
const SESSION_CACHE_KEY  = "tracking_session_cache_" + PAGE_NAME;

let currentUserName     = "";
let sessionFailCount    = 0;
let liveSessionInterval = null;   // لحفظ الـ interval وإلغائه عند الخروج
let isSubmitting        = false;  // debounce: منع إرسال مزدوج
const MAX_SESSION_FAILS = 3;

/* ============================================================
 * SESSION HELPERS
 * ============================================================ */
function getSessionToken(){
  return (
    sessionStorage.getItem(STORAGE_KEY_PAGE)   ||
    sessionStorage.getItem(STORAGE_KEY_GLOBAL) ||
    localStorage.getItem(STORAGE_KEY_PAGE)     ||
    localStorage.getItem(STORAGE_KEY_GLOBAL)   ||
    ""
  );
}

function setSessionToken(token){
  if(!token) return;
  sessionStorage.setItem(STORAGE_KEY_PAGE,   token);
  sessionStorage.setItem(STORAGE_KEY_GLOBAL, token);
  localStorage.setItem(STORAGE_KEY_PAGE,     token);
  localStorage.setItem(STORAGE_KEY_GLOBAL,   token);
}

function clearSessionToken(){
  [STORAGE_KEY_PAGE, STORAGE_KEY_GLOBAL, SESSION_CACHE_KEY].forEach(function(k){
    sessionStorage.removeItem(k);
    localStorage.removeItem(k);
  });
}

function goToLogin(){
  clearSessionToken();
  if(liveSessionInterval){ clearInterval(liveSessionInterval); liveSessionInterval = null; }
  window.location.href = "login.html?p=" + encodeURIComponent(PAGE_NAME);
}

/* ============================================================
 * API — مع تحقق من HTTP status
 * ============================================================ */
async function apiPost(payload){
  const response = await fetch(API_BASE, {
    method:  "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body:    JSON.stringify(payload)
  });
  if(!response.ok){
    throw new Error("HTTP " + response.status + ": " + response.statusText);
  }
  const text = await response.text();
  try{ return JSON.parse(text); }
  catch(err){ throw new Error(text || "Invalid JSON response"); }
}

/* ============================================================
 * SESSION CHECK — مع cache مثل main.html
 * ============================================================ */
function applySessionUI(userName){
  currentUserName = userName;
  document.getElementById("welcomeUser").innerHTML =
    '<i class="fas fa-user-shield"></i> المستخدم: ' + escapeHtml(userName);
  document.getElementById("pageWrap").classList.remove("loading");
}

async function ensurePageSession(){
  const token = getSessionToken();
  if(!token){ goToLogin(); return; }

  /* ── محاولة عرض الصفحة فوراً من الـ cache (أقل من 10 دقائق) ── */
  let usedCache = false;
  try{
    const raw = sessionStorage.getItem(SESSION_CACHE_KEY) || localStorage.getItem(SESSION_CACHE_KEY);
    if(raw){
      const cached = JSON.parse(raw);
      if(cached && cached.token === token && (Date.now() - (cached.ts || 0)) < 600000){
        applySessionUI(cached.userName || "مخول غير معروف");
        usedCache = true;
      }
    }
  }catch(e){}

  /* ── تحقق من السيرفر في الخلفية ── */
  try{
    const result = await apiPost({ action:"checkSession", token, page:PAGE_NAME });

    if(result && result.ok){
      setSessionToken(token);
      sessionFailCount = 0;

      const userName = result.user || result.userName || "مخول غير معروف";
      applySessionUI(userName);

      /* حفظ في الـ cache */
      try{
        const cd = JSON.stringify({ token, userName, ts:Date.now() });
        sessionStorage.setItem(SESSION_CACHE_KEY, cd);
        localStorage.setItem(SESSION_CACHE_KEY, cd);
      }catch(e){}

    }else{
      try{ sessionStorage.removeItem(SESSION_CACHE_KEY); localStorage.removeItem(SESSION_CACHE_KEY); }catch(e){}
      if(!usedCache) goToLogin();
      else{ showToast("انتهت الجلسة، سيتم تسجيل الخروج...", "warn"); setTimeout(goToLogin, 2000); }
    }
  }catch(error){
    if(!usedCache){
      showToast("تعذر التحقق من الجلسة", "error");
      setTimeout(goToLogin, 900);
    }else{
      console.warn("Session check failed (using cache):", error);
    }
  }
}

/* فحص دوري للجلسة */
async function checkLiveSession(){
  const token = getSessionToken();
  if(!token){ goToLogin(); return; }
  try{
    const res = await apiPost({ action:"checkSession", token, page:PAGE_NAME });
    if(!res || !res.ok){
      sessionFailCount++;
      if(sessionFailCount >= MAX_SESSION_FAILS) goToLogin();
    }else{
      sessionFailCount = 0;
    }
  }catch(e){
    sessionFailCount++;
    if(sessionFailCount >= MAX_SESSION_FAILS) goToLogin();
  }
}

/* ============================================================
 * UI HELPERS
 * ============================================================ */
function escapeHtml(text){
  return String(text == null ? "" : text)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function showToast(msg, type){
  const t = document.getElementById("toast");
  t.className = "toast " + (type || "success");
  t.innerText  = msg || "";
  t.classList.add("show");
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 3000);
}

/* دالة مشتركة للتحقق من انتهاء الجلسة في ردود السيرفر */
function handleSessionExpiry(msg){
  if(
    msg.indexOf("انتهت الجلسة") !== -1 ||
    msg.indexOf("غير صالح")     !== -1 ||
    msg.indexOf("غير مصرح")     !== -1
  ){
    showToast("انتهت الجلسة", "error");
    setTimeout(function(){ clearSessionToken(); goToLogin(); }, 800);
    return true;
  }
  return false;
}

function setBtnLoading(btn, on){
  if(on){
    btn.disabled = true;
    btn.dataset.origText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
  }else{
    btn.disabled = false;
    btn.innerHTML = btn.dataset.origText || "اعتماد وحفظ البيانات";
  }
}

/* ============================================================
 * UI FUNCTIONS
 * ============================================================ */
function switchTab(which){
  const isNew = which === "new";
  document.getElementById("secNew").classList.toggle("active", isNew);
  document.getElementById("secPrice").classList.toggle("active", !isNew);
  document.getElementById("tabNew").className   = "tab-btn " + (isNew  ? "primary" : "ghost");
  document.getElementById("tabPrice").className = "tab-btn " + (!isNew ? "primary" : "ghost");
}

function toggleLab(v){
  document.getElementById("labBox").style.display = (v === "مختبرات") ? "block" : "none";
}

function showSuccess(text){
  document.getElementById("successText").innerText = text || "تم توثيق العملية في السجل الموحد.";
  document.getElementById("cardForm").style.display    = "none";
  document.getElementById("cardSuccess").style.display = "block";
  isSubmitting = false;
}

function resetAll(){
  document.getElementById("cardSuccess").style.display = "none";
  document.getElementById("cardForm").style.display    = "block";

  document.querySelectorAll("#secNew input, #secPrice input").forEach(function(i){ i.value = ""; });
  document.querySelectorAll("#secPrice select").forEach(function(s){ s.selectedIndex = 0; });

  toggleLab("");
  switchTab("new");
  isSubmitting = false;

  setBtnLoading(document.getElementById("btnNew"),   false);
  setBtnLoading(document.getElementById("btnPrice"), false);

  document.getElementById("nID").focus();
}

/* ============================================================
 * SAVE FUNCTIONS
 * ============================================================ */
async function saveNew(){
  if(isSubmitting) return;
  const token = getSessionToken();
  if(!token){ goToLogin(); return; }

  const id = String(document.getElementById("nID").value     || "").trim();
  const cl = String(document.getElementById("nClient").value || "").trim();

  if(!id || !cl){ showToast("اكمل البيانات", "warn"); return; }

  isSubmitting = true;
  const btn = document.getElementById("btnNew");
  setBtnLoading(btn, true);

  try{
    const r   = await apiPost({ action:"addNewOrder", token, page:PAGE_NAME, orderNo:id, clientName:cl, userName:currentUserName });
    const msg = String((r && (r.message || r.result)) || "");

    if(r && r.ok){
      showSuccess("تم إضافة أمر العمل وتوثيقه");
      showToast(msg || "تم الحفظ بنجاح", "success");
    }else{
      if(handleSessionExpiry(msg)) return;
      showToast(msg || "تعذر حفظ البيانات", "error");
      setBtnLoading(btn, false);
      isSubmitting = false;
    }
  }catch(err){
    showToast("خطأ في الاتصال", "error");
    setBtnLoading(btn, false);
    isSubmitting = false;
  }
}

async function savePrice(){
  if(isSubmitting) return;
  const token = getSessionToken();
  if(!token){ goToLogin(); return; }

  const type = document.getElementById("pType").value;
  const d = {
    orderNo:  String(document.getElementById("pID").value   || "").trim(),
    price:    String(document.getElementById("pVal").value  || "").trim(),
    days:     String(document.getElementById("pDays").value || "").trim(),
    testType: type,
    labPath:  (type === "مختبرات") ? document.getElementById("pLabVal").value: "",
    userName: currentUserName
  };

  if(!d.orderNo || !d.testType){ showToast("اكمل الحقول", "warn"); return; }

  isSubmitting = true;
  const btn = document.getElementById("btnPrice");
  setBtnLoading(btn, true);

  try{
    const r   = await apiPost({ action:"processPlanning", token, page:PAGE_NAME, data:d });
    const msg = String((r && (r.message || r.result)) || "");

    if(r && r.ok){
      showSuccess("تم تثبيت التسعيرة وعدد الأيام وتوثيقها");
      showToast(msg || "تم تثبيت التسعيرة بنجاح", "success");
    }else{
      if(handleSessionExpiry(msg)) return;
      showToast(msg || "تعذر حفظ البيانات", "error");
      setBtnLoading(btn, false);
      isSubmitting = false;
    }
  }catch(err){
    showToast("خطأ في الاتصال", "error");
    setBtnLoading(btn, false);
    isSubmitting = false;
  }
}

/* ============================================================
 * INIT
 * ============================================================ */
  /* ── الاستماع لرسائل تسجيل الخروج الفوري من تبويبات أخرى ── */
  try {
    const bc = new BroadcastChannel("siei_session");
    bc.onmessage = function(e) {
      if (e.data && e.data.type === "FORCE_LOGOUT") {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "login.html?p=" + encodeURIComponent(PAGE_NAME);
      }
    };
  } catch(e) {}

window.addEventListener("load", function(){
  ensurePageSession();
  liveSessionInterval = setInterval(checkLiveSession, 10000);
});
