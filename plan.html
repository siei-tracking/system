<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جاري التحقق...</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Cairo',sans-serif;
      background:#eef2f6;
      color:#223243;
      text-align:center;
      padding:20px;
    }
    .box{
      background:#fff;
      border-radius:18px;
      padding:28px 24px;
      box-shadow:0 18px 40px rgba(0,0,0,.10);
      max-width:360px;
      width:100%;
    }
    .spinner{
      width:48px;
      height:48px;
      border:5px solid #dfe6ec;
      border-top-color:#223243;
      border-radius:50%;
      margin:0 auto 16px;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    h2{ margin:0 0 10px; font-size:22px; font-weight:900; }
    p{ margin:0; font-size:15px; font-weight:700; color:#6b7785; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>جاري التحقق</h2>
    <p>يرجى الانتظار...</p>
  </div>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbwlfQBNdbqiomWXBF6SPvGURgOklgeAbJTBK18NUS_wx30MJWdSF0EhPSKkw5WCiuM/exec";
    const TOKEN_KEY = "app_token";
    const USER_KEY = "app_userName";
    const ROLE_KEY = "app_role";

    function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }

    function clearSession(){
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USER_KEY);
      localStorage.removeItem(ROLE_KEY);
    }

    async function apiGet(params){
      const url = new URL(API_BASE);
      Object.keys(params || {}).forEach(k => url.searchParams.set(k, params[k]));
      url.searchParams.set("_t", Date.now());

      const res = await fetch(url.toString(), { method:"GET", cache:"no-store" });
      if(!res.ok) throw new Error("فشل الاتصال بالسيرفر");
      return await res.json();
    }

    async function checkAndRedirect(){
      const token = getToken();

      if(!token){
        window.location.replace("login.html?page=plan-app.html");
        return;
      }

      try{
        const res = await apiGet({
          action: "checkSession",
          token: token,
          page: "plan"
        });

        if(res && res.ok && res.valid && res.allowed){
          window.location.replace("plan-app.html");
        }else{
          clearSession();
          window.location.replace("login.html?page=plan-app.html");
        }
      }catch(_){
        clearSession();
        window.location.replace("login.html?page=plan-app.html");
      }
    }

    checkAndRedirect();
  </script>
</body>
</html>
