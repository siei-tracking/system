<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>صفحة التخطيط</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#eef2f6;
}

header{
background:#223243;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,.1);
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#223243;
color:white;
font-weight:bold;
cursor:pointer;
}

.logout{
background:#e74c3c;
margin-top:20px;
}

</style>


<script>

/* فحص الجلسة */

(function(){

const session=localStorage.getItem("session");
const expire=localStorage.getItem("expire");

if(!session || Date.now()>expire){

localStorage.removeItem("session");
localStorage.removeItem("expire");

const page=encodeURIComponent(
window.location.pathname.split("/").pop()
);

window.location.href="login.html?redirect="+page;

}

})();

</script>

</head>


<body>

<header>

نظام تتبع أوامر العمل  
صفحة التخطيط

</header>


<div class="container">

<div class="card">

<h2>مرحبا بك في صفحة التخطيط</h2>

<p>

هذه الصفحة مخصصة لإدارة التخطيط للمعاملات.

</p>

<button onclick="goMain()">العودة الى الصفحة الرئيسية</button>

<br><br>

<button class="logout" onclick="logout()">تسجيل خروج</button>

</div>

</div>


<script>

function logout(){

localStorage.removeItem("session");
localStorage.removeItem("expire");

window.location.href="login.html";

}


function goMain(){

window.location.href="main.html";

}

</script>


</body>

</html>
