<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="watermark.css">
  <title>قسم التخطيط / تسليم النتائج - منصة تتبع أوامر العمل</title>

  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta name="theme-color" content="#223243">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.88);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --disabled:#bdc3c7;
      --soft:#f8fafc;
      --warn:#f39c12;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
        var(--bg);
      color:#111;
    }

    #pageWrap{
      display:none;
    }
    #pageWrap.show{
      display:block;
    }

    .company-header{
      background-image:
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
        url('https://siei-tracking.github.io/system/company.jpg');
      background-size:cover;
      background-position:center;
      padding:28px 5% 60px;
      display:flex;
      align-items:center;
      gap:16px;
      color:#fff;
      flex-wrap:wrap;
      justify-content:center;
      text-align:center;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      position:relative;
      overflow:visible;
    }

    .logo{
      width:100px;
      height:100px;
      background:#fff;
      border-radius:50%;
      padding:5px;
      object-fit:contain;
      display:block;
      flex-shrink:0;
      box-shadow:
      -1px -1px 0 rgba(0,0,0,0.1),
       1px -1px 0 rgba(0,0,0,0.1),
      -1px  1px 0 rgba(0,0,0,0.1),
       1px  1px 0 rgba(0,0,0,0.1),
      0 1px 4px rgba(0,0,0,0.1) !important;
    }

    .header-text{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .header-text h1{
      color:#fff !important;
      margin:0;
      font-size:30px !important;
      font-weight:900 !important;
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .header-text p{
      color:#fff !important;
      margin:0;
      font-size:18px !important;
      font-weight:900 !important;
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .user-pill{
      margin-top:6px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:2px 14px;
      border-radius:999px;
      background:rgba(128,0,32,0.4);
      border:1px solid rgba(231,76,60,0.45);
      color:#fff;
      font-weight:900;
      font-size:13px;
      box-shadow:0 4px 12px rgba(231,76,60,.25);
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .main-content{
      padding:0 5% 30px;
      display:flex;
      justify-content:center;
      margin-top:-40px;
      flex-direction:column;
      align-items:center;
    }

    .card{
      width:100%;
      max-width:820px;
      background:rgba(255,255,255,0.88);
      border-radius:22px;
      padding:10px 12px;
      box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 6px 18px rgba(0,0,0,.06);
      position:relative;
      z-index:2;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition:.25s;
      border:1px solid rgba(255,255,255,.65);
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:
        0 26px 60px rgba(0,0,0,.16),
        0 8px 22px rgba(0,0,0,.08);
    }

    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:60px;
      background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
      border-radius:22px 22px 0 0;
      pointer-events:none;
    }

    .input-group{
      margin-bottom:10px;
      text-align:right;
      position:relative;
      z-index:2;
    }

    label{
      display:block;
      margin-bottom:4px;
      font-weight:900;
      font-size:15px;
      color:#253444;
    }

    input{
      width:100%;
      border:1.5px solid var(--line);
      border-radius:10px;
      padding:7px 10px;
      font-weight:800;
      font-size:14px;
      background:#fff;
      text-align:center;
      font-family:'Cairo',sans-serif;
      color:#1f2d3a;
      outline:none;
      transition:.2s;
    }

    input:focus{
      border-color:#d8b15d;
      box-shadow:0 0 0 4px rgba(245,166,35,.10);
    }

    input::placeholder{
      color:#9aa6b2;
      font-weight:800;
    }

    .main-btn,
    .again{
      position:relative;
      overflow:hidden;
    }

    .main-btn::before,
    .again::before{
      content:"";
      position:absolute;
      top:0;
      right:-120%;
      width:120%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,.18) 40%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.18) 60%,
        transparent 80%
      );
      transition:.65s;
    }

    .main-btn:hover::before,
    .again:hover::before{
      right:120%;
    }

    .main-btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:9px 10px;
      background:var(--primary);
      color:#fff;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      font-family:'Cairo',sans-serif;
      box-shadow:0 10px 20px rgba(30,60,114,.20);
      transition:.2s;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      z-index:2;
    }

    .main-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.02);
    }

    .main-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    #loader{
      display:none;
      text-align:center;
      margin:12px 0;
      color:var(--primary);
      font-weight:900;
      position:relative;
      z-index:2;
    }

    #resPanel{
      display:none;
      margin-top:10px;
      padding:10px;
      background:var(--soft);
      border-radius:12px;
      border-right:5px solid var(--ok);
      position:relative;
      z-index:2;
    }

    .section-title{
      font-size:15px;
      font-weight:900;
      color:#253444;
      margin-bottom:6px;
    }

    .client-name{
      font-size:20px;
      font-weight:900;
      color:var(--primary);
    }

    .preview-card{
      display:none;
      margin:14px 0 16px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 6px 16px rgba(0,0,0,.04);
    }

    .preview-head{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      background:#fcfdff;
    }

    .preview-title{
      font-weight:900;
      color:var(--primary);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .preview-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .small-btn{
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-family:'Cairo';
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .small-btn.ok{
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      color:#fff;
    }

    .small-btn.ghost{
      background:#eef2f6;
      color:#1f2d3a;
    }

    .preview-body{
      padding:14px;
      background:#fff;
    }

    .barcode-frame{
      width:100%;
      min-height:420px;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      background:#fafafa;
    }

    .barcode-frame iframe{
      width:100%;
      height:420px;
      border:0;
      display:block;
    }

    .barcode-image{
      width:100%;
      max-height:520px;
      object-fit:contain;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      display:block;
    }

    .preview-note{
      margin-top:12px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .success{
      display:none;
      text-align:center;
      padding:34px 18px;
    }

    .success i{
      font-size:74px;
      color:var(--ok);
      margin-bottom:12px;
    }

    .success h2{
      margin:0 0 10px;
      font-weight:900;
      color:#1f2b36;
      font-size:24px;
    }

    .success p{
      margin:0 0 18px;
      color:var(--muted);
      font-weight:800;
      font-size:18px;
    }

    .again{
      border:none;
      border-radius:16px;
      padding:18px 20px;
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      color:#fff;
      font-family:'Cairo';
      font-weight:900;
      font-size:20px;
      cursor:pointer;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      width:60%;
      max-width:420px;
      margin:25px auto 0;
      text-align:center;
      box-shadow:0 10px 20px rgba(39,174,96,.20);
    }

    .again:hover{
      transform:translateY(-2px);
      opacity:.95;
    }

    .again i{
      font-size:18px;
    }

    #toast{
      position:fixed;
      bottom:22px;
      left:50%;
      transform:translateX(-50%);
      min-width:240px;
      max-width:90%;
      background:#223243;
      color:#fff;
      padding:12px 18px;
      border-radius:12px;
      font-weight:900;
      font-family:'Cairo',sans-serif;
      font-size:14px;
      display:none;
      z-index:99999;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,.22);
    }

    #toast.ok{ background:#27ae60; }
    #toast.warn{ background:#f39c12; }
    #toast.err{ background:#e74c3c; }

    @media (max-width:820px){
      .header-text h1{ font-size:24px; }
      .header-text p{ font-size:15px; }
      .card{ padding:10px; }
      .again{ width:100%; }
      .barcode-frame iframe{ height:320px; }
    }

    #orderID{
      font-size:20px;
      font-weight:600;
      color:#000;
      text-align:center;
      height:40px;
      width:100%;
    }

    #orderID::placeholder{
      height:40px;
      width:100%;
      font-size:16px;
      font-weight:600;
      color:#999;
      opacity:1;
    }
  </style>
</head>

<body>
<div id="pageWrap">
  <div class="page-shell">
    <div class="container">

      <header class="company-header">

        <img class="logo" src="https://siei-tracking.github.io/system/logo.png" alt="logo">

        <div class="header-text">
          <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>

          <p>
            <i class="fas fa-flag-checkered"></i>
            منصة تتبع اوامر العمل - قسم التخطيط / تسليم النتائج
          </p>

          <div id="welcomeUser" class="user-pill"></div>
        </div>

      </header>

      <div class="page-content">
        <main class="main-content">

          <div class="card" id="cardForm">
            <div id="inputForm">

              <div class="input-group">
                <label><i class="fas fa-barcode"></i> رقم أمر العمل الموحد</label>
                <input type="text" id="orderID" placeholder="أدخل الرقم..." inputmode="numeric" pattern="[0-9]*">
              </div>

              <button class="main-btn" id="fetchBtn" type="button" onclick="fetchData()" style="background:linear-gradient(180deg,#1e3c72,#162c52);">
                <i class="fas fa-search"></i>
                جلب بيانات المعاملة
              </button>

              <div id="loader">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p style="margin:10px 0 0;">جاري البحث...</p>
              </div>

              <div id="resPanel">
                <div class="input-group" style="margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:8px;">
                  <div class="section-title"><i class="fas fa-building"></i> الجهة المستفيدة</div>
                  <div id="cName" class="client-name">---</div>
                </div>

                <div class="preview-card" id="barcodeSection">
                  <div class="preview-head">
                    <div class="preview-title">
                      <i class="fas fa-qrcode"></i>
                      ملف الباركود
                    </div>

                    <div class="preview-actions">
                      <a id="barcodeLinkBtn" class="small-btn ok" href="#" target="_blank">
                        <i class="fas fa-up-right-from-square"></i>
                        فتح الملف
                      </a>

                      <button type="button" id="reloadPreviewBtn" class="small-btn ghost" onclick="reloadBarcodePreview()">
                        <i class="fas fa-rotate"></i>
                        تحديث المعاينة
                      </button>
                    </div>
                  </div>

                  <div class="preview-body">
                    <div id="barcodePreviewWrap"></div>

                    <div class="preview-note">
                      إذا لم تظهر المعاينة داخل الصفحة، استخدم زر <strong>فتح الملف</strong>.
                    </div>
                  </div>
                </div>

                <button id="receiveBtn" class="main-btn" type="button" style="background:linear-gradient(180deg,#2ebf68,#26a65b);" onclick="receive()">
                  <i class="fas fa-check-double"></i>
                  توثيق تسليم النتائج وإغلاق المعاملة
                </button>
              </div>

            </div>
          </div>

          <div class="card success" id="successMessage">
            <i class="fas fa-check-circle"></i>
            <h2>تم الحفظ بنجاح</h2>
            <p>تم توثيق استلام النتائج</p>
            <button class="again" type="button" onclick="resetPage()">
              <i class="fas fa-plus"></i>
              معاملة جديدة
            </button>
          </div>

        </main>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API_BASE = "https://script.google.com/macros/s/AKfycbwIh3zFn3Qq2QEndj9XG_MDqrrg5HZUTk4eD8bXkyaw63x_XN2o0wUq6MuE44bSdmWj/exec";
  const PAGE_NAME = "results";
  const STORAGE_KEY_PAGE = "tracking_session_token_" + PAGE_NAME;
  const STORAGE_KEY_GLOBAL = "tracking_session_token";

  let currentUserName = "";
  let lastStatus = "";
  let currentBarcodeLink = "";

  function getSessionToken(){
    return (
      sessionStorage.getItem(STORAGE_KEY_PAGE) ||
      sessionStorage.getItem(STORAGE_KEY_GLOBAL) ||
      localStorage.getItem(STORAGE_KEY_PAGE) ||
      localStorage.getItem(STORAGE_KEY_GLOBAL) ||
      ""
    );
  }

function setSessionToken(token){
  if(!token) return;

  sessionStorage.setItem(STORAGE_KEY_PAGE, token);
  sessionStorage.setItem(STORAGE_KEY_GLOBAL, token);

  // 👇 هذا هو الحل
  localStorage.setItem(STORAGE_KEY_PAGE, token);
  localStorage.setItem(STORAGE_KEY_GLOBAL, token);
}

  function clearSessionToken(){
    sessionStorage.removeItem(STORAGE_KEY_PAGE);
    sessionStorage.removeItem(STORAGE_KEY_GLOBAL);
    localStorage.removeItem(STORAGE_KEY_PAGE);
    localStorage.removeItem(STORAGE_KEY_GLOBAL);
  }

  function goToLogin(){
    window.location.href = "login.html?p=" + encodeURIComponent(PAGE_NAME);
  }

  async function apiPost(payload){
  const response = await fetch(API_BASE, {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });

  const text = await response.text();

  try{
    return JSON.parse(text);
  }catch(err){
    throw new Error(text || "Invalid JSON response");
  }
}

      async function ensurePageSession(){
  const token = getSessionToken();

  if(!token){
    goToLogin();
    return;
  }

  try{
    const result = await apiPost({
      action: "checkSession",
      token: token,
      page: PAGE_NAME
    });

    if(result && result.ok){
      setSessionToken(token);

      currentUserName = result.user || result.userName || "مخول غير معروف";

      const w = document.getElementById("welcomeUser");
      w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: ' + currentUserName;

      document.getElementById("pageWrap").classList.add("show");

      if(typeof window.loadNotifications === "function"){
        window.loadNotifications();
      }

    }else{
      clearSessionToken();
      goToLogin();
    }
  }catch(error){
    showMsg("❌ تعذر التحقق من الجلسة", "err");
    setTimeout(function(){
      clearSessionToken();
      goToLogin();
    }, 900);
  }
}

  function showMsg(text, type){
    var t = document.getElementById("toast");
    t.className = "";
    if(type === "ok") t.classList.add("ok");
    else if(type === "warn") t.classList.add("warn");
    else if(type === "err") t.classList.add("err");

    t.textContent = text || "";
    t.style.display = "block";

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){
      t.style.display = "none";
    }, 2500);
  }

  function extractDriveFileId(url){
    if(!url) return "";
    var m = String(url).match(/\/d\/([a-zA-Z0-9_-]+)/);
    if(m && m[1]) return m[1];

    var m2 = String(url).match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if(m2 && m2[1]) return m2[1];

    return "";
  }

  function buildPreviewHtml(url){
    var id = extractDriveFileId(url);
    var lower = String(url || "").toLowerCase();

    if(id){
      var previewUrl = "https://drive.google.com/file/d/" + id + "/preview";
      return '' +
        '<div class="barcode-frame">' +
          '<iframe src="' + previewUrl + '" allow="autoplay"></iframe>' +
        '</div>';
    }

    if(
      lower.endsWith(".png") ||
      lower.endsWith(".jpg") ||
      lower.endsWith(".jpeg") ||
      lower.endsWith(".webp") ||
      lower.indexOf("image") !== -1
    ){
      return '<img class="barcode-image" src="' + url + '" alt="Barcode">';
    }

    return '' +
      '<div class="barcode-frame" style="display:flex;align-items:center;justify-content:center;min-height:220px;">' +
        '<div style="text-align:center;padding:20px;">' +
          '<div style="font-size:48px;color:#2c3e50;margin-bottom:12px;"><i class="fas fa-file"></i></div>' +
          '<div style="font-weight:900;color:#2c3e50;">المعاينة غير متاحة لهذا النوع من الملفات</div>' +
          '<div style="margin-top:8px;color:#6b7785;font-weight:700;">استخدم زر فتح الملف</div>' +
        '</div>' +
      '</div>';
  }

  function showBarcodePreview(url){
    currentBarcodeLink = String(url || "").trim();

    if(!currentBarcodeLink){
      document.getElementById('barcodeSection').style.display = 'none';
      document.getElementById('barcodePreviewWrap').innerHTML = '';
      document.getElementById('barcodeLinkBtn').href = '#';
      return;
    }

    document.getElementById('barcodeSection').style.display = 'block';
    document.getElementById('barcodeLinkBtn').href = currentBarcodeLink;
    document.getElementById('barcodePreviewWrap').innerHTML = buildPreviewHtml(currentBarcodeLink);
  }

  function reloadBarcodePreview(){
    if(currentBarcodeLink){
      showBarcodePreview(currentBarcodeLink);
      showMsg("تم تحديث المعاينة", "ok");
    }
  }

  function setReceiveButtonEnabled(){
    const btn = document.getElementById('receiveBtn');
    btn.disabled = false;
    btn.style.background = "linear-gradient(180deg,#2ebf68,#26a65b)";
    btn.innerHTML = '<i class="fas fa-check-double"></i> توثيق تسليم النتائج وإغلاق المعاملة';
  }

  function setReceiveButtonDisabled(html){
    const btn = document.getElementById('receiveBtn');
    btn.disabled = true;
    btn.style.background = "#bdc3c7";
    btn.innerHTML = html;
  }

  async function fetchData(){
    const id = document.getElementById('orderID').value.trim();
    if(!id){
      showMsg("⚠️ يرجى إدخال رقم أمر العمل", "warn");
      return;
    }

    const token = getSessionToken();
    if(!token){
      goToLogin();
      return;
    }

    document.getElementById('fetchBtn').disabled = true;
    document.getElementById('loader').style.display = 'block';
    document.getElementById('resPanel').style.display = 'none';
    showBarcodePreview("");

    try{
      const data = await apiPost({
        action: "getResultsDetails",
        token: token,
        page: PAGE_NAME,
        orderNo: id
      });

      document.getElementById('loader').style.display = 'none';
      document.getElementById('fetchBtn').disabled = false;

      if(data && data.ok === false && data.message){
        if(
          data.message.indexOf("انتهت الجلسة") !== -1 ||
          data.message.indexOf("غير صالح") !== -1 ||
          data.message.indexOf("غير مصرح") !== -1
        ){
          showMsg("❌ انتهت الجلسة", "err");
          setTimeout(function(){
            clearSessionToken();
            goToLogin();
          }, 800);
          return;
        }

        showMsg(data.message, "err");
        return;
      }

      if(data && data.found){
        document.getElementById('cName').innerText = data.clientName || "---";

        const paymentStatus  = String(data.paymentStatus || "").trim();
        const officialStatus = String(data.officialStatus || "").trim();
        const barcodeStatus  = String(data.barcodeStatus || "").trim();
        const emailStatus    = String(data.emailStatus || "").trim();
        const resultsStatus  = String(data.resultsStatus || "").trim();

        lastStatus = resultsStatus;

        if(data.barcodeFileUrl){
          showBarcodePreview(data.barcodeFileUrl);
        } else {
          showBarcodePreview("");
        }

        const isPaymentDone  = paymentStatus.includes("✅");
        const isOfficialDone = officialStatus.includes("✅");
        const isBarcodeDone  = barcodeStatus.includes("✅");
        const isEmailDone    = emailStatus.includes("✅");
        const isDone         = resultsStatus.includes("استلام") || resultsStatus.includes("✅");

        if(isDone){
          setReceiveButtonDisabled('<i class="fas fa-lock"></i> مستلمة مسبقاً');
        } else if(!isPaymentDone){
          setReceiveButtonDisabled('<i class="fas fa-lock"></i> يجب التسديد اولا');
        } else if(!isOfficialDone){
          setReceiveButtonDisabled('<i class="fas fa-lock"></i> يجب اصدار الكتاب الرسمي اولا');
        } else if(!isBarcodeDone){
          setReceiveButtonDisabled('<i class="fas fa-lock"></i> يجب تثبيت الباركود اولا');
        } else if(!isEmailDone){
          setReceiveButtonDisabled('<i class="fas fa-lock"></i> يجب ارسال الايميل اولا');
        } else {
          setReceiveButtonEnabled();
        }

        document.getElementById('resPanel').style.display = 'block';
      } else {
        showMsg("⚠️ الرقم غير موجود", "warn");
      }
    }catch(err){
      document.getElementById('loader').style.display = 'none';
      document.getElementById('fetchBtn').disabled = false;
      showMsg("❌ خطأ في الاتصال", "err");
    }
  }

  async function receive(){
    const id = document.getElementById('orderID').value.trim();
    if(!id){
      showMsg("⚠️ يرجى إدخال رقم أمر العمل", "warn");
      return;
    }

    const token = getSessionToken();
    if(!token){
      goToLogin();
      return;
    }

    const btn = document.getElementById('receiveBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

    try{
      const res = await apiPost({
        action: "updateResultsStatus",
        token: token,
        page: PAGE_NAME,
        orderNo: id,
        userName: currentUserName
      });

      const msg = String((res && (res.message || res.result)) || "");

      if(res && res.ok){
        document.getElementById('cardForm').style.display = 'none';
        document.getElementById('successMessage').style.display = 'block';
      } else {
        if(
          msg.indexOf("انتهت الجلسة") !== -1 ||
          msg.indexOf("غير صالح") !== -1 ||
          msg.indexOf("غير مصرح") !== -1
        ){
          showMsg("❌ انتهت الجلسة", "err");
          setTimeout(function(){
            clearSessionToken();
            goToLogin();
          }, 800);
          return;
        }

        showMsg(msg || "❌ فشل التوثيق", "err");
        setReceiveButtonEnabled();
      }
    }catch(err){
      showMsg("❌ خطأ في الاتصال", "err");
      setReceiveButtonEnabled();
    }
  }

  function resetPage(){
  document.getElementById('orderID').value = "";
  document.getElementById('cardForm').style.display = 'block';
  document.getElementById('successMessage').style.display = 'none';
  document.getElementById('inputForm').style.display = 'block';
  document.getElementById('resPanel').style.display = 'none';
  document.getElementById('loader').style.display = 'none';
  document.getElementById('cName').innerText = "---";

  showBarcodePreview("");
  setReceiveButtonEnabled();

  document.getElementById('fetchBtn').disabled = false;
  lastStatus = "";
  document.getElementById('orderID').focus();
}

</script>

 <script>

window.apiPost = apiPost;
window.getSessionToken = getSessionToken;
window.showMsg = showMsg;

<script>
(function(){
  const currentPage = window.location.href;

  const manifest = {
    name: "منصة تتبع أوامر العمل",
    short_name: "تتبع العمل",
    start_url: currentPage,
    scope: "/system/",
    display: "standalone",
    background_color: "#eef2f6",
    theme_color: "#223243",
    icons: [
      {
        src: "/system/logo-192.png",
        sizes: "192x192",
        type: "image/png"
      },
      {
        src: "/system/logo-512.png",
        sizes: "512x512",
        type: "image/png"
      }
    ]
  };

  const blob = new Blob([JSON.stringify(manifest)], {
    type: "application/manifest+json"
  });

  const manifestURL = URL.createObjectURL(blob);

  let link = document.querySelector('link[rel="manifest"]');
  if(!link){
    link = document.createElement("link");
    link.rel = "manifest";
    document.head.appendChild(link);
  }

  link.href = manifestURL;
})();
</script>
