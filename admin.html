<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);

      const tokenFromUrl = params.get("token") || "";
      const roleFromUrl  = params.get("role") || "";
      const userFromUrl  = params.get("user") || "";

      const tokenFromStorage = localStorage.getItem("wo_auth_token") || "";
      const roleFromStorage  = localStorage.getItem("wo_auth_role") || "";
      const userFromStorage  = localStorage.getItem("wo_auth_user") || "";

      const finalToken = tokenFromUrl || tokenFromStorage;
      const finalRole  = (roleFromUrl || roleFromStorage || "").trim().toLowerCase();
      const finalUser  = userFromUrl || userFromStorage;

      if (!finalToken) {
        window.location.replace("login.html?p=main");
        return;
      }

      try {
        localStorage.setItem("wo_auth_token", finalToken);
        if (finalRole) localStorage.setItem("wo_auth_role", finalRole);
        if (finalUser) localStorage.setItem("wo_auth_user", finalUser);
      } catch (e) {}

      if (finalRole !== "admin") {
        window.location.replace("main.html");
        return;
      }

      if (tokenFromUrl || roleFromUrl || userFromUrl) {
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
      }
    })();
  </script>

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.92);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --warn:#f39c12;
      --soft:#f8fafc;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
        var(--bg);
      color:#111;
    }

    .company-header{
      background-image:
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
        url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');
      background-size:cover;
      background-position:center;
      padding:64px 5% 60px;
      display:flex;
      align-items:center;
      gap:16px;
      color:#fff;
      flex-wrap:wrap;
      justify-content:center;
      text-align:center;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .company-logo{
      width:100px;
      height:100px;
      background:#fff;
      border-radius:50%;
      padding:5px;
      object-fit:contain;
      display:block;
      flex-shrink:0;
      box-shadow:
        -1px -1px 0 rgba(0,0,0,0.1),
         1px -1px 0 rgba(0,0,0,0.1),
        -1px  1px 0 rgba(0,0,0,0.1),
         1px  1px 0 rgba(0,0,0,0.1),
         0 1px 4px rgba(0,0,0,0.1) !important;
    }

    table{
      table-layout:fixed;
      width:100%;
      border-collapse:collapse;
      min-width:900px;
      background:#fff;
    }

    th:nth-child(1),
    td:nth-child(1){
      width:100px;
      min-width:100px;
      max-width:100px;
    }

    th:nth-child(2),
    td:nth-child(2){
      width:140px;
      min-width:140px;
      max-width:140px;
    }

    th:nth-child(3),
    td:nth-child(3){
      width:380px;
      min-width:380px;
      max-width:380px;
    }

    th:nth-child(4),
    td:nth-child(4){
      width:240px;
      min-width:240px;
      max-width:240px;
    }

    .header-text{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .header-text h1{
      color:#fff !important;
      margin:0;
      font-size:30px !important;
      font-weight:900 !important;
      text-shadow:
        -1px -1px 0 rgba(0,0,0,0.9),
         1px -1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9),
         1px  1px 0 rgba(0,0,0,0.9),
         0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .header-text p{
      color:#fff !important;
      margin:0;
      font-size:18px !important;
      font-weight:900 !important;
      text-shadow:
        -1px -1px 0 rgba(0,0,0,0.9),
         1px -1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9),
         1px  1px 0 rgba(0,0,0,0.9),
         0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .wrap{
      padding:0 5% 30px;
      display:flex;
      justify-content:center;
      position:relative;
      margin-top:-40px;
    }

    .panel{
      width:100%;
      max-width:1300px;
      margin-top:13px;
      background:rgba(255,255,255,0.9);
      border-radius:22px;
      box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 6px 18px rgba(0,0,0,.06);
      position:relative;
      z-index:2;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition:.25s;
      border:1px solid rgba(255,255,255,.65);
      overflow:hidden;
    }

    .panel-head{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      background:linear-gradient(180deg, rgba(243,156,18,0.08), transparent);
    }

    .title{
      font-weight:900;
      color:var(--primary);
      display:flex;
      align-items:center;
      gap:10px;
      font-size:20px;
    }

    .head-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .section{
      padding:18px;
      border-bottom:1px solid var(--line);
    }

    .section-title{
      font-size:18px;
      font-weight:900;
      color:var(--primary);
      margin:0 0 14px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field label{
      font-weight:900;
      color:#1f2d3a;
      font-size:15px;
    }

    input{
      padding:12px 12px;
      border-radius:10px;
      border:1.5px solid var(--line);
      font-family:'Cairo',sans-serif;
      font-weight:900;
      outline:none;
      background:#fff;
      transition:.2s;
      color:#1f2d3a;
      min-height:46px;
      text-align:right;
    }

    input:focus{
      border-color:#d8b15d;
      box-shadow:0 0 0 4px rgba(245,166,35,.10);
    }

    .btn{
      padding:12px 14px;
      border:none;
      border-radius:10px;
      font-family:'Cairo',sans-serif;
      font-weight:900;
      font-size:17px;
      cursor:pointer;
      display:inline-flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      transition:.2s;
      white-space:nowrap;
      position:relative;
      overflow:hidden;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      right:-120%;
      width:120%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,.18) 40%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.18) 60%,
        transparent 80%
      );
      transition:.65s;
    }

    .btn:hover::before{ right:120%; }
    .btn:hover{ transform:translateY(-1px); opacity:.97; }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

    .btn-primary{
      background:linear-gradient(180deg,#1e3c72,#162c52);
      color:#fff;
      box-shadow:0 10px 20px rgba(30,60,114,.20);
    }

    .btn-ok{
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      color:#fff;
      box-shadow:0 10px 20px rgba(39,174,96,.20);
    }

    .btn-warn{
      background:linear-gradient(180deg,#f39c12,#d68910);
      color:#fff;
      box-shadow:0 10px 20px rgba(243,156,18,.20);
    }

    .btn-danger{
      background:linear-gradient(180deg,#e74c3c,#c0392b);
      color:#fff;
      box-shadow:0 10px 20px rgba(231,76,60,.20);
    }

    .btn-ghost{
      background:#eef2f6;
      color:#1f2d3a;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pages-box{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      background:#fafbfc;
      padding:14px;
      border-radius:14px;
      border:1px solid #eef1f4;
      margin-top:10px;
    }

    .page-item{
      display:flex;
      align-items:center;
      gap:8px;
      background:#fff;
      border:1px solid #eef1f4;
      border-radius:10px;
      padding:10px 12px;
      font-weight:900;
      color:#223243;
    }

    .page-item input{
      min-height:auto;
      width:18px;
      height:18px;
      margin:0;
    }

    #status{
      padding:12px 18px;
      border-bottom:1px solid var(--line);
      font-weight:900;
    }

    #status.ok{ color:#1d5e3b; }
    #status.bad{ color:var(--danger); }

    .table-wrap{
      overflow:auto;
    }

    th, td{
      border-bottom:1px solid #edf1f5;
      padding:12px 10px;
      text-align:center;
      vertical-align:middle;
      font-weight:900;
    }

    th{
      background:#fafbfc;
      color:var(--primary);
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:#fcfdff;
    }

    .pages-cell{
      text-align:right;
      line-height:1.7;
      font-size:13px;
      color:#334155;
      white-space:normal;
    }

    .action-cell{
      text-align:center;
      vertical-align:middle;
    }

    .action-box{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      flex-wrap:nowrap;
    }

    .empty{
      padding:26px 18px;
      text-align:center;
      font-weight:900;
      color:var(--muted);
    }

    #toast{
      position:fixed;
      bottom:22px;
      left:50%;
      transform:translateX(-50%);
      min-width:240px;
      max-width:90%;
      background:#223243;
      color:#fff;
      padding:12px 18px;
      border-radius:12px;
      font-weight:900;
      font-family:'Cairo',sans-serif;
      font-size:14px;
      display:none;
      z-index:99999;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,.22);
    }

    #toast.ok{ background:#27ae60; }
    #toast.warn{ background:#f39c12; }
    #toast.err{ background:#e74c3c; }

    .confirm-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:100000;
      padding:20px;
    }

    .confirm-box{
      width:100%;
      max-width:460px;
      background:#fff;
      border-radius:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
      overflow:hidden;
      border:1px solid #eef1f4;
      animation:popIn .18s ease-out;
    }

    .confirm-head{
      padding:16px 18px;
      background:linear-gradient(180deg, rgba(231,76,60,.08), transparent);
      border-bottom:1px solid #eef1f4;
      font-weight:900;
      color:#223243;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
    }

    .confirm-body{
      padding:18px;
      font-weight:900;
      color:#223243;
      line-height:1.8;
      text-align:center;
    }

    .confirm-actions{
      padding:0 18px 18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    @keyframes popIn{
      from{ transform:scale(.96); opacity:0; }
      to{ transform:scale(1); opacity:1; }
    }

    @media (max-width:1100px){
      .pages-box{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    }

    @media (max-width:700px){
      .grid{ grid-template-columns:1fr; }
      .pages-box{ grid-template-columns:1fr; }
      .btn-row, .head-actions{ flex-direction:column; }
      .btn{ width:100%; }
    }
  </style>
</head>

<body>

<header class="company-header">
  <img src="https://drive.google.com/thumbnail?id=1NN7G2zhk7nhgXuPWGW4qE_pdGC-Ptjkt&sz=w500" class="company-logo" alt="logo">
  <div class="header-text">
    <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
    <p><i class="fas fa-user-shield"></i> إدارة المستخدمين والصلاحيات</p>
  </div>
</header>

<div class="wrap">
  <div class="panel">

    <div class="panel-head">
      <div class="title"><i class="fas fa-users-cog"></i> لوحة إدارة المخولين</div>

      <div class="head-actions">
        <button class="btn btn-primary" id="btnBackMain" type="button">
          <i class="fas fa-arrow-right"></i> العودة إلى main
        </button>
      </div>
    </div>

    <div id="status" class="ok">جاهز...</div>

    <div class="section">
      <h3 class="section-title"><i class="fas fa-user-plus"></i> إضافة / تعديل مستخدم</h3>

      <div class="grid">
        <div class="field">
          <label for="pass">كلمة المرور</label>
          <input id="pass" type="text" placeholder="مثال: 1234">
        </div>

        <div class="field">
          <label for="name">الاسم</label>
          <input id="name" type="text" placeholder="اسم المستخدم">
        </div>
      </div>

      <div style="margin-top:14px;">
        <label style="font-weight:900;color:#1f2d3a;font-size:15px;">صلاحيات الصفحات</label>
        <div id="pagesBox" class="pages-box"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ok" id="btnAdd" type="button">
          <i class="fas fa-user-plus"></i> إضافة مستخدم
        </button>

        <button class="btn btn-primary" id="btnUpdate" type="button">
          <i class="fas fa-pen-to-square"></i> تحديث مستخدم
        </button>

        <button class="btn btn-danger" id="btnDelete" type="button">
          <i class="fas fa-trash"></i> حذف مستخدم
        </button>

        <button class="btn btn-warn" id="btnClear" type="button">
          <i class="fas fa-broom"></i> مسح الحقول
        </button>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title"><i class="fas fa-table-list"></i> قائمة المستخدمين</h3>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>كلمة المرور</th>
              <th>الاسم</th>
              <th>الصفحات</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="4" class="empty">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<div id="confirmOverlay" class="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-head">
      <i class="fas fa-triangle-exclamation"></i>
      <span>تأكيد الحذف</span>
    </div>
    <div class="confirm-body" id="confirmMessage">
      هل أنت متأكد؟
    </div>
    <div class="confirm-actions">
      <button class="btn btn-danger" id="confirmOkBtn" type="button">
        <i class="fas fa-trash"></i> نعم، حذف
      </button>
      <button class="btn btn-ghost" id="confirmCancelBtn" type="button">
        <i class="fas fa-xmark"></i> إلغاء
      </button>
    </div>
  </div>
</div>

<script>
  const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyTaiMqHuYCn6bH0sgMRmJytithLxqNNww8O_XeMAKuUJskcj9CSiCs8PuTK70TYtZX/exec";

  const PARAMS = new URLSearchParams(window.location.search);
  const AUTH_TOKEN = PARAMS.get("token") || localStorage.getItem("wo_auth_token") || "";
  const CURRENT_USER_ROLE = PARAMS.get("role") || localStorage.getItem("wo_auth_role") || "";

  let ALL_PAGES_CACHE = [];
  let USERS_CACHE = [];
  let confirmCallback = null;

  function safeErr(err){
    try{
      if(!err) return "Unknown error";
      if(typeof err === "string") return err;
      if(err.message) return err.message;
      return JSON.stringify(err);
    }catch(e){
      return String(err);
    }
  }

  function showMsg(text, type){
    const t = document.getElementById("toast");
    t.className = "";

    if(type === "ok") t.classList.add("ok");
    else if(type === "warn") t.classList.add("warn");
    else if(type === "err") t.classList.add("err");

    t.textContent = text || "";
    t.style.display = "block";

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){
      t.style.display = "none";
    }, 2500);
  }

  function setStatus(msg, ok){
    const el = document.getElementById("status");
    el.className = ok ? "ok" : "bad";
    el.textContent = msg;
  }

  function setLoading(on){
    [
      "btnAdd","btnUpdate","btnDelete","btnClear",
      "btnBackMain","pass","name"
    ].forEach(function(id){
      const el = document.getElementById(id);
      if(el) el.disabled = on;
    });

    const checks = document.querySelectorAll('#pagesBox input[type="checkbox"]');
    checks.forEach(function(ch){ ch.disabled = on; });

    if(on) setStatus("جاري التنفيذ...", true);
  }

  async function apiGet(action, params){
    const qs = new URLSearchParams({ action: action });

    Object.keys(params || {}).forEach(function(key){
      const val = params[key];
      if(val !== undefined && val !== null && val !== ""){
        qs.append(key, val);
      }
    });

    const res = await fetch(GAS_WEBAPP_URL + "?" + qs.toString(), {
      method: "GET",
      mode: "cors"
    });

    const text = await res.text();

    if(!res.ok){
      throw new Error("HTTP " + res.status + " | " + text.slice(0, 200));
    }

    try{
      return JSON.parse(text);
    }catch(e){
      throw new Error("JSON parse error | " + text.slice(0, 200));
    }
  }

  async function apiPost(payload){
    const res = await fetch(GAS_WEBAPP_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload || {})
    });

    const text = await res.text();

    if(!res.ok){
      throw new Error("HTTP " + res.status + " | " + text.slice(0, 200));
    }

    try{
      return JSON.parse(text);
    }catch(e){
      throw new Error("JSON parse error | " + text.slice(0, 200));
    }
  }

  function escapeHtml(text){
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function normalizeName(name){
    return String(name || "").trim().replace(/\s+/g, " ").toLowerCase();
  }

  function getCheckedPages(){
    const checks = document.querySelectorAll('#pagesBox input[type="checkbox"]:checked');
    const arr = [];
    checks.forEach(function(ch){
      arr.push(String(ch.value || "").trim());
    });
    return arr;
  }

  function setCheckedPages(pagesValue){
    const pages = Array.isArray(pagesValue)
      ? pagesValue.map(function(p){ return String(p || "").trim().toLowerCase(); })
      : String(pagesValue || "")
          .split(",")
          .map(function(p){ return String(p || "").trim().toLowerCase(); })
          .filter(function(p){ return !!p; });

    const checks = document.querySelectorAll('#pagesBox input[type="checkbox"]');
    checks.forEach(function(ch){
      ch.checked = pages.indexOf(String(ch.value || "").trim().toLowerCase()) !== -1;
    });
  }

  function clearForm(silent){
    document.getElementById("pass").value = "";
    document.getElementById("name").value = "";

    const checks = document.querySelectorAll('#pagesBox input[type="checkbox"]');
    checks.forEach(function(ch){ ch.checked = false; });

    if(!silent){
      setStatus("تم مسح الحقول", true);
    }
  }

  function renderPages(pages){
    ALL_PAGES_CACHE = Array.isArray(pages) ? pages.slice() : [];
    const box = document.getElementById("pagesBox");

    if(!ALL_PAGES_CACHE.length){
      box.innerHTML = '<div class="empty">لا توجد صفحات متاحة</div>';
      return;
    }

    box.innerHTML = ALL_PAGES_CACHE.map(function(page){
      const p = String(page || "").trim();
      return ''
        + '<label class="page-item">'
        +   '<input type="checkbox" value="' + escapeHtml(p) + '">'
        +   '<span>' + escapeHtml(p) + '</span>'
        + '</label>';
    }).join("");
  }

  function renderUsers(users){
    USERS_CACHE = Array.isArray(users) ? users.slice() : [];
    const body = document.getElementById("usersBody");

    if(!USERS_CACHE.length){
      body.innerHTML = '<tr><td colspan="4" class="empty">لا يوجد مستخدمون</td></tr>';
      return;
    }

    body.innerHTML = USERS_CACHE.map(function(user){
      const pass = String(user.password || "").trim();
      const name = String(user.name || "").trim();
      const pages = Array.isArray(user.pages)
        ? user.pages.join(", ")
        : String(user.pages || "").trim();

      return ''
        + '<tr>'
        +   '<td>' + escapeHtml(pass) + '</td>'
        +   '<td>' + escapeHtml(name) + '</td>'
        +   '<td class="pages-cell">' + escapeHtml(pages || "—") + '</td>'
        +   '<td class="action-cell">'
        +     '<div class="action-box">'
        +       '<button class="btn btn-primary btn-fill-user" type="button" data-pass="' + escapeHtml(pass) + '">'
        +         '<i class="fas fa-pen"></i> تعبئة'
        +       '</button>'
        +       '<button class="btn btn-danger btn-remove-user" type="button" data-pass="' + escapeHtml(pass) + '">'
        +         '<i class="fas fa-trash"></i> حذف'
        +       '</button>'
        +     '</div>'
        +   '</td>'
        + '</tr>';
    }).join("");
  }

  async function loadAllPages(){
    try{
      const res = await apiGet("allPages", { token: AUTH_TOKEN });
      if(!res || !res.ok){
        renderPages([]);
        setStatus("⚠️ تعذر تحميل الصفحات", false);
        return;
      }
      renderPages(res.pages || []);
    }catch(err){
      renderPages([]);
      setStatus("❌ فشل تحميل الصفحات: " + safeErr(err), false);
    }
  }

  async function loadUsers(){
    try{
      setLoading(true);
      const res = await apiGet("users", { token: AUTH_TOKEN });
      setLoading(false);

      if(!res || !res.ok){
        renderUsers([]);
        setStatus("⚠️ تعذر تحميل المستخدمين", false);
        return;
      }

      renderUsers(res.items || []);
      setStatus("تم تحميل المستخدمين بنجاح", true);
    }catch(err){
      setLoading(false);
      renderUsers([]);
      setStatus("❌ فشل تحميل المستخدمين: " + safeErr(err), false);
      showMsg("❌ فشل تحميل المستخدمين", "err");
    }
  }

  function validateForm(requirePages){
    const pass = String(document.getElementById("pass").value || "").trim();
    const name = String(document.getElementById("name").value || "").trim();
    const pages = getCheckedPages();

    if(!pass){
      showMsg("⚠️ أدخل كلمة المرور", "warn");
      return null;
    }

    if(!name){
      showMsg("⚠️ أدخل الاسم", "warn");
      return null;
    }

    if(requirePages && !pages.length){
      showMsg("⚠️ اختر صفحة واحدة على الأقل", "warn");
      return null;
    }

    return { pass: pass, name: name, pages: pages };
  }

  async function addUser(){
    const form = validateForm(true);
    if(!form) return;

    try{
      setLoading(true);
      const res = await apiPost({
        action: "addUser",
        token: AUTH_TOKEN,
        pass: form.pass,
        name: form.name,
        pages: form.pages
      });
      setLoading(false);

      if(!res || !res.ok){
        setStatus("❌ " + (res && (res.error || res.msg) ? (res.error || res.msg) : "فشل إضافة المستخدم"), false);
        showMsg("❌ فشل إضافة المستخدم", "err");
        return;
      }

      clearForm(true);
      await loadUsers();
      setStatus("✅ تم إضافة المستخدم بنجاح", true);
      showMsg("✅ تمت إضافة المستخدم", "ok");
    }catch(err){
      setLoading(false);
      setStatus("❌ فشل إضافة المستخدم: " + safeErr(err), false);
      showMsg("❌ فشل إضافة المستخدم", "err");
    }
  }

  async function updateUser(){
    const form = validateForm(true);
    if(!form) return;

    try{
      setLoading(true);
      const res = await apiPost({
        action: "updateUser",
        token: AUTH_TOKEN,
        pass: form.pass,
        name: form.name,
        pages: form.pages
      });
      setLoading(false);

      if(!res || !res.ok){
        setStatus("❌ " + (res && (res.error || res.msg) ? (res.error || res.msg) : "فشل تحديث المستخدم"), false);
        showMsg("❌ فشل تحديث المستخدم", "err");
        return;
      }

      await loadUsers();
      setStatus("✅ تم تحديث المستخدم بنجاح", true);
      showMsg("✅ تم تحديث المستخدم", "ok");
    }catch(err){
      setLoading(false);
      setStatus("❌ فشل تحديث المستخدم: " + safeErr(err), false);
      showMsg("❌ فشل تحديث المستخدم", "err");
    }
  }

  function openConfirmBox(message, callback){
    document.getElementById("confirmMessage").textContent = message || "هل أنت متأكد؟";
    confirmCallback = callback;
    document.getElementById("confirmOverlay").style.display = "flex";
  }

  function closeConfirmBox(){
    document.getElementById("confirmOverlay").style.display = "none";
    confirmCallback = null;
  }

  async function removeUser(passArg){
    const pass = String(passArg || document.getElementById("pass").value || "").trim();

    if(!pass){
      showMsg("⚠️ أدخل كلمة المرور أو اختر مستخدماً من الجدول", "warn");
      return;
    }

    openConfirmBox("هل أنت متأكد من حذف المستخدم؟", async function(){
      try{
        setLoading(true);
        const res = await apiPost({
          action: "deleteUser",
          token: AUTH_TOKEN,
          pass: pass
        });
        setLoading(false);

        if(!res || !res.ok){
          setStatus("❌ " + (res && (res.error || res.msg) ? (res.error || res.msg) : "فشل حذف المستخدم"), false);
          showMsg("❌ فشل حذف المستخدم", "err");
          return;
        }

        clearForm(true);
        await loadUsers();
        setStatus("✅ تم حذف المستخدم بنجاح", true);
        showMsg("✅ تم حذف المستخدم", "ok");
      }catch(err){
        setLoading(false);
        setStatus("❌ فشل حذف المستخدم: " + safeErr(err), false);
        showMsg("❌ فشل حذف المستخدم", "err");
      }
    });
  }

  function fillUserByPass(pass){
    const p = String(pass || "").trim();
    if(!p) return;

    const user = USERS_CACHE.find(function(u){
      return String(u.password || "").trim() === p;
    });

    if(!user){
      showMsg("⚠️ المستخدم غير موجود في القائمة الحالية", "warn");
      return;
    }

    document.getElementById("pass").value = String(user.password || "");
    document.getElementById("name").value = String(user.name || "");
    setCheckedPages(user.pages || "");

    window.scrollTo({ top: 0, behavior: "smooth" });
    setStatus("تمت تعبئة بيانات المستخدم", true);
  }

  function goToMain(){
    const token = String(AUTH_TOKEN || "").trim();
    const role = String(CURRENT_USER_ROLE || "").trim();

    let url = "main.html";
    const params = new URLSearchParams();

    if(token) params.set("token", token);
    if(role) params.set("role", role);

    const qs = params.toString();
    if(qs) url += "?" + qs;

    window.location.href = url;
  }

  function bindTableActions(){
    const body = document.getElementById("usersBody");

    body.addEventListener("click", function(e){
      const fillBtn = e.target.closest(".btn-fill-user");
      const removeBtn = e.target.closest(".btn-remove-user");

      if(fillBtn){
        fillUserByPass(fillBtn.getAttribute("data-pass"));
        return;
      }

      if(removeBtn){
        removeUser(removeBtn.getAttribute("data-pass"));
      }
    });
  }

  window.addEventListener("load", function(){
    if(String(CURRENT_USER_ROLE || "").toLowerCase() !== "admin"){
      window.location.replace("main.html");
      return;
    }

    loadAllPages();
    loadUsers();
    bindTableActions();

    document.getElementById("btnAdd").addEventListener("click", addUser);
    document.getElementById("btnUpdate").addEventListener("click", updateUser);
    document.getElementById("btnDelete").addEventListener("click", function(){ removeUser(); });
    document.getElementById("btnClear").addEventListener("click", function(){ clearForm(false); });
    document.getElementById("btnBackMain").addEventListener("click", goToMain);

    document.getElementById("confirmOkBtn").addEventListener("click", function(){
      const cb = confirmCallback;
      closeConfirmBox();
      if(typeof cb === "function") cb();
    });

    document.getElementById("confirmCancelBtn").addEventListener("click", closeConfirmBox);

    document.getElementById("confirmOverlay").addEventListener("click", function(e){
      if(e.target === this) closeConfirmBox();
    });
  });
</script>

</body>
</html>
