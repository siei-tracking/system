<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="watermark.css">
  <title>إدارة المستخدمين - منصة تتبع أوامر العمل</title>
  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="manifest" href="/system/manifest.webmanifest">
  <meta name="theme-color" content="#223243">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.92);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --warn:#f39c12;
      --soft:#f8fafc;
      --disabled:#bdc3c7;
      --transition-fast:.15s ease;
      --transition-med:.25s ease;
      --radius-sm:10px;
      --radius-md:14px;
      --radius-lg:22px;
    }

    *, *::before, *::after{ box-sizing:border-box; }

    html, body{
      width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
        var(--bg);
      color:#111;
    }

    #pageWrap{ display:block; }

    /* إخفاء المحتوى الحساس فقط حتى تتحقق الجلسة */
    #pageWrap.loading .panel,
    #pageWrap.loading .wrap{
      opacity:0;
      pointer-events:none;
    }
    #pageWrap .panel,
    #pageWrap .wrap{
      transition: opacity .3s ease;
    }

    .company-header{
      background-image:
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
        url('https://siei-tracking.github.io/system/company.jpg');
      background-size:cover;
      background-position:center;
      padding:64px 5% 60px;
      display:flex;
      align-items:center;
      gap:16px;
      color:#fff;
      flex-wrap:wrap;
      justify-content:center;
      text-align:center;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .company-logo{
      width:100px;
      height:100px;
      background:#fff;
      border-radius:50%;
      padding:5px;
      object-fit:contain;
      display:block;
      flex-shrink:0;
      box-shadow:0 4px 16px rgba(0,0,0,.25);
    }

    table{
      table-layout:fixed;
      width:100%;
      border-collapse:collapse;
      min-width:1100px;
      background:#fff;
    }

    th:nth-child(1), td:nth-child(1){
      width:140px; min-width:140px; max-width:140px;
    }

    th:nth-child(2), td:nth-child(2){
      width:120px; min-width:120px; max-width:120px;
    }

    th:nth-child(3), td:nth-child(3){
      width:160px; min-width:160px; max-width:160px;
    }

    th:nth-child(4), td:nth-child(4){
      width:380px; min-width:380px; max-width:380px;
    }

    th:nth-child(5), td:nth-child(5){
      width:220px; min-width:220px; max-width:220px;
    }

    .header-text{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      max-width:100%;
    }

    .header-text h1{
      color:#fff;
      margin:0;
      font-size:30px;
      font-weight:900;
      line-height:1.45;
      text-shadow:0 2px 8px rgba(0,0,0,.7);
    }

    .header-text p{
      color:#fff;
      margin:0;
      font-size:18px;
      font-weight:900;
      line-height:1.5;
      text-shadow:0 2px 8px rgba(0,0,0,.7);
    }

    .user-pill{
      margin-top:6px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:4px 16px;
      border-radius:999px;
      background:rgba(128,0,32,0.4);
      border:1px solid rgba(231,76,60,0.45);
      color:#fff;
      font-weight:900;
      font-size:13px;
      box-shadow:0 4px 12px rgba(231,76,60,.25);
      max-width:100%;
      word-break:break-word;
    }

    .wrap{
      padding:0 5% 30px;
      display:flex;
      justify-content:center;
      position:relative;
      margin-top:-40px;
    }

    .panel{
      width:100%;
      max-width:1300px;
      margin-top:13px;
      background:rgba(255,255,255,0.92);
      border-radius:var(--radius-lg);
      box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 6px 18px rgba(0,0,0,.06);
      position:relative;
      z-index:2;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      transition:transform var(--transition-med), box-shadow var(--transition-med);
      border:1px solid rgba(255,255,255,.65);
      overflow:hidden;
    }

    .panel:hover{
      transform:translateY(-3px);
      box-shadow:
        0 26px 60px rgba(0,0,0,.16),
        0 8px 22px rgba(0,0,0,.08);
    }

    .panel::before{
      content:"";
      position:absolute;
      top:0; left:0; right:0;
      height:60px;
      background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
      border-radius:var(--radius-lg) var(--radius-lg) 0 0;
      pointer-events:none;
    }

    .panel-head{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      background:linear-gradient(180deg, rgba(243,156,18,0.08), transparent);
    }

    .title{
      font-weight:900;
      color:var(--primary);
      display:flex;
      align-items:center;
      gap:10px;
      font-size:20px;
    }

    .head-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .section{
      padding:18px;
      border-bottom:1px solid var(--line);
    }

    .section-title{
      font-size:18px;
      font-weight:900;
      color:var(--primary);
      margin:0 0 14px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field label{
      font-weight:900;
      color:#1f2d3a;
      font-size:15px;
    }

    input{
      padding:12px;
      border-radius:var(--radius-sm);
      border:1.5px solid var(--line);
      font-family:'Cairo',sans-serif;
      font-weight:900;
      outline:none;
      background:#fff;
      transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
      color:#1f2d3a;
      min-height:46px;
      text-align:right;
      width:100%;
    }

    input:focus{
      border-color:#d8b15d;
      box-shadow:0 0 0 4px rgba(245,166,35,.12);
    }

    input::placeholder{
      color:#9aa6b2;
      font-weight:800;
    }

    .btn{
      padding:12px 14px;
      border:none;
      border-radius:var(--radius-sm);
      font-family:'Cairo',sans-serif;
      font-weight:900;
      font-size:17px;
      cursor:pointer;
      display:inline-flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      transition:transform var(--transition-fast), opacity var(--transition-fast), box-shadow var(--transition-fast);
      white-space:nowrap;
      position:relative;
      overflow:hidden;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      min-width:0;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      right:-120%;
      width:120%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,.18) 40%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.18) 60%,
        transparent 80%
      );
      transition:.65s;
    }

    .btn:hover::before{ right:120%; }
    .btn:hover{ transform:translateY(-1px); opacity:.96; }
    .btn:active{ transform:translateY(0); opacity:.9; }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; pointer-events:none; }

    .btn-primary{
      background:linear-gradient(180deg,#1e3c72,#162c52);
      color:#fff;
      box-shadow:0 10px 20px rgba(30,60,114,.20);
    }

    .btn-ok{
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      color:#fff;
      box-shadow:0 10px 20px rgba(39,174,96,.20);
    }

    .btn-warn{
      background:linear-gradient(180deg,#f39c12,#d68910);
      color:#fff;
      box-shadow:0 10px 20px rgba(243,156,18,.20);
    }

    .btn-danger{
      background:linear-gradient(180deg,#e74c3c,#c0392b);
      color:#fff;
      box-shadow:0 10px 20px rgba(231,76,60,.20);
    }

    .btn-ghost{
      background:#eef2f6;
      color:#1f2d3a;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pages-box{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      background:#fafbfc;
      padding:14px;
      border-radius:14px;
      border:1px solid #eef1f4;
      margin-top:10px;
    }

    .page-item{
      display:flex;
      align-items:center;
      gap:8px;
      background:#fff;
      border:1px solid #eef1f4;
      border-radius:10px;
      padding:10px 12px;
      font-weight:900;
      color:#223243;
    }

    .page-item input{
      min-height:auto;
      width:18px;
      height:18px;
      margin:0;
    }

    #status{
      padding:12px 18px;
      border-bottom:1px solid var(--line);
      font-weight:900;
      word-break:break-word;
      transition:color var(--transition-fast);
    }

    #status.ok{ color:#1d5e3b; }
    #status.bad{ color:var(--danger); }

    /* ===== SKELETON للجدول ===== */
    .skeleton-row td{
      padding:0 10px;
      height:52px;
    }

    .skeleton-cell{
      height:18px;
      border-radius:6px;
      background:linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%);
      background-size:200% 100%;
      animation:shimmer 1.4s infinite;
    }

    @keyframes shimmer{
      0%  { background-position:200% 0; }
      100%{ background-position:-200% 0; }
    }

    .table-wrap{
      overflow:auto;
    }

    th, td{
      border-bottom:1px solid #edf1f5;
      padding:12px 10px;
      text-align:center;
      vertical-align:middle;
      font-weight:900;
    }

    th{
      background:#fafbfc;
      color:var(--primary);
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:#fcfdff;
    }

    .pages-cell{
      text-align:right;
      line-height:1.7;
      font-size:13px;
      color:#334155;
      white-space:normal;
    }

    .action-cell{
      text-align:center;
      vertical-align:middle;
    }

    .action-box{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      flex-wrap:nowrap;
    }

    .empty{
      padding:26px 18px;
      text-align:center;
      font-weight:900;
      color:var(--muted);
    }

    #toast{
      position:fixed;
      bottom:22px;
      left:50%;
      transform:translateX(-50%) translateY(0);
      min-width:240px;
      max-width:90%;
      background:#223243;
      color:#fff;
      padding:12px 20px;
      border-radius:var(--radius-md);
      font-weight:900;
      font-family:'Cairo',sans-serif;
      font-size:14px;
      display:none;
      z-index:99999;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.28);
      animation:toastIn .25s ease;
    }

    @keyframes toastIn{
      from{ transform:translateX(-50%) translateY(20px); opacity:0; }
      to  { transform:translateX(-50%) translateY(0);   opacity:1; }
    }

    #toast.ok  { background:#27ae60; }
    #toast.warn{ background:#f39c12; }
    #toast.err { background:#e74c3c; }

    .confirm-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:100000;
      padding:20px;
    }

    .confirm-box{
      width:100%;
      max-width:460px;
      background:#fff;
      border-radius:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
      overflow:hidden;
      border:1px solid #eef1f4;
      animation:popIn .18s ease-out;
    }

    .confirm-head{
      padding:16px 18px;
      background:linear-gradient(180deg, rgba(231,76,60,.08), transparent);
      border-bottom:1px solid #eef1f4;
      font-weight:900;
      color:#223243;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
    }

    .confirm-body{
      padding:18px;
      font-weight:900;
      color:#223243;
      line-height:1.8;
      text-align:center;
    }

    .confirm-actions{
      padding:0 18px 18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    @keyframes popIn{
      from{ transform:scale(.96); opacity:0; }
      to{ transform:scale(1); opacity:1; }
    }

    @media (max-width:1100px){
      .pages-box{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    }

    @media (max-width:820px){
      .company-header{ padding:34px 14px 48px; gap:12px; }
      .company-logo  { width:78px; height:78px; }
      .header-text h1{ font-size:22px; }
      .header-text p { font-size:14px; }
      .wrap{ padding:0 10px 20px; margin-top:-24px; }
      .panel{ border-radius:18px; }
      .panel-head{ padding:14px; }
    }

    @media (max-width:800px){
      .grid{ grid-template-columns:1fr; }
    }

    @media (max-width:700px){
      .pages-box{ grid-template-columns:1fr; }
      .btn-row, .head-actions{ flex-direction:column; }
      .btn{ width:100%; }
    }

    @media (max-width:480px){
      .company-header{ padding:28px 12px 42px; }
      .company-logo  { width:68px; height:68px; }
      .header-text h1{ font-size:19px; }
      .header-text p { font-size:13px; }
      .user-pill     { font-size:12px; padding:6px 12px; }
      .wrap          { padding:0 8px 16px; margin-top:-18px; }
    }
  </style>
</head>

<body>

<div id="pageWrap" class="loading">
  <header class="company-header">
    <img src="https://siei-tracking.github.io/system/logo.png" class="company-logo" alt="logo">
    <div class="header-text">
      <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
      <p><i class="fas fa-user-shield"></i> إدارة المستخدمين والصلاحيات</p>
      <div id="welcomeUser" class="user-pill"></div>
    </div>
  </header>

  <div class="wrap">
    <div class="panel">

      <div class="panel-head">
        <div class="title"><i class="fas fa-users-cog"></i> لوحة إدارة المخولين</div>

        <div class="head-actions">
          <button class="btn btn-primary" id="btnBackMain" type="button">
            <i class="fas fa-arrow-right"></i> العودة إلى الرئيسية
          </button>
        </div>
      </div>

      <div id="status" class="ok">جاري التحقق من الجلسة...</div>

      <div class="section">
        <h3 class="section-title"><i class="fas fa-user-plus"></i> إضافة / تعديل مستخدم</h3>

        <div class="grid">
          <div class="field">
            <label for="username">اسم المستخدم</label>
            <input id="username" type="text" placeholder="مثال: user1">
          </div>

          <div class="field">
            <label for="pass">كلمة المرور</label>
            <input id="pass" type="text" placeholder="مثال: 1234">
          </div>

          <div class="field">
            <label for="name">الاسم</label>
            <input id="name" type="text" placeholder="اسم المستخدم الظاهر">
          </div>
        </div>

        <div style="margin-top:14px;">
          <label style="font-weight:900;color:#1f2d3a;font-size:15px;">صلاحيات الصفحات</label>
          <div id="pagesBox" class="pages-box"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-ok" id="btnAdd" type="button">
            <i class="fas fa-user-plus"></i> إضافة مستخدم
          </button>

          <button class="btn btn-primary" id="btnUpdate" type="button">
            <i class="fas fa-pen-to-square"></i> تحديث مستخدم
          </button>

          <button class="btn btn-danger" id="btnDelete" type="button">
            <i class="fas fa-trash"></i> حذف مستخدم
          </button>

          <button class="btn btn-warn" id="btnClear" type="button">
            <i class="fas fa-broom"></i> مسح الحقول
          </button>
        </div>
      </div>

      <div class="section">
        <h3 class="section-title"><i class="fas fa-table-list"></i> قائمة المستخدمين</h3>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>اسم المستخدم</th>
                <th>كلمة المرور</th>
                <th>الاسم</th>
                <th>الصفحات</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="5" class="empty">جاري التحميل...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<div id="confirmOverlay" class="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-head">
      <i class="fas fa-triangle-exclamation"></i>
      <span>تأكيد الحذف</span>
    </div>
    <div class="confirm-body" id="confirmMessage">
      هل أنت متأكد؟
    </div>
    <div class="confirm-actions">
      <button class="btn btn-danger" id="confirmOkBtn" type="button">
        <i class="fas fa-trash"></i> نعم، حذف
      </button>
      <button class="btn btn-ghost" id="confirmCancelBtn" type="button">
        <i class="fas fa-xmark"></i> إلغاء
      </button>
    </div>
  </div>
</div>

<script>
  const API_BASE = "https://script.google.com/macros/s/AKfycbyw1SENEE0xPDkIP_8qCcwtza1aR6L8gDZThNVEVW3vv2B6ePQYfiFAOmmI2tX7Xwwm/exec";
  const PAGE_NAME = "admin";
  const STORAGE_KEY_PAGE   = "tracking_session_token_" + PAGE_NAME;
  const STORAGE_KEY_GLOBAL = "tracking_session_token";
  const SESSION_CACHE_KEY  = "tracking_session_cache_" + PAGE_NAME;

  let ALL_PAGES_CACHE  = [];
  let USERS_CACHE      = [];
  let confirmCallback  = null;
  let CURRENT_USER_NAME = "";
  let CURRENT_USERNAME  = "";
  let CURRENT_USER_ROLE = "";
  let sessionFailCount  = 0;
  let liveSessionInterval = null;   // لحفظ الـ interval وإلغائه عند الخروج
  let isLoadingData = false;        // debounce: منع طلبات متوازية
  const MAX_SESSION_FAILS = 3;

  /* ============================================================
   * SESSION HELPERS
   * ============================================================ */
  function getSessionToken(){
    return (
      sessionStorage.getItem(STORAGE_KEY_PAGE)   ||
      sessionStorage.getItem(STORAGE_KEY_GLOBAL) ||
      localStorage.getItem(STORAGE_KEY_PAGE)     ||
      localStorage.getItem(STORAGE_KEY_GLOBAL)   ||
      ""
    );
  }

  function setSessionToken(token){
    if(!token) return;
    sessionStorage.setItem(STORAGE_KEY_PAGE,   token);
    sessionStorage.setItem(STORAGE_KEY_GLOBAL, token);
    localStorage.setItem(STORAGE_KEY_PAGE,     token);
    localStorage.setItem(STORAGE_KEY_GLOBAL,   token);
  }

  function clearSessionToken(){
    [STORAGE_KEY_PAGE, STORAGE_KEY_GLOBAL, SESSION_CACHE_KEY].forEach(function(k){
      sessionStorage.removeItem(k);
      localStorage.removeItem(k);
    });
  }

  function goToLogin(){
    clearSessionToken();
    if(liveSessionInterval){ clearInterval(liveSessionInterval); liveSessionInterval = null; }
    window.location.href = "login.html?p=" + encodeURIComponent(PAGE_NAME);
  }

  function isAdminUser(){
    if(CURRENT_USER_ROLE === "admin") return true;
    return String(CURRENT_USERNAME || "").trim().toLowerCase() === "admin";
  }

  /* ============================================================
   * API — مع تحقق من HTTP status
   * ============================================================ */
  async function apiPost(payload){
    const response = await fetch(API_BASE, {
      method:  "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body:    JSON.stringify(payload)
    });
    if(!response.ok){
      throw new Error("HTTP " + response.status + ": " + response.statusText);
    }
    const text = await response.text();
    try{
      return JSON.parse(text);
    }catch(err){
      throw new Error(text || "Invalid JSON response");
    }
  }

  /* ============================================================
   * SESSION CHECK — مثل main.html مع cache
   * ============================================================ */
  function applySessionUI(userName){
    document.getElementById("welcomeUser").innerHTML =
      '<i class="fas fa-user-shield"></i> المستخدم: ' + escapeHtml(userName);
    document.getElementById("pageWrap").classList.remove("loading");
  }

  async function ensurePageSession(){
    const token = getSessionToken();
    if(!token){ goToLogin(); return; }

    /* ── محاولة عرض الصفحة فوراً من الـ cache (أقل من 10 دقائق) ── */
    let usedCache = false;
    try{
      const raw = sessionStorage.getItem(SESSION_CACHE_KEY) || localStorage.getItem(SESSION_CACHE_KEY);
      if(raw){
        const cached = JSON.parse(raw);
        if(cached && cached.token === token && (Date.now() - (cached.ts || 0)) < 600000){
          CURRENT_USER_NAME = cached.userName || "مخول غير معروف";
          CURRENT_USERNAME  = cached.username || "";
          CURRENT_USER_ROLE = cached.role     || (isAdminUser() ? "admin" : "user");
          applySessionUI(CURRENT_USER_NAME);
          usedCache = true;
          if(!isAdminUser()){
            setStatus("❌ هذه الصفحة متاحة لمدير النظام فقط", false);
            showMsg("❌ غير مصرح", "err");
            disablePanel();
            return;
          }
          /* تحميل بالتوازي من الـ cache */
          await Promise.all([ loadAllPages(), loadUsers() ]);
        }
      }
    }catch(e){}

    /* ── تحقق من السيرفر في الخلفية ── */
    try{
      const result = await apiPost({ action:"checkSession", token, page:PAGE_NAME });

      if(result && result.ok){
        setSessionToken(token);
        sessionFailCount = 0;

        CURRENT_USER_NAME = result.user || result.userName || "مخول غير معروف";
        CURRENT_USERNAME  = result.username || "";
        CURRENT_USER_ROLE = (result.role === "admin" || String(CURRENT_USERNAME).trim().toLowerCase() === "admin") ? "admin" : "user";

        /* حفظ في الـ cache */
        try{
          const cd = JSON.stringify({ token, userName:CURRENT_USER_NAME, username:CURRENT_USERNAME, role:CURRENT_USER_ROLE, ts:Date.now() });
          sessionStorage.setItem(SESSION_CACHE_KEY, cd);
          localStorage.setItem(SESSION_CACHE_KEY, cd);
        }catch(e){}

        applySessionUI(CURRENT_USER_NAME);

        if(!isAdminUser()){
          setStatus("❌ هذه الصفحة متاحة لمدير النظام فقط", false);
          showMsg("❌ غير مصرح", "err");
          disablePanel();
          return;
        }

        if(!usedCache){
          /* تحميل بالتوازي */
          await Promise.all([ loadAllPages(), loadUsers() ]);
        }
      }else{
        try{ sessionStorage.removeItem(SESSION_CACHE_KEY); localStorage.removeItem(SESSION_CACHE_KEY); }catch(e){}
        if(!usedCache) goToLogin();
        else{ showMsg("⚠️ انتهت الجلسة، سيتم تسجيل الخروج...", "warn"); setTimeout(goToLogin, 2000); }
      }
    }catch(error){
      if(!usedCache){
        showMsg("❌ تعذر التحقق من الجلسة", "err");
        setTimeout(goToLogin, 900);
      }else{
        console.warn("Session check failed (using cache):", error);
      }
    }
  }

  /* فحص دوري للجلسة مع tolerance للانقطاع */
  async function checkLiveSession(){
    const token = getSessionToken();
    if(!token){ goToLogin(); return; }
    try{
      const res = await apiPost({ action:"checkSession", token, page:PAGE_NAME });
      if(!res || !res.ok){
        sessionFailCount++;
        if(sessionFailCount >= MAX_SESSION_FAILS) goToLogin();
      }else{
        sessionFailCount = 0;
      }
    }catch(e){
      sessionFailCount++;
      if(sessionFailCount >= MAX_SESSION_FAILS) goToLogin();
    }
  }

  function disablePanel(){
    const panel = document.querySelector(".panel");
    if(panel){ panel.style.pointerEvents = "none"; panel.style.opacity = "0.6"; }
  }

  /* ============================================================
   * UI HELPERS
   * ============================================================ */
  function safeErr(err){
    try{
      if(!err) return "Unknown error";
      if(typeof err === "string") return err;
      if(err.message) return err.message;
      return JSON.stringify(err);
    }catch(e){ return String(err); }
  }

  function showMsg(text, type){
    const t = document.getElementById("toast");
    t.className = type === "ok" ? "ok" : type === "warn" ? "warn" : type === "err" ? "err" : "";
    t.textContent = text || "";
    t.style.display = "block";
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){ t.style.display = "none"; }, 3000);
  }

  function setStatus(msg, ok){
    const el = document.getElementById("status");
    el.className = ok ? "ok" : "bad";
    el.textContent = msg;
  }

  function setLoading(on){
    isLoadingData = on;
    ["btnAdd","btnUpdate","btnDelete","btnClear","btnBackMain","username","pass","name"]
      .forEach(function(id){
        const el = document.getElementById(id);
        if(el) el.disabled = on;
      });
    document.querySelectorAll('#pagesBox input[type="checkbox"]')
      .forEach(function(ch){ ch.disabled = on; });
    if(on) setStatus("جاري التنفيذ...", true);
  }

  function escapeHtml(text){
    return String(text == null ? "" : text)
      .replace(/&/g,  "&amp;")
      .replace(/</g,  "&lt;")
      .replace(/>/g,  "&gt;")
      .replace(/"/g,  "&quot;")
      .replace(/'/g,  "&#39;");
  }

  function normalizeName(name){
    return String(name || "").trim().replace(/\s+/g," ").toLowerCase();
  }

  function normalizeUsername(username){
    return String(username || "").trim().toLowerCase();
  }

  /* ============================================================
   * FORM HELPERS
   * ============================================================ */
  function getCheckedPages(){
    const arr = [];
    document.querySelectorAll('#pagesBox input[type="checkbox"]:checked')
      .forEach(function(ch){ arr.push(String(ch.value || "").trim()); });
    return arr;
  }

  function setCheckedPages(pagesValue){
    const pages = Array.isArray(pagesValue)
      ? pagesValue.map(function(p){ return String(p||"").trim().toLowerCase(); })
      : String(pagesValue||"").split(",")
          .map(function(p){ return String(p||"").trim().toLowerCase(); })
          .filter(function(p){ return !!p && p !== "admin"; });

    document.querySelectorAll('#pagesBox input[type="checkbox"]')
      .forEach(function(ch){
        ch.checked = pages.indexOf(String(ch.value||"").trim().toLowerCase()) !== -1;
      });
  }

  function clearForm(silent){
    document.getElementById("username").value = "";
    document.getElementById("pass").value     = "";
    document.getElementById("name").value     = "";
    document.querySelectorAll('#pagesBox input[type="checkbox"]')
      .forEach(function(ch){ ch.checked = false; });
    if(!silent) setStatus("تم مسح الحقول", true);
  }

  function isDuplicateName(name, currentUsername){
    const target  = normalizeName(name);
    const current = normalizeUsername(currentUsername);
    return USERS_CACHE.some(function(u){
      return normalizeName(u.name) === target && normalizeUsername(u.username) !== current;
    });
  }

  /* ============================================================
   * RENDER
   * ============================================================ */
function renderPages(pages){
  ALL_PAGES_CACHE = Array.isArray(pages) ? pages.slice() : [];
  const box = document.getElementById("pagesBox");
  box.innerHTML = "";

  if(!ALL_PAGES_CACHE.length){
    box.innerHTML = '<div class="empty">لا توجد صفحات</div>';
    return;
  }

  // 🔥 هنا مرة واحدة فقط
  const PAGE_NAMES = {
    main: "الرئيسية",
    plan: " أصدار أمر العمل و التسعيرة",
    finance: "التسديد",
    lab1: "قسم المختبرات",
    workshop: "القسم الهندسي / الورشة",
    elev: "قسم المصاعد",
    testresults: "نتائج الفحص",
    results: "تسليم النتائج",
    barcode: "الباركود",
    official: "الكتاب الرسمي",
    email: "الإيميل"
  };

  ALL_PAGES_CACHE.forEach(function(p){
    const page  = String(p || "").trim();
    const lower = page.toLowerCase();

    if(lower === "index" || lower === "login" || lower === "admin") return;

    const displayName = PAGE_NAMES[page] || page;

    const item = document.createElement("label");
    item.className = "page-item";
    item.innerHTML =
      '<input type="checkbox" value="' + escapeHtml(page) + '">' +
      '<span>' + escapeHtml(displayName) + '</span>';

    box.appendChild(item);
  });
}

  /* skeleton للجدول أثناء التحميل */
  function showTableSkeleton(){
    let html = "";
    for(let i = 0; i < 4; i++){
      html += '<tr class="skeleton-row">';
      for(let c = 0; c < 5; c++) html += '<td><div class="skeleton-cell"></div></td>';
      html += '</tr>';
    }
    document.getElementById("usersBody").innerHTML = html;
  }

function renderUsersTable(list){
  USERS_CACHE = Array.isArray(list) ? list.slice() : [];
  const body  = document.getElementById("usersBody");

  if(!USERS_CACHE.length){
    body.innerHTML = '<tr><td colspan="5" class="empty">لا توجد بيانات</td></tr>';
    return;
  }

  // 🔥 تعريف أسماء الصفحات مرة واحدة
  const PAGE_NAMES = {
    main: "الرئيسية",
    plan: "أصدار أمر العمل و التسعيرة",
    finance: "التسديد",
    lab1: "قسم المختبرات",
    workshop: "القسم الهندسي / الورشة",
    elev: "قسم المصاعد",
    testresults: "نتائج الفحص",
    results: "تسليم النتائج",
    barcode: "الباركود",
    official: "الكتاب الرسمي",
    email: "الإيميل"
  };

  let html = "";

  USERS_CACHE.forEach(function(u){
    const username = escapeHtml(String(u.username || "").trim());
    const pass     = escapeHtml(String(u.password || "").trim());
    const name     = escapeHtml(String(u.name     || "").trim());

    let pagesArr = Array.isArray(u.pages)
      ? u.pages
      : String(u.pages || "").split(" , ");

    pagesArr = pagesArr
      .map(function(p){ return String(p||"").trim(); })
      .filter(function(p){
        const lower = p.toLowerCase();
        return p && lower !== "admin" && lower !== "login";
      });

    // 🔥 تحويل أسماء الصفحات إلى عربي
    const pages = escapeHtml(
      pagesArr.map(function(p){
        return PAGE_NAMES[p] || p;
      }).join(", ") || "—"
    );

    html += '<tr>';

    html += '<td>' + username + '</td>';

    // 👁️ زر إظهار الباسورد
    html += '<td>' +
      '<span class="pass-text">••••••</span> ' +
      '<button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="togglePass(this, \'' + pass + '\')">👁️</button>' +
    '</td>';

    html += '<td>' + name + '</td>';

    html += '<td class="pages-cell">' + pages + '</td>';

    html += '<td class="action-cell"><div class="action-box">';
    html += '<button class="btn btn-primary btn-fill-user" type="button" data-username="' + username + '"><i class="fas fa-pen"></i> تعبئة</button>';
    html += '<button class="btn btn-danger btn-remove-user" type="button" data-username="' + username + '"><i class="fas fa-trash"></i> حذف</button>';
    html += '</div></td>';

    html += '</tr>';
  });

  body.innerHTML = html;
}
  /* ============================================================
   * CONFIRM BOX
   * ============================================================ */
  function showConfirmBox(message, onConfirm){
    document.getElementById("confirmMessage").textContent = message || "هل أنت متأكد؟";
    confirmCallback = onConfirm || null;
    document.getElementById("confirmOverlay").style.display = "flex";
  }

  function closeConfirmBox(){
    document.getElementById("confirmOverlay").style.display = "none";
    confirmCallback = null;
  }

  /* ============================================================
   * LOAD FUNCTIONS
   * ============================================================ */
  async function loadAllPages(){
    const token = getSessionToken();
    if(!token) return;
    try{
      const res = await apiPost({ action:"getAllPages", token, page:PAGE_NAME });
      let pages = [];
      if(Array.isArray(res))             pages = res;
      else if(Array.isArray(res && res.items)) pages = res.items;
      else if(Array.isArray(res && res.pages)) pages = res.pages;
      renderPages(pages);
    }catch(err){
      setStatus("❌ فشل تحميل الصفحات: " + safeErr(err), false);
      showMsg("❌ فشل تحميل الصفحات", "err");
    }
  }

  async function loadUsers(){
    const token = getSessionToken();
    if(!token){ goToLogin(); return; }
    showTableSkeleton();
    setLoading(true);
    try{
      const list = await apiPost({ action:"getUsersList", token, page:PAGE_NAME });
      setLoading(false);
      if(list && list.ok === false){
        setStatus("❌ " + (list.message || "فشل تحميل المستخدمين"), false);
        showMsg("❌ فشل تحميل المستخدمين", "err");
        return;
      }
      renderUsersTable(Array.isArray(list) ? list : []);
      setStatus("✅ تم تحميل المستخدمين (" + (Array.isArray(list) ? list.length : 0) + ")", true);
    }catch(err){
      setLoading(false);
      setStatus("❌ فشل تحميل المستخدمين: " + safeErr(err), false);
      showMsg("❌ فشل تحميل المستخدمين", "err");
    }
  }

  /* ============================================================
   * CRUD — استخراج validateForm لتفادي التكرار
   * ============================================================ */
  function validateForm(){
    const username = String(document.getElementById("username").value || "").trim();
    const pass     = String(document.getElementById("pass").value     || "").trim();
    const name     = String(document.getElementById("name").value     || "").trim();
    const pages    = getCheckedPages();
    if(!username || !pass || !name){
      setStatus("⚠️ أكمل الحقول المطلوبة", false);
      showMsg("⚠️ أكمل الحقول", "warn");
      return null;
    }
    if(!pages.length){
      setStatus("⚠️ اختر صفحة واحدة على الأقل", false);
      showMsg("⚠️ اختر صفحة واحدة على الأقل", "warn");
      return null;
    }
    return { username, pass, name, pages };
  }

  /* دالة مشتركة لمعالجة نتيجة CRUD */
  function handleSessionExpiry(text){
    if(
      text.indexOf("انتهت الجلسة") !== -1 ||
      text.indexOf("غير صالح")     !== -1 ||
      text.indexOf("غير مصرح")     !== -1
    ){
      showMsg("❌ انتهت الجلسة", "err");
      setTimeout(function(){ clearSessionToken(); goToLogin(); }, 800);
      return true;
    }
    return false;
  }

  async function addUser(){
    if(isLoadingData) return;
    const token = getSessionToken();
    if(!token){ goToLogin(); return; }
    const form = validateForm();
    if(!form) return;
    if(isDuplicateName(form.name, "")){
      setStatus("❌ الاسم موجود مسبقاً", false);
      showMsg("❌ لا يسمح بتكرار الاسم", "err");
      return;
    }
    setLoading(true);
    try{
      const msg  = await apiPost({ action:"saveUserToSheet", token, page:PAGE_NAME, data:{ username:form.username, password:form.pass, name:form.name, pages:form.pages } });
      const text = typeof msg === "string" ? msg : String((msg && (msg.message || msg.result)) || "");
      setLoading(false);
      if(handleSessionExpiry(text)) return;
      if(text.indexOf("✅") !== -1){
        showMsg(text, "ok"); clearForm(true); await loadUsers(); setStatus(text, true);
      }else{
        showMsg(text || "تعذر الإضافة", "warn"); setStatus(text || "تعذر الإضافة", false);
      }
    }catch(err){
      setLoading(false);
      setStatus("❌ خطأ: " + safeErr(err), false);
      showMsg("❌ فشل الإضافة", "err");
    }
  }

  async function updateUser(){
    if(isLoadingData) return;
    const token = getSessionToken();
    if(!token){ goToLogin(); return; }
    const form = validateForm();
    if(!form) return;
    if(isDuplicateName(form.name, form.username)){
      setStatus("❌ الاسم موجود مسبقاً", false);
      showMsg("❌ لا يسمح بتكرار الاسم", "err");
      return;
    }
    setLoading(true);
    try{
      const msg  = await apiPost({ action:"updateUserInSheet", token, page:PAGE_NAME, data:{ username:form.username, password:form.pass, name:form.name, pages:form.pages } });
      const text = typeof msg === "string" ? msg : String((msg && (msg.message || msg.result)) || "");
      setLoading(false);
      if(handleSessionExpiry(text)) return;
      if(text.indexOf("✅") !== -1){
        showMsg(text, "ok"); clearForm(true); await loadUsers(); setStatus(text, true);
      }else{
        showMsg(text || "تعذر التحديث", "warn"); setStatus(text || "تعذر التحديث", false);
      }
    }catch(err){
      setLoading(false);
      setStatus("❌ خطأ: " + safeErr(err), false);
      showMsg("❌ فشل التحديث", "err");
    }
  }

  function removeUser(username){
    const u = String(username || document.getElementById("username").value || "").trim();
    if(!u){
      setStatus("⚠️ أدخل اسم المستخدم أو اختر مستخدمًا", false);
      showMsg("⚠️ لا يوجد اسم مستخدم", "warn");
      return;
    }
    showConfirmBox("هل أنت متأكد من حذف المستخدم " + u + " ؟", async function(){
      const token = getSessionToken();
      if(!token){ goToLogin(); return; }
      setLoading(true);
      try{
        const msg  = await apiPost({ action:"deleteUserFromSheet", token, page:PAGE_NAME, username:u });
        const text = typeof msg === "string" ? msg : String((msg && (msg.message || msg.result)) || "");
        setLoading(false);
        if(handleSessionExpiry(text)) return;
        if(text.includes("✅")){
          showMsg(text, "ok"); clearForm(true); await loadUsers(); setStatus(text, true);
        }else{
          showMsg(text || "تعذر الحذف", "warn"); setStatus(text || "تعذر الحذف", false);
        }
      }catch(err){
        setLoading(false);
        setStatus("❌ خطأ: " + safeErr(err), false);
        showMsg("❌ فشل الحذف", "err");
      }
    });
  }

  function fillUserByUsername(username){
    const u = String(username || "").trim();
    if(!u) return;
    const user = USERS_CACHE.find(function(item){ return String(item.username||"").trim() === u; });
    if(!user){ showMsg("⚠️ المستخدم غير موجود في القائمة الحالية", "warn"); return; }
    document.getElementById("username").value = String(user.username || "");
    document.getElementById("pass").value     = String(user.password || "");
    document.getElementById("name").value     = String(user.name     || "");
    setCheckedPages(user.pages || "");
    window.scrollTo({ top:0, behavior:"smooth" });
    setStatus("تمت تعبئة بيانات المستخدم: " + escapeHtml(user.name || u), true);
  }

function togglePass(btn, realPass){
  const span = btn.previousElementSibling;

  if(span.textContent === "••••••"){
    span.textContent = realPass;
  } else {
    span.textContent = "••••••";
  }
}

  function goToMain(){
    const token = getSessionToken();
    if(token){
      sessionStorage.setItem("tracking_session_token_main", token);
      sessionStorage.setItem("tracking_session_token", token);
      localStorage.setItem("tracking_session_token_main", token);
      localStorage.setItem("tracking_session_token", token);
    }
    window.location.href = "main.html";
  }

  /* ============================================================
   * EVENT LISTENERS
   * ============================================================ */
  window.addEventListener("load", function(){

    /* Table delegation */
    document.getElementById("usersBody").addEventListener("click", function(e){
      const fillBtn   = e.target.closest(".btn-fill-user");
      const removeBtn = e.target.closest(".btn-remove-user");
      if(fillBtn)   fillUserByUsername(fillBtn.getAttribute("data-username"));
      if(removeBtn) removeUser(removeBtn.getAttribute("data-username"));
    });

    document.getElementById("btnAdd").addEventListener("click",         addUser);
    document.getElementById("btnUpdate").addEventListener("click",      updateUser);
    document.getElementById("btnDelete").addEventListener("click",      function(){ removeUser(); });
    document.getElementById("btnClear").addEventListener("click",       function(){ clearForm(false); });
    document.getElementById("btnBackMain").addEventListener("click",    goToMain);

    document.getElementById("confirmOkBtn").addEventListener("click", function(){
      const cb = confirmCallback;
      closeConfirmBox();
      if(typeof cb === "function") cb();
    });
    document.getElementById("confirmCancelBtn").addEventListener("click", closeConfirmBox);
    document.getElementById("confirmOverlay").addEventListener("click", function(e){
      if(e.target === this) closeConfirmBox();
    });

    /* بدء التطبيق */
    ensurePageSession();
    liveSessionInterval = setInterval(checkLiveSession, 10000);
  });
</script>
