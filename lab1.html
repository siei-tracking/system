<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="watermark.css">
  <title>االمختبرات - منصة تتبع أوامر العمل</title>

<link rel="icon" href="https://siei-tracking.github.io/system/logo.png">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <title>المختبرات - منصة تتبع أوامر العمل</title>

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.88);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --disabled:#bdc3c7;
      --warn:#f39c12;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
        var(--bg);
      color:#111;
    }

    #pageWrap{
      display:none;
    }
    #pageWrap.show{
      display:block;
    }

    .company-header{
      background-image:
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
        url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');
      background-size:cover;
      background-position:center;
      padding:28px 5% 60px;
      display:flex;
      align-items:center;
      gap:16px;
      color:#fff;
      flex-wrap:wrap;
      justify-content:center;
      text-align:center;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .logo{
      width:100px;
      height:100px;
      background:#fff;
      border-radius:50%;
      padding:5px;
      object-fit:contain;
      display:block;
      flex-shrink:0;
      box-shadow:
      -1px -1px 0 rgba(0,0,0,0.1),
       1px -1px 0 rgba(0,0,0,0.1),
      -1px  1px 0 rgba(0,0,0,0.1),
       1px  1px 0 rgba(0,0,0,0.1),
      0 1px 4px rgba(0,0,0,0.1) !important;
    }

    .header-text{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .header-text h1{
      color:#fff !important;
      margin:0;
      font-size:30px !important;
      font-weight:900 !important;
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .header-text p{
      color:#fff !important;
      margin:0;
      font-size:18px !important;
      font-weight:900 !important;
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .user-pill{
      margin-top:6px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:2px 14px;
      border-radius:999px;
      background:rgba(128,0,32,0.4);
      border:1px solid rgba(231,76,60,0.45);
      color:#fff;
      font-weight:900;
      font-size:13px;
      box-shadow:0 4px 12px rgba(231,76,60,.25);
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .main-content{
      padding:0 5% 30px;
      display:flex;
      justify-content:center;
      position:relative;
      margin-top:-40px;
      flex-direction:column;
      align-items:center;
    }

    .card{
      width:100%;
      max-width:820px;
      background:rgba(255,255,255,0.88);
      border-radius:22px;
      padding:10px 12px;
      box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 6px 18px rgba(0,0,0,.06);
      position:relative;
      z-index:2;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition:.25s;
      border:1px solid rgba(255,255,255,.65);
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:
        0 26px 60px rgba(0,0,0,.16),
        0 8px 22px rgba(0,0,0,.08);
    }

    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:60px;
      background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
      border-radius:22px 22px 0 0;
      pointer-events:none;
    }

    .input-group{
      margin-bottom:10px;
      text-align:right;
      position:relative;
      z-index:2;
    }

    label{
      display:block;
      margin-bottom:4px;
      font-weight:900;
      font-size:15px;
      color:#253444;
    }

    input{
      width:100%;
      border:1.5px solid var(--line);
      border-radius:10px;
      padding:7px 10px;
      font-weight:800;
      font-size:14px;
      background:#fff;
      text-align:center;
      font-family:'Cairo',sans-serif;
      color:#1f2d3a;
      outline:none;
      transition:.2s;
    }

    input:focus{
      border-color:#d8b15d;
      box-shadow:0 0 0 4px rgba(245,166,35,.10);
    }

    input::placeholder{
      color:#9aa6b2;
      font-weight:800;
    }

    .main-btn,
    .again{
      position:relative;
      overflow:hidden;
    }

    .main-btn::before,
    .again::before{
      content:"";
      position:absolute;
      top:0;
      right:-120%;
      width:120%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,.18) 40%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.18) 60%,
        transparent 80%
      );
      transition:.65s;
    }

    .main-btn:hover::before,
    .again:hover::before{
      right:120%;
    }

    .main-btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:9px 10px;
      background:var(--primary);
      color:#fff;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      font-family:'Cairo',sans-serif;
      box-shadow:0 10px 20px rgba(245,166,35,.20);
      transition:.2s;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      z-index:2;
    }

    .main-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.02);
    }

    .main-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-success{
      background:linear-gradient(180deg,#2ebf68,#26a65b) !important;
      box-shadow:0 10px 20px rgba(39,174,96,.20);
    }

    .btn-disabled{
      background:var(--disabled) !important;
      box-shadow:none !important;
    }

    #loader{
      display:none;
      text-align:center;
      margin:12px 0;
      color:var(--primary);
      font-weight:900;
      position:relative;
      z-index:2;
    }

    #resPanel{
      display:none;
      margin-top:10px;
      padding:10px;
      background:#f8f9fa;
      border-radius:12px;
      border-right:5px solid var(--ok);
      position:relative;
      z-index:2;
    }

    .hint-box{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      background:#f6f8fa;
      border:1px solid #eef1f4;
      font-weight:900;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
    }

    .hint-chip{
      padding:7px 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid #eef1f4;
      display:inline-flex;
      gap:8px;
      align-items:center;
    }

    .muted{
      color:var(--muted);
      font-weight:900;
    }

    .success{
      display:none;
      text-align:center;
      padding:34px 18px;
    }

    .success i{
      font-size:74px;
      color:var(--ok);
      margin-bottom:12px;
    }

    .success h2{
      margin:0 0 10px;
      font-weight:900;
      color:#1f2b36;
      font-size:24px;
    }

    .success p{
      margin:0 0 18px;
      color:var(--muted);
      font-weight:800;
      font-size:18px;
    }

    .again{
      border:none;
      border-radius:16px;
      padding:18px 20px;
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      color:#fff;
      font-family:'Cairo';
      font-weight:900;
      font-size:20px;
      cursor:pointer;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      width:60%;
      max-width:420px;
      margin:25px auto 0;
      text-align:center;
      box-shadow:0 10px 20px rgba(39,174,96,.20);
    }

    .again:hover{
      transform:translateY(-2px);
      opacity:.95;
    }

    .again i{
      font-size:18px;
    }

    #toast{
      position:fixed;
      bottom:22px;
      left:50%;
      transform:translateX(-50%);
      min-width:240px;
      max-width:90%;
      background:#223243;
      color:#fff;
      padding:12px 18px;
      border-radius:12px;
      font-weight:900;
      font-family:'Cairo',sans-serif;
      font-size:14px;
      display:none;
      z-index:99999;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,.22);
    }

    #toast.ok{ background:#27ae60; }
    #toast.warn{ background:#f39c12; }
    #toast.err{ background:#e74c3c; }

    @media (max-width:820px){
      .header-text h1{ font-size:24px; }
      .header-text p{ font-size:15px; }
      .card{ padding:10px; }
      .again{ width:100%; }
    }

    #orderID{
      font-size:20px;
      font-weight:600;
      color:#000;
      text-align:center;
      height:40px;
      width:100%;
    }

    #orderID::placeholder{
      height:40px;
      width:100%;
      font-size:16px;
      font-weight:600;
      color:#999;
      opacity:1;
    }
  </style>
</head>

<body>
<div id="pageWrap">
  <div class="page-shell">
    <div class="container">

      <header class="company-header">
        <img class="logo" src="https://drive.google.com/thumbnail?id=1NN7G2zhk7nhgXuPWGW4qE_pdGC-Ptjkt&sz=w500" alt="logo">

        <div class="header-text">
          <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>

          <p>
            <i class="fas fa-microscope"></i>
            منصة تتبع اوامر العمل - المختبرات
          </p>

          <div id="welcomeUser" class="user-pill"></div>
        </div>
      </header>

      <div class="page-content">
        <main class="main-content">

          <div class="card" id="cardForm">
            <div id="inputForm">

              <div class="input-group">
                <label><i class="fas fa-barcode"></i> رقم أمر العمل الموحد</label>
                <input type="text" id="orderID" placeholder="أدخل الرقم...">
              </div>

              <button class="main-btn" id="fetchBtn" type="button" onclick="fetchLabData()">
                <i class="fas fa-search"></i>
                جلب بيانات المعاملة
              </button>

              <div id="loader">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p style="font-weight:900;margin:10px 0 0;">جاري البحث...</p>
              </div>

              <div id="resPanel">
                <div class="input-group">
                  <label><i class="fas fa-building"></i> الجهة المستفيدة:</label>
                  <div id="cName" style="font-size:20px;font-weight:900;color:var(--primary);"></div>
                </div>

                <div class="hint-box" id="hintBox" style="display:none;">
                  <span class="hint-chip">
                    <i class="fas fa-flask"></i>
                    <span class="muted">نوع الفحص:</span>
                    <span id="hintType"></span>
                  </span>

                  <span class="hint-chip">
                    <i class="fas fa-route"></i>
                    <span class="muted">التوجيه:</span>
                    <span id="hintPath"></span>
                  </span>
                </div>

                <button id="receiveBtn" class="main-btn btn-success" type="button" onclick="receiveOrder()">
                  <i class="fas fa-hand-holding-medical"></i>
                  تأكيد استلام المختبرات
                </button>
              </div>

            </div>
          </div>

          <div class="card success" id="successMessage">
            <i class="fas fa-check-circle"></i>
            <h2>تم الحفظ بنجاح</h2>
            <p id="detailsText">تم توثيق العملية في السجل الموحد.</p>
            <button class="again" type="button" onclick="resetPage()">
              <i class="fas fa-plus"></i>
              معاملة جديدة
            </button>
          </div>

        </main>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API_BASE = "https://script.google.com/macros/s/AKfycbwLt7PaCyUIuLMPOHqjmHzgeNbFfF95oe3dnWlBgjdrCRw9p6vbpiZftddSfRNRHYsV/exec";
  const STORAGE_KEY = "tracking_session_token_plan";
  const PAGE_NAME = "lab1";

  let currentUserName = "";
  let testType = "";
  let labPath = "";
  let stage = "LAB1";
  let alreadyReceived = false;

  function getSessionToken(){
    return sessionStorage.getItem(STORAGE_KEY) || "";
  }

  function clearSessionToken(){
    sessionStorage.removeItem(STORAGE_KEY);
  }

  async function apiPost(payload){
    const response = await fetch(API_BASE, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    const text = await response.text();

    try{
      return JSON.parse(text);
    }catch(err){
      throw new Error(text);
    }
  }

  async function ensurePageSession(){
    const token = getSessionToken();

    if(!token){
      window.location.href = "login.html?p=lab1";
      return;
    }

    try{
      const result = await apiPost({
        action: "checkSession",
        token: token,
        page: PAGE_NAME
      });

      if(result && result.ok){
        currentUserName = result.user || "مخول غير معروف";

        const w = document.getElementById("welcomeUser");
        if(currentUserName && currentUserName !== "مخول غير معروف"){
          w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: ' + currentUserName;
        }else{
          w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: مخول غير معروف';
        }

        document.getElementById("pageWrap").classList.add("show");
      }else{
        clearSessionToken();
        window.location.href = "login.html?p=lab1";
      }
    }catch(error){
      clearSessionToken();
      window.location.href = "login.html?p=lab1";
    }
  }

  function showMsg(text, type){
    const t = document.getElementById("toast");
    t.className = "";
    if(type === "ok") t.classList.add("ok");
    else if(type === "warn") t.classList.add("warn");
    else if(type === "err") t.classList.add("err");

    t.textContent = text || "";
    t.style.display = "block";

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){
      t.style.display = "none";
    }, 2500);
  }

  async function fetchLabData(){
    const id = document.getElementById("orderID").value.trim();
    if(!id){
      showMsg("⚠️ أدخل رقم أمر العمل", "warn");
      return;
    }

    const token = getSessionToken();
    if(!token){
      window.location.href = "login.html?p=lab1";
      return;
    }

    document.getElementById("fetchBtn").disabled = true;
    document.getElementById("loader").style.display = "block";
    document.getElementById("resPanel").style.display = "none";

    try{
      const d = await apiPost({
        action: "getLabDetails",
        token: token,
        page: PAGE_NAME,
        orderNo: id
      });

      document.getElementById("loader").style.display = "none";
      document.getElementById("fetchBtn").disabled = false;

      if(!d || !d.found){
        showMsg("⚠️ المعاملة غير موجودة", "warn");
        return;
      }

      document.getElementById("cName").innerText = d.clientName || "";
      labPath = d.labPath || "";
      stage = d.stage || "LAB1";

      alreadyReceived =
        d.alreadyReceived === true ||
        d.isReceived === true ||
        d.labReceived === true ||
        d.receivedBefore === true ||
        stage === "DONE";

      const t = await apiPost({
        action: "getSelectedTestType",
        token: token,
        page: PAGE_NAME,
        orderNo: id
      });

      testType = (t && t.found) ? t.testType : "";

      document.getElementById("hintBox").style.display = "flex";
      document.getElementById("hintType").innerText = testType || "---";
      document.getElementById("hintPath").innerText = labPath || "---";

      setupButtonState();
      document.getElementById("resPanel").style.display = "block";

    }catch(err){
      document.getElementById("loader").style.display = "none";
      document.getElementById("fetchBtn").disabled = false;
      showMsg("❌ خطأ في الاتصال", "err");
    }
  }

  function setupButtonState(){
    const btn = document.getElementById("receiveBtn");

    btn.disabled = false;
    btn.className = "main-btn btn-success";

    if(testType === "مصاعد"){
      btn.disabled = true;
      btn.className = "main-btn btn-disabled";
      btn.innerHTML = '<i class="fas fa-ban"></i> لا يوجد مختبرات';
      showMsg("⚠️ هذه المعاملة تخص المصاعد", "warn");
      return;
    }

    if(alreadyReceived){
      btn.disabled = true;
      btn.className = "main-btn btn-disabled";
      btn.innerHTML = '<i class="fas fa-lock"></i> مستلمة سابقاً';
      showMsg("⚠️ أمر العمل مستلم سابقاً", "warn");
      return;
    }

    if(stage === "WAIT_WORKSHOP"){
      btn.disabled = true;
      btn.className = "main-btn btn-disabled";
      btn.innerHTML = '<i class="fas fa-hourglass-half"></i> بانتظار الورشة';
      showMsg("⚠️ بانتظار مرحلة الورشة أولاً", "warn");
      return;
    }

    if(stage === "DONE"){
      btn.disabled = true;
      btn.className = "main-btn btn-disabled";
      btn.innerHTML = '<i class="fas fa-lock"></i> مكتمل';
      showMsg("⚠️ هذه المرحلة موثقة مسبقاً", "warn");
      return;
    }

    if(stage === "LAB2"){
      btn.innerHTML = '<i class="fas fa-flask"></i> استلام المختبرات بعد الورشة';
      return;
    }

    btn.innerHTML = '<i class="fas fa-hand-holding-medical"></i> استلام المختبرات';
  }

  async function receiveOrder(){
    const id = document.getElementById("orderID").value.trim();
    if(!id){
      showMsg("⚠️ أدخل رقم أمر العمل", "warn");
      return;
    }

    if(alreadyReceived){
      showMsg("⚠️ أمر العمل مستلم سابقاً", "warn");
      setupButtonState();
      return;
    }

    const token = getSessionToken();
    if(!token){
      window.location.href = "login.html?p=lab1";
      return;
    }

    let actionName = "updateLabStatus";
    let txt = "تم توثيق استلام المختبرات.";

    if(stage === "LAB2"){
      actionName = "updateLab2Status";
      txt = "تم توثيق استلام المختبرات بعد الورشة.";
    }

    const btn = document.getElementById("receiveBtn");
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

    try{
      const r = await apiPost({
        action: actionName,
        token: token,
        page: PAGE_NAME,
        orderNo: id,
        userName: currentUserName
      });

      const msg = String((r && (r.message || r.result)) || "");

      if(r && r.ok){
        document.getElementById("detailsText").innerText = txt;
        document.getElementById("cardForm").style.display = "none";
        document.getElementById("successMessage").style.display = "block";
      }else{
        showMsg(msg || "❌ تعذر الحفظ", "err");
        setupButtonState();
      }
    }catch(err){
      showMsg("❌ خطأ في الاتصال", "err");
      setupButtonState();
    }
  }

  function resetPage(){
    document.getElementById("orderID").value = "";
    document.getElementById("cardForm").style.display = "block";
    document.getElementById("successMessage").style.display = "none";
    document.getElementById("resPanel").style.display = "none";
    document.getElementById("loader").style.display = "none";
    document.getElementById("hintBox").style.display = "none";
    document.getElementById("cName").innerText = "";
    document.getElementById("hintType").innerText = "";
    document.getElementById("hintPath").innerText = "";
    document.getElementById("detailsText").innerText = "تم توثيق العملية في السجل الموحد.";
    document.getElementById("fetchBtn").disabled = false;

    testType = "";
    labPath = "";
    stage = "LAB1";
    alreadyReceived = false;

    const btn = document.getElementById("receiveBtn");
    btn.disabled = false;
    btn.className = "main-btn btn-success";
    btn.innerHTML = '<i class="fas fa-hand-holding-medical"></i> تأكيد استلام المختبرات';
  }

  ensurePageSession();
</script>
</body>
</html>
