<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="watermark.css">
  <title>قسم تقنية المعلومات / الباركود - منصة تتبع أوامر العمل</title>

  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.88);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --disabled:#bdc3c7;
      --soft:#f8fafc;
      --warn:#f39c12;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
        var(--bg);
      color:#111;
    }

    #pageWrap{
      display:none;
    }
    #pageWrap.show{
      display:block;
    }

    .company-header{
      background-image:
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
        url('https://siei-tracking.github.io/system/company.jpg');
      background-size:cover;
      background-position:center;
      padding:28px 5% 60px;
      display:flex;
      align-items:center;
      gap:16px;
      color:#fff;
      flex-wrap:wrap;
      justify-content:center;
      text-align:center;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .logo{
      width:100px;
      height:100px;
      background:#fff;
      border-radius:50%;
      padding:5px;
      object-fit:contain;
      display:block;
      flex-shrink:0;
      box-shadow:
      -1px -1px 0 rgba(0,0,0,0.1),
       1px -1px 0 rgba(0,0,0,0.1),
      -1px  1px 0 rgba(0,0,0,0.1),
       1px  1px 0 rgba(0,0,0,0.1),
      0 1px 4px rgba(0,0,0,0.1) !important;
    }

    .header-text{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .header-text h1{
      color:#fff !important;
      margin:0;
      font-size:30px !important;
      font-weight:900 !important;
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .header-text p{
      color:#fff !important;
      margin:0;
      font-size:18px !important;
      font-weight:900 !important;
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .user-pill{
      margin-top:6px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:2px 14px;
      border-radius:999px;
      background:rgba(128,0,32,0.4);
      border:1px solid rgba(231,76,60,0.45);
      color:#fff;
      font-weight:900;
      font-size:13px;
      box-shadow:0 4px 12px rgba(231,76,60,.25);
      text-shadow:
      -1px -1px 0 rgba(0,0,0,0.9),
       1px -1px 0 rgba(0,0,0,0.9),
      -1px  1px 0 rgba(0,0,0,0.9),
       1px  1px 0 rgba(0,0,0,0.9),
      0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .main-content{
      padding:0 5% 30px;
      display:flex;
      justify-content:center;
      margin-top:-40px;
      flex-direction:column;
      align-items:center;
    }

    .card{
      width:100%;
      max-width:820px;
      background:rgba(255,255,255,0.88);
      border-radius:22px;
      padding:6px 12px;
      box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 6px 18px rgba(0,0,0,.06);
      position:relative;
      z-index:2;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition:.25s;
      border:1px solid rgba(255,255,255,.65);
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:
        0 26px 60px rgba(0,0,0,.16),
        0 8px 22px rgba(0,0,0,.08);
    }

    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:30px;
      background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
      border-radius:22px 22px 0 0;
      pointer-events:none;
    }

    .input-group{
      margin-bottom:8px;
      text-align:right;
      position:relative;
      z-index:2;
    }

    .input-group + .input-group{
      margin-top:14px;
    }

    .input-group label{
      display:block;
      margin-bottom:6px;
      padding-right:4px;
      font-weight:900;
      font-size:15px;
      color:#1f2d3a;
    }

    input[type="text"]{
      width:100%;
      border:1.5px solid var(--line);
      border-radius:10px;
      padding:0 8px;
      font-weight:900;
      font-size:15px;
      background:#fff;
      text-align:center;
      font-family:'Cairo',sans-serif;
      color:#1f2d3a;
      outline:none;
      transition:.2s;
    }

    input[type="file"]{
      width:100%;
      border:1.5px solid var(--line);
      border-radius:10px;
      padding:4px 8px;
      font-weight:900;
      font-size:15px;
      background:#fff;
      text-align:center;
      font-family:'Cairo',sans-serif;
      color:#1f2d3a;
      outline:none;
      transition:.2s;
    }

    input[type="text"]:focus,
    input[type="file"]:focus{
      border-color:#d8b15d;
      box-shadow:0 0 0 4px rgba(245,166,35,.10);
    }

    input::placeholder{
      font-size:15px;
      color:#9aa6b2;
      font-weight:900;
    }

    .main-btn{
      width:100%;
      border:none;
      border-radius:12px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      font-family:'Cairo',sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      transition:.2s;
      position:relative;
      overflow:hidden;
    }

    .main-btn::before,
    .again::before{
      content:"";
      position:absolute;
      top:0;
      right:-120%;
      width:120%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,.18) 40%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.18) 60%,
        transparent 80%
      );
      transition:.65s;
    }

    .main-btn:hover::before,
    .again:hover::before{
      right:120%;
    }

    #fetchBtn{
      padding:6px 10px;
      font-size:15px;
      margin-bottom:6px;
      background:linear-gradient(180deg,#1e3c72,#162c52);
      box-shadow:0 8px 18px rgba(30,60,114,.20);
    }

    #uploadBtn{
      padding:6px 10px;
      font-size:15px;
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      box-shadow:0 8px 18px rgba(39,174,96,.20);
      margin-top:6px;
    }

    .main-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.02);
    }

    .main-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-disabled{
      background:var(--disabled) !important;
      box-shadow:none !important;
    }

    #loader{
      display:none;
      text-align:center;
      margin:10px 0;
      color:var(--primary);
      font-weight:900;
      position:relative;
      z-index:2;
    }

    #resPanel{
      display:none;
      margin-top:2px;
      padding:6px;
      background:var(--soft);
      border-radius:12px;
      border-right:5px solid var(--ok);
      position:relative;
      z-index:2;
    }

    .client-box{
      margin-bottom:2px;
      border-bottom:2px solid #eee;
      padding-bottom:2px;
    }

    .section-title{
      font-size:15px;
      font-weight:900;
      color:#253444;
      margin-bottom:2px;
    }

    .client-name{
      font-size:15px;
      font-weight:900;
      color:var(--primary);
    }

    .fileLink{
      background:#fff;
      border-radius:8px;
      padding:4px 10px;
      font-size:15px;
      margin-top:6px;
      margin-bottom:6px;
      border:1px solid var(--line);
      font-weight:900;
      word-break:break-word;
      position:relative;
      z-index:2;
    }

    .fileLink a{
      color:var(--ok);
      text-decoration:none;
      font-weight:900;
      font-size:15px;
    }

    .fileLink a:hover{
      text-decoration:underline;
    }

    .no-file{
      font-size:15px;
      font-weight:900;
      color:#7f8c8d;
    }

    .old-file-note{
      font-size:15px;
      font-weight:900;
      color:#e67e22;
      margin-bottom:4px;
    }

    .replace-note{
      font-size:14px;
      font-weight:900;
      color:#b9770e;
      background:#fff8e8;
      border:1px solid #f4d28a;
      border-radius:10px;
      padding:8px 10px;
      margin-top:8px;
      margin-bottom:4px;
    }

    .msg{
      margin-top:6px;
      font-size:15px;
      font-weight:900;
      display:none;
    }

    .msg.ok{ color:var(--ok); }
    .msg.bad{ color:var(--danger); }

    .success{
      display:none;
      text-align:center;
      padding:34px 18px;
    }

    .success i{
      font-size:74px;
      color:var(--ok);
      margin-bottom:12px;
    }

    .success h2{
      margin:0 0 10px;
      font-weight:900;
      color:#1f2b36;
      font-size:24px;
    }

    .success p{
      margin:0 0 18px;
      color:var(--muted);
      font-weight:800;
      font-size:18px;
    }

    .again{
      border:none;
      border-radius:16px;
      padding:18px 20px;
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      color:#fff;
      font-family:'Cairo';
      font-weight:900;
      font-size:20px;
      cursor:pointer;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      width:60%;
      max-width:420px;
      margin:25px auto 0;
      text-align:center;
      box-shadow:0 10px 20px rgba(39,174,96,.20);
      position:relative;
      overflow:hidden;
    }

    .again:hover{
      transform:translateY(-2px);
      opacity:.95;
    }

    .again i{
      font-size:18px;
    }

    #toast{
      position:fixed;
      bottom:22px;
      left:50%;
      transform:translateX(-50%);
      min-width:240px;
      max-width:90%;
      background:#223243;
      color:#fff;
      padding:12px 18px;
      border-radius:12px;
      font-weight:900;
      font-family:'Cairo',sans-serif;
      font-size:14px;
      display:none;
      z-index:99999;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,.22);
    }

    #toast.ok{ background:#27ae60; }
    #toast.warn{ background:#f39c12; }
    #toast.err{ background:#e74c3c; }

    @media (max-width:820px){
      .header-text h1{ font-size:16px; }
      .header-text p{ font-size:13px; }
      .card{ padding:10px; }
      .again{ width:100%; }
    }

    #orderID{
      font-size:20px;
      font-weight:600;
      color:#000;
      text-align:center;
      height:40px;
      width:100%;
    }

    #orderID::placeholder{
      height:40px;
      width:100%;
      font-size:16px;
      font-weight:600;
      color:#999;
      opacity:1;
    }
  </style>
</head>

<body>
<div id="pageWrap">
  <div class="page-shell">
    <div class="container">

      <header class="company-header">
        <img src="https://siei-tracking.github.io/system/logo.png" class="logo" alt="logo">

        <div class="header-text">
          <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
          <p><i class="fas fa-qrcode"></i> منصة تتبع اوامر العمل - قسم تقنية المعلومات / الباركود</p>
          <div id="welcomeUser" class="user-pill"></div>
        </div>
      </header>

      <div class="page-content">
        <main class="main-content">
          <div class="card" id="cardForm">

            <div id="inputForm">
              <div class="input-group">
                <input type="text" id="orderID" placeholder="أدخل رقم أمر العمل">
              </div>

              <button class="main-btn" id="fetchBtn" type="button" onclick="fetchData()">
                <i class="fas fa-search"></i>
                جلب بيانات المعاملة
              </button>

              <div id="loader">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>جاري البحث...</p>
              </div>

              <div id="resPanel">
                <div class="client-box">
                  <div class="section-title"><i class="fas fa-building"></i> الجهة المستفيدة</div>
                  <div id="cName" class="client-name">---</div>
                </div>

                <div class="input-group">
                  <label><i class="fas fa-upload"></i> تحميل ملف الباركود</label>
                  <input type="file" id="barcodeFile" accept=".pdf,.png,.jpg,.jpeg,.webp">
                </div>

                <div id="fileBox"></div>
                <div id="replaceNote" class="replace-note" style="display:none;">
                  <i class="fas fa-triangle-exclamation"></i>
                  عند الرفع سيتم استبدال الملف القديم تلقائياً بالملف الجديد.
                </div>

                <button class="main-btn" id="uploadBtn" type="button" onclick="uploadAndConfirm()">
                  <i class="fas fa-cloud-upload-alt"></i>
                  رفع وتوثيق الباركود
                </button>

                <div id="msgOk" class="msg ok"></div>
                <div id="msgBad" class="msg bad"></div>
              </div>
            </div>

          </div>

          <div class="card success" id="successCard">
            <i class="fas fa-check-circle"></i>
            <h2>تم الحفظ بنجاح</h2>
            <p>تم رفع وتوثيق الباركود</p>
            <button class="again" type="button" onclick="resetForm()">
              <i class="fas fa-plus"></i>
              معاملة جديدة
            </button>
          </div>
        </main>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API_BASE = "https://script.google.com/macros/s/AKfycbzmv_klFU9OKBuLdqJkvoBCkY6-zQyJvB0NYfNg-OeISEuPlp0-FIKn2zOYQoS7hIIU/exec";
  const PAGE_NAME = "barcode";
  const STORAGE_KEY_PAGE = "tracking_session_token_" + PAGE_NAME;
  const STORAGE_KEY_GLOBAL = "tracking_session_token";

  let currentUserName = "";
  let barcodeStatus = "";
  let officialStatus = "";

  function getSessionToken(){
    return (
      sessionStorage.getItem(STORAGE_KEY_PAGE) ||
      sessionStorage.getItem(STORAGE_KEY_GLOBAL) ||
      localStorage.getItem(STORAGE_KEY_PAGE) ||
      localStorage.getItem(STORAGE_KEY_GLOBAL) ||
      ""
    );
  }

  function setSessionToken(token){
    if(!token) return;
    sessionStorage.setItem(STORAGE_KEY_PAGE, token);
    sessionStorage.setItem(STORAGE_KEY_GLOBAL, token);
  }

  function clearSessionToken(){
    sessionStorage.removeItem(STORAGE_KEY_PAGE);
    sessionStorage.removeItem(STORAGE_KEY_GLOBAL);
    localStorage.removeItem(STORAGE_KEY_PAGE);
    localStorage.removeItem(STORAGE_KEY_GLOBAL);
  }

  function goToLogin(){
    window.location.href = "login.html?p=" + encodeURIComponent(PAGE_NAME);
  }

  async function apiPost(payload){
    const response = await fetch(API_BASE, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    const text = await response.text();

    try{
      return JSON.parse(text);
    }catch(err){
      throw new Error(text || "Invalid JSON response");
    }
  }

  async function ensurePageSession(){
    const token = getSessionToken();

    if(!token){
      goToLogin();
      return;
    }

    try{
      const result = await apiPost({
        action: "checkSession",
        token: token,
        page: PAGE_NAME
      });

      if(result && result.ok){
        setSessionToken(token);

        currentUserName = result.user || result.userName || "مخول غير معروف";

        const w = document.getElementById("welcomeUser");
        if(currentUserName && currentUserName !== "مخول غير معروف"){
          w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: ' + currentUserName;
        } else {
          w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: مخول غير معروف';
        }

        document.getElementById("pageWrap").classList.add("show");
      }else{
        clearSessionToken();
        goToLogin();
      }
    }catch(error){
      showToast("❌ تعذر التحقق من الجلسة", "err");
      setTimeout(function(){
        clearSessionToken();
        goToLogin();
      }, 900);
    }
  }

  function showToast(text, type){
    var t = document.getElementById("toast");
    t.className = "";
    if(type === "ok") t.classList.add("ok");
    else if(type === "warn") t.classList.add("warn");
    else if(type === "err") t.classList.add("err");

    t.textContent = text || "";
    t.style.display = "block";

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){
      t.style.display = "none";
    }, 2600);
  }

  function hideMsgs(){
    document.getElementById('msgOk').style.display = 'none';
    document.getElementById('msgBad').style.display = 'none';
    document.getElementById('msgOk').textContent = '';
    document.getElementById('msgBad').textContent = '';
  }

  function showOk(msg){
    hideMsgs();
    const el = document.getElementById('msgOk');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function showBad(msg){
    hideMsgs();
    const el = document.getElementById('msgBad');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.fontSize = "15px";
    el.style.fontWeight = "900";
  }

  function isDoneCell(v){
    return String(v || "").includes("✅");
  }

  function setUploadButtonEnabled(){
    const btn = document.getElementById('uploadBtn');
    btn.disabled = false;
    btn.className = "main-btn";
    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> رفع وتوثيق الباركود';
  }

  function setUploadButtonDisabled(html){
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.className = "main-btn btn-disabled";
    btn.innerHTML = html;
  }

  function setupUploadButtonState(){
    if(isDoneCell(barcodeStatus)){
      setUploadButtonDisabled('<i class="fas fa-lock"></i> مثبتة مسبقاً');
      return;
    }

    if(!isDoneCell(officialStatus)){
      setUploadButtonDisabled('<i class="fas fa-lock"></i> إصدار الكتاب الرسمي أولاً');
      return;
    }

    setUploadButtonEnabled();
  }

  async function fetchData(){
    const id = document.getElementById('orderID').value.trim();
    if(!id){
      showToast("⚠️ أدخل رقم المعاملة", "warn");
      return;
    }

    const token = getSessionToken();
    if(!token){
      goToLogin();
      return;
    }

    hideMsgs();
    document.getElementById('loader').style.display = 'block';
    document.getElementById('resPanel').style.display = 'none';
    document.getElementById('fileBox').innerHTML = '';
    document.getElementById('replaceNote').style.display = 'none';
    document.getElementById('fetchBtn').disabled = true;

    try{
      const data = await apiPost({
        action: "getBarcodeDetails",
        token: token,
        page: PAGE_NAME,
        orderNo: id
      });

      document.getElementById('loader').style.display = 'none';
      document.getElementById('fetchBtn').disabled = false;

      if(data && data.ok === false && data.message){
        if(
          data.message.indexOf("انتهت الجلسة") !== -1 ||
          data.message.indexOf("غير صالح") !== -1 ||
          data.message.indexOf("غير مصرح") !== -1
        ){
          showToast("❌ انتهت الجلسة", "err");
          setTimeout(function(){
            clearSessionToken();
            goToLogin();
          }, 800);
          return;
        }

        showBad(data.message);
        return;
      }

      if(data && data.found){
        document.getElementById('resPanel').style.display = 'block';
        document.getElementById('cName').innerText = data.clientName || "---";
        barcodeStatus = String(data.barcodeStatus || "").trim();
        officialStatus = String(data.officialStatus || "").trim();

        if(data.barcodeFileUrl){
          document.getElementById('fileBox').innerHTML =
            '<div class="fileLink">' +
              '<div class="old-file-note">' +
                '<i class="fas fa-triangle-exclamation"></i> يوجد ملف باركود مرفوع سابقاً لهذه المعاملة' +
              '</div>' +
              '<div>' +
                '<i class="fas fa-file"></i> ' +
                '<a href="' + data.barcodeFileUrl + '" target="_blank">فتح ملف الباركود الحالي</a>' +
              '</div>' +
            '</div>';
          document.getElementById('replaceNote').style.display = 'block';
        }else{
          document.getElementById('fileBox').innerHTML =
            '<div class="fileLink no-file">لا يوجد ملف باركود مرفوع حالياً</div>';
        }

        setupUploadButtonState();
      }else{
        showToast("⚠️ الرقم غير موجود", "warn");
      }
    }catch(err){
      document.getElementById('loader').style.display = 'none';
      document.getElementById('fetchBtn').disabled = false;
      showBad("خطأ في الاتصال");
    }
  }

  async function uploadAndConfirm(){
    const id = document.getElementById('orderID').value.trim();
    const file = document.getElementById('barcodeFile').files[0];

    if(document.getElementById('uploadBtn').disabled){
      return;
    }

    if(!id){
      showToast("⚠️ أدخل رقم المعاملة", "warn");
      return;
    }

    if(!file){
      showToast("⚠️ اختر ملف الباركود أولاً", "warn");
      return;
    }

    const token = getSessionToken();
    if(!token){
      goToLogin();
      return;
    }

    hideMsgs();

    let oldUrl = "";
    const oldLink = document.querySelector('#fileBox a');
    if(oldLink && oldLink.href){
      oldUrl = oldLink.href;
    }

    if(oldUrl){
      showToast("ℹ️ سيتم استبدال الملف القديم تلقائياً", "warn");
    }

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';

    const reader = new FileReader();

    reader.onload = async function(e){
      const base64 = e.target.result.split(',')[1];

      try{
        const res = await apiPost({
          action: "uploadBarcodeFile",
          token: token,
          page: PAGE_NAME,
          orderNo: id,
          fileName: file.name,
          mimeType: file.type,
          base64Data: base64,
          userName: currentUserName,
          oldFileUrl: oldUrl
        });

        if(res && res.ok === false && res.message){
          if(
            res.message.indexOf("انتهت الجلسة") !== -1 ||
            res.message.indexOf("غير صالح") !== -1 ||
            res.message.indexOf("غير مصرح") !== -1
          ){
            showToast("❌ انتهت الجلسة", "err");
            setTimeout(function(){
              clearSessionToken();
              goToLogin();
            }, 800);
            setupUploadButtonState();
            return;
          }
        }

        if(!(res && res.ok)){
          setupUploadButtonState();
          showBad((res && (res.error || res.message)) ? (res.error || res.message) : "فشل رفع الملف");
          return;
        }

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التوثيق...';

        const confirmRes = await apiPost({
          action: "updateBarcodeStatus",
          token: token,
          page: PAGE_NAME,
          orderNo: id,
          userName: currentUserName
        });

        const msg = String((confirmRes && (confirmRes.message || confirmRes.result)) || "");

        if(confirmRes && confirmRes.ok){
          document.getElementById('cardForm').style.display = 'none';
          document.getElementById('successCard').style.display = 'block';
        }else{
          if(
            msg.indexOf("انتهت الجلسة") !== -1 ||
            msg.indexOf("غير صالح") !== -1 ||
            msg.indexOf("غير مصرح") !== -1
          ){
            showToast("❌ انتهت الجلسة", "err");
            setTimeout(function(){
              clearSessionToken();
              goToLogin();
            }, 800);
            return;
          }
          showBad(msg || "فشل التوثيق");
          setupUploadButtonState();
        }
      }catch(err){
        setupUploadButtonState();
        showBad("خطأ في الاتصال");
      }
    };

    reader.readAsDataURL(file);
  }

  function resetForm(){
    document.getElementById('successCard').style.display = 'none';
    document.getElementById('cardForm').style.display = 'block';

    document.getElementById('orderID').value = "";
    document.getElementById('barcodeFile').value = "";
    document.getElementById('resPanel').style.display = "none";
    document.getElementById('fileBox').innerHTML = "";
    document.getElementById('replaceNote').style.display = "none";
    document.getElementById('loader').style.display = "none";
    document.getElementById('cName').innerText = "---";

    const btn = document.getElementById('uploadBtn');
    btn.disabled = false;
    btn.className = "main-btn";
    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> رفع وتوثيق الباركود';

    document.getElementById('fetchBtn').disabled = false;
    barcodeStatus = "";
    officialStatus = "";
    hideMsgs();
    document.getElementById('orderID').focus();
  }

  window.addEventListener("load", function(){
    ensurePageSession();

    document.getElementById("orderID").addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        fetchData();
      }
    });
  });
</script>
