<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const tokenFromUrl = params.get("token") || "";
  const roleFromUrl  = params.get("role") || "";
  const userFromUrl  = params.get("user") || "";

  const tokenFromStorage = localStorage.getItem("wo_auth_token") || "";
  const roleFromStorage  = localStorage.getItem("wo_auth_role") || "";
  const userFromStorage  = localStorage.getItem("wo_auth_user") || "";

  const finalToken = tokenFromUrl || tokenFromStorage;
  const finalRole  = roleFromUrl || roleFromStorage;
  const finalUser  = userFromUrl || userFromStorage;

  if (!finalToken) {
    window.location.replace("login.html?p=finance");
    return;
  }

  try {
    localStorage.setItem("wo_auth_token", finalToken);
    if (finalRole) localStorage.setItem("wo_auth_role", finalRole);
    if (finalUser) localStorage.setItem("wo_auth_user", finalUser);
  } catch (e) {}

  if (tokenFromUrl || roleFromUrl || userFromUrl) {
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
  }
})();
</script>

<style>
:root{
  --primary:#223243;
  --accent:#f5a623;
  --accent-dark:#e59712;
  --bg:#eef2f6;
  --card:rgba(255,255,255,0.88);
  --line:#e5ebf1;
  --muted:#758292;
  --ok:#27ae60;
  --danger:#e74c3c;
  --warn:#f39c12;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:
    radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
    radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
    var(--bg);
  color:#111;
}

.company-header{
  background-image:
    linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
    url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');
  background-size:cover;
  background-position:center;
  padding:28px 5% 60px;
  display:flex;
  align-items:center;
  gap:16px;
  color:#fff;
  flex-wrap:wrap;
  justify-content:center;
  text-align:center;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  position:relative;
  overflow:hidden;
}

.logo{
  width:100px;
  height:100px;
  background:#fff;
  border-radius:50%;
  padding:5px;
  object-fit:contain;
  display:block;
  flex-shrink:0;
  box-shadow:
  -1px -1px 0 rgba(0,0,0,0.1),
   1px -1px 0 rgba(0,0,0,0.1),
  -1px  1px 0 rgba(0,0,0,0.1),
   1px  1px 0 rgba(0,0,0,0.1),
  0 1px 4px rgba(0,0,0,0.1) !important;
}

.header-text{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.header-text h1{
  color:#fff !important;
  margin:0;
  font-size:30px !important;
  font-weight:900 !important;
  text-shadow:
  -1px -1px 0 rgba(0,0,0,0.9),
   1px -1px 0 rgba(0,0,0,0.9),
  -1px  1px 0 rgba(0,0,0,0.9),
   1px  1px 0 rgba(0,0,0,0.9),
   0 4px 10px rgba(0,0,0,0.8) !important;
}

.header-text p{
  color:#fff !important;
  margin:0;
  font-size:18px !important;
  font-weight:900 !important;
  text-shadow:
  -1px -1px 0 rgba(0,0,0,0.9),
   1px -1px 0 rgba(0,0,0,0.9),
  -1px  1px 0 rgba(0,0,0,0.9),
   1px  1px 0 rgba(0,0,0,0.9),
   0 4px 10px rgba(0,0,0,0.8) !important;
}

.user-pill{
  margin-top:6px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:2px 14px;
  border-radius:999px;
  background:rgba(128,0,32,0.4);
  border:1px solid rgba(231,76,60,0.45);
  color:#fff;
  font-weight:900;
  font-size:13px;
  box-shadow:0 4px 12px rgba(231,76,60,.25);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
     1px -1px 0 rgba(0,0,0,0.9),
    -1px  1px 0 rgba(0,0,0,0.9),
     1px  1px 0 rgba(0,0,0,0.9),
     0 4px 10px rgba(0,0,0,0.8) !important;
}

.main-content{
  padding:0 5% 30px;
  display:flex;
  justify-content:center;
  position:relative;
  margin-top:-40px;
}

.card{
  width:100%;
  max-width:820px;
  background:rgba(255,255,255,0.88);
  border-radius:22px;
  padding:10px 12px;
  box-shadow:
    0 20px 50px rgba(0,0,0,.12),
    0 6px 18px rgba(0,0,0,.06);
  position:relative;
  z-index:2;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition:.25s;
  border:1px solid rgba(255,255,255,.65);
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:
    0 26px 60px rgba(0,0,0,.16),
    0 8px 22px rgba(0,0,0,.08);
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
  border-radius:22px 22px 0 0;
  pointer-events:none;
}

.input-group{
  margin-bottom:10px;
  text-align:right;
  position:relative;
  z-index:2;
}

label{
  display:block;
  margin-bottom:4px;
  font-weight:900;
  font-size:15px;
  color:#253444;
}

input{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:10px;
  padding:7px 10px;
  font-weight:800;
  font-size:14px;
  background:#fff;
  text-align:center;
  font-family:'Cairo',sans-serif;
  color:#1f2d3a;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:#d8b15d;
  box-shadow:0 0 0 4px rgba(245,166,35,.10);
}

input::placeholder{
  color:#9aa6b2;
  font-weight:800;
}

.main-btn,
.again{
  position:relative;
  overflow:hidden;
}

.main-btn::before,
.again::before{
  content:"";
  position:absolute;
  top:0;
  right:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 20%,
    rgba(255,255,255,.18) 40%,
    rgba(255,255,255,.35) 50%,
    rgba(255,255,255,.18) 60%,
    transparent 80%
  );
  transition:.65s;
}

.main-btn:hover::before,
.again:hover::before{
  right:120%;
}

.main-btn{
  width:100%;
  border:none;
  border-radius:12px;
  padding:9px 10px;
  background:var(--primary);
  color:#fff;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  box-shadow:0 10px 20px rgba(245,166,35,.20);
  transition:.2s;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  z-index:2;
}

.main-btn:hover{
  transform:translateY(-1px);
  filter:brightness(1.02);
}

.main-btn:disabled{
  opacity:.65;
  cursor:not-allowed;
  box-shadow:none;
  transform:none;
}

#loader{
  display:none;
  text-align:center;
  margin:12px 0;
  color:var(--primary);
  font-weight:900;
  position:relative;
  z-index:2;
}

#resPanel{
  display:none;
  margin-top:10px;
  padding:10px;
  background:#f8f9fa;
  border-radius:12px;
  border-right:5px solid var(--ok);
  position:relative;
  z-index:2;
}

.success{
  display:none;
  text-align:center;
  padding:34px 18px;
}

.success i{
  font-size:74px;
  color:var(--ok);
  margin-bottom:12px;
}

.success h2{
  margin:0 0 10px;
  font-weight:900;
  color:#1f2b36;
  font-size:24px;
}

.success p{
  margin:0 0 18px;
  color:var(--muted);
  font-weight:800;
  font-size:18px;
}

.again{
  border:none;
  border-radius:16px;
  padding:18px 20px;
  background:linear-gradient(180deg,#2ebf68,#26a65b);
  color:#fff;
  font-family:'Cairo';
  font-weight:900;
  font-size:20px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  width:60%;
  max-width:420px;
  margin:25px auto 0;
  text-align:center;
  box-shadow:0 10px 20px rgba(39,174,96,.20);
}

.again:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.again i{
  font-size:18px;
}

#toast{
  position:fixed;
  bottom:22px;
  left:50%;
  transform:translateX(-50%);
  min-width:240px;
  max-width:90%;
  background:#223243;
  color:#fff;
  padding:12px 18px;
  border-radius:12px;
  font-weight:900;
  font-family:'Cairo',sans-serif;
  font-size:14px;
  display:none;
  z-index:99999;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.22);
}

#toast.ok{ background:#27ae60; }
#toast.warn{ background:#f39c12; }
#toast.err{ background:#e74c3c; }

@media (max-width:820px){
  .header-text h1{ font-size:24px; }
  .header-text p{ font-size:15px; }
  .card{ padding:10px; }
  .again{ width:100%; }
}

#orderID{
  font-size:20px;
  font-weight:600;
  color:#000;
  text-align:center;
  height:40px;
  width:100%;
}

#orderID::placeholder{
  height:40px;
  width:100%;
  font-size:16px;
  font-weight:600;
  color:#999;
  opacity:1;
}
</style>
</head>

<body>
<div class="page-shell">

<header class="company-header">
  <img class="logo" src="https://drive.google.com/thumbnail?id=1NN7G2zhk7nhgXuPWGW4qE_pdGC-Ptjkt&sz=w500" alt="logo">

  <div class="header-text">
    <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>

    <p>
      <i class="fas fa-sack-dollar"></i>
      منصة تتبع اوامر العمل - التسديد
    </p>

    <div class="user-pill" id="welcomeUser">
      <i class="fas fa-user-shield"></i>
      المستخدم: مخول غير معروف
    </div>
  </div>
</header>

<div class="page-content">
<main class="main-content">

  <div class="card" id="cardForm">
    <div id="inputForm">

      <div class="input-group">
        <label><i class="fas fa-barcode"></i> رقم أمر العمل الموحد</label>
        <input type="text" id="orderID" placeholder="أدخل الرقم..." inputmode="numeric" pattern="[0-9]*">
      </div>

      <button class="main-btn" id="fetchBtn" type="button">
        <i class="fas fa-search"></i>
        جلب بيانات المعاملة
      </button>

      <div id="loader">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
        <p style="font-weight:900; margin:8px 0 0;">جاري البحث...</p>
      </div>

      <div id="resPanel">
        <div class="input-group" style="margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:8px;">
          <label><i class="fas fa-building"></i> الجهة المستفيدة:</label>
          <div id="cName" style="font-size:19px;font-weight:900;color:var(--primary);">---</div>
        </div>

        <div class="input-group" style="margin-bottom:12px;">
          <label><i class="fas fa-receipt"></i> التسعيرة المثبتة:</label>
          <div id="priceText" style="font-size:17px;font-weight:900;color:#222;">—</div>
        </div>

        <button id="payBtn" class="main-btn" type="button" style="background:linear-gradient(180deg,#2ebf68,#26a65b);">
          <i class="fas fa-check"></i>
          توثيق التسديد
        </button>
      </div>

    </div>
  </div>

  <div class="card success" id="successMessage">
    <i class="fas fa-check-circle"></i>
    <h2>تم الحفظ بنجاح</h2>
    <p id="detailsText">تم التسديد مبلغ امر العمل وتوثيقة</p>
    <button class="again" id="btnAgain" type="button">
      <i class="fas fa-plus"></i>
      معاملة جديدة
    </button>
  </div>

</main>
</div>

</div>

<div id="toast"></div>

<script>
const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxtdvFycvRHSKeXh5Wqh3BZpBQ0Mzlr3pakPB86WrYabIUS9hbl9WeMyBolQrQCyvPl/exec";
const AUTH_TOKEN = localStorage.getItem("wo_auth_token") || "";
const CURRENT_USER = localStorage.getItem("wo_auth_user") || "";

let lastPayStatus = "";

window.addEventListener("load", function(){
  const w = document.getElementById("welcomeUser");

  if(CURRENT_USER && CURRENT_USER !== "مخول غير معروف"){
    w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: ' + escapeHtml(CURRENT_USER);
  } else {
    w.innerHTML = '<i class="fas fa-user-shield"></i> المستخدم: مخول غير معروف';
  }

  document.getElementById("fetchBtn").addEventListener("click", fetchData);
  document.getElementById("payBtn").addEventListener("click", pay);
  document.getElementById("btnAgain").addEventListener("click", resetPage);

  document.getElementById("orderID").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
      e.preventDefault();
      fetchData();
    }
  });
});

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function safeErr(err){
  try{
    if(!err) return "Unknown error";
    if(typeof err === "string") return err;
    if(err.message) return err.message;
    return JSON.stringify(err);
  }catch(e){
    return String(err);
  }
}

function showMsg(text, type){
  var t = document.getElementById("toast");
  t.className = "";
  if(type === "ok") t.classList.add("ok");
  else if(type === "warn") t.classList.add("warn");
  else if(type === "err") t.classList.add("err");

  t.textContent = text || "";
  t.style.display = "block";

  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(function(){
    t.style.display = "none";
  }, 2500);
}

async function apiGet(action, params){
  const qs = new URLSearchParams({ action: action });

  Object.keys(params || {}).forEach(function(key){
    const val = params[key];
    if(val !== undefined && val !== null && val !== ""){
      qs.append(key, val);
    }
  });

  const res = await fetch(GAS_WEBAPP_URL + "?" + qs.toString(), {
    method: "GET",
    mode: "cors"
  });

  const text = await res.text();

  if(!res.ok){
    throw new Error("HTTP " + res.status + " | " + text.slice(0, 200));
  }

  try{
    return JSON.parse(text);
  }catch(e){
    throw new Error("JSON parse error | " + text.slice(0, 200));
  }
}

async function apiPost(payload){
  const res = await fetch(GAS_WEBAPP_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload || {})
  });

  const text = await res.text();

  if(!res.ok){
    throw new Error("HTTP " + res.status + " | " + text.slice(0, 200));
  }

  try{
    return JSON.parse(text);
  }catch(e){
    throw new Error("JSON parse error | " + text.slice(0, 200));
  }
}

async function fetchData(){
  const id = document.getElementById('orderID').value.trim();
  if(!id){
    showMsg("⚠️ يرجى إدخال رقم أمر العمل", "warn");
    return;
  }

  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('loader').style.display = 'block';
  document.getElementById('resPanel').style.display = 'none';

  try{
    const data = await apiGet("financeDetails", { order: id, token: AUTH_TOKEN });

    document.getElementById('loader').style.display = 'none';
    document.getElementById('fetchBtn').disabled = false;

    if(data && data.found){
      document.getElementById('cName').innerText = data.clientName || "---";
      document.getElementById('priceText').innerText = (data.price && Number(data.price) !== 0) ? data.price : "غير مثبتة";
      lastPayStatus = String(data.status || "").trim();

      const btn = document.getElementById('payBtn');
      const done = lastPayStatus.includes("تم التسديد") || lastPayStatus.includes("✅");

      if(done){
        btn.disabled = true;
        btn.style.background = "#bdc3c7";
        btn.innerHTML = '<i class="fas fa-lock"></i> مسدد مسبقاً';
        showMsg("⚠️ هذه المرحلة موثقة مسبقاً", "warn");
      } else {
        btn.disabled = false;
        btn.style.background = "linear-gradient(180deg,#2ebf68,#26a65b)";
        btn.innerHTML = '<i class="fas fa-check"></i> توثيق التسديد';
      }

      document.getElementById('resPanel').style.display = 'block';
    } else {
      showMsg("⚠️ الرقم غير موجود", "warn");
    }
  }catch(err){
    document.getElementById('loader').style.display = 'none';
    document.getElementById('fetchBtn').disabled = false;
    showMsg("❌ خطأ في الاتصال", "err");
  }
}

async function pay(){
  const id = document.getElementById('orderID').value.trim();
  if(!id){
    showMsg("⚠️ يرجى إدخال رقم أمر العمل", "warn");
    return;
  }

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

  try{
    const res = await apiPost({
      action: "updatePayment",
      order: id,
      userName: CURRENT_USER,
      token: AUTH_TOKEN
    });

    const msg = String((res && (res.msg || res.message || res.error)) || "");

    if(res && res.ok){
      document.getElementById('cardForm').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';
    } else {
      showMsg(msg || "❌ تعذر الحفظ", "err");
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check"></i> توثيق التسديد';
    }
  }catch(err){
    showMsg("❌ خطأ في الاتصال", "err");
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check"></i> توثيق التسديد';
  }
}

function resetPage(){
  document.getElementById('orderID').value = "";
  document.getElementById('cardForm').style.display = 'block';
  document.getElementById('successMessage').style.display = 'none';
  document.getElementById('inputForm').style.display = 'block';
  document.getElementById('resPanel').style.display = 'none';
  document.getElementById('loader').style.display = 'none';

  const btn = document.getElementById('payBtn');
  btn.disabled = false;
  btn.style.background = "linear-gradient(180deg,#2ebf68,#26a65b)";
  btn.innerHTML = '<i class="fas fa-check"></i> توثيق التسديد';

  document.getElementById('cName').innerText = "---";
  document.getElementById('priceText').innerText = "—";

  lastPayStatus = "";
}
</script>

</body>
</html>
