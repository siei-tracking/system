<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<script src="/system/config.js"></script>
<script src="/system/pwa-install.js"></script>
<link rel="manifest" href="/system/manifest-finance.webmanifest">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="watermark.css">
<title>قسم الشؤون المالية / التسديد - منصة تتبع أوامر العمل</title>
<link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --primary:#223243;
  --accent:#f5a623;
  --accent-dark:#e59712;
  --bg:#eef2f6;
  --card:rgba(255,255,255,0.92);
  --line:#e5ebf1;
  --muted:#758292;
  --ok:#27ae60;
  --danger:#e74c3c;
  --warn:#f39c12;
  --soft:#f8fafc;
  --transition-fast:.15s ease;
  --transition-med:.25s ease;
  --radius-sm:10px;
  --radius-md:14px;
  --radius-lg:22px;
}

*, *::before, *::after{ box-sizing:border-box; }

html, body{
  width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:
    radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
    radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
    var(--bg);
  color:#111;
}

#pageWrap{ display:block; }

#pageWrap.loading .card,
#pageWrap.loading .main-content{
  opacity:0;
  pointer-events:none;
}
#pageWrap .card,
#pageWrap .main-content{
  transition:opacity .3s ease;
}

.company-header{
  background-image:
    linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
    url('https://siei-tracking.github.io/system/company.jpg');
  background-size:cover;
  background-position:center;
  padding:28px 5% 60px;
  display:flex;
  align-items:center;
  gap:16px;
  color:#fff;
  flex-wrap:wrap;
  justify-content:center;
  text-align:center;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  position:relative;
  overflow:hidden;
}

.logo{
  width:100px;
  height:100px;
  background:#fff;
  border-radius:50%;
  padding:5px;
  object-fit:contain;
  display:block;
  flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}

.header-text{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  max-width:100%;
}

.header-text h1{
  color:#fff;
  margin:0;
  font-size:30px;
  font-weight:900;
  line-height:1.45;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}

.header-text p{
  color:#fff;
  margin:0;
  font-size:18px;
  font-weight:900;
  line-height:1.5;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}

.user-pill{
  margin-top:6px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:4px 16px;
  border-radius:999px;
  background:rgba(128,0,32,0.4);
  border:1px solid rgba(231,76,60,0.45);
  color:#fff;
  font-weight:900;
  font-size:13px;
  box-shadow:0 4px 12px rgba(231,76,60,.25);
  max-width:100%;
  word-break:break-word;
}

.main-content{
  padding:0 5% 30px;
  display:flex;
  justify-content:center;
  position:relative;
  margin-top:-40px;
}

.card{
  width:100%;
  max-width:820px;
  background:rgba(255,255,255,0.92);
  border-radius:var(--radius-lg);
  padding:10px 12px;
  box-shadow:
    0 20px 50px rgba(0,0,0,.12),
    0 6px 18px rgba(0,0,0,.06);
  position:relative;
  z-index:2;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:transform var(--transition-med), box-shadow var(--transition-med);
  border:1px solid rgba(255,255,255,.65);
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:
    0 26px 60px rgba(0,0,0,.16),
    0 8px 22px rgba(0,0,0,.08);
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  pointer-events:none;
}

.input-group{
  margin-bottom:10px;
  text-align:right;
  position:relative;
  z-index:2;
}

label{
  display:block;
  margin-bottom:4px;
  font-weight:900;
  font-size:15px;
  color:#253444;
}

input{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:var(--radius-sm);
  padding:7px 10px;
  font-weight:800;
  font-size:14px;
  background:#fff;
  text-align:center;
  font-family:'Cairo',sans-serif;
  color:#1f2d3a;
  outline:none;
  transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
  min-height:44px;
  -webkit-tap-highlight-color:transparent;
}

input:focus{
  border-color:#d8b15d;
  box-shadow:0 0 0 4px rgba(245,166,35,.12);
}

input::placeholder{
  color:#9aa6b2;
  font-weight:800;
}

.main-btn,
.again{
  position:relative;
  overflow:hidden;
}

.main-btn::before,
.again::before{
  content:"";
  position:absolute;
  top:0;
  right:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 20%,
    rgba(255,255,255,.18) 40%,
    rgba(255,255,255,.35) 50%,
    rgba(255,255,255,.18) 60%,
    transparent 80%
  );
  transition:.65s;
}

.main-btn:hover::before,
.again:hover::before{
  right:120%;
}

.main-btn{
  width:100%;
  border:none;
  border-radius:var(--radius-md);
  padding:9px 10px;
  background:var(--primary);
  color:#fff;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  box-shadow:0 10px 20px rgba(34,50,67,.20);
  transition:transform var(--transition-fast), opacity var(--transition-fast);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  z-index:2;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  min-height:46px;
}

.main-btn:hover{ transform:translateY(-1px); opacity:.96; }
.main-btn:active{ transform:translateY(0); opacity:.9; }
.main-btn:disabled{
  opacity:.65;
  cursor:not-allowed;
  box-shadow:none;
  transform:none;
  pointer-events:none;
}

#loader{
  display:none;
  text-align:center;
  margin:12px 0;
  color:var(--primary);
  font-weight:900;
  position:relative;
  z-index:2;
}

#resPanel{
  display:none;
  margin-top:10px;
  padding:10px;
  background:var(--soft);
  border-radius:var(--radius-md);
  border-right:5px solid var(--ok);
  position:relative;
  z-index:2;
}

.success{
  display:none;
  text-align:center;
  padding:34px 18px;
}

.success i{
  font-size:74px;
  color:var(--ok);
  margin-bottom:12px;
}

.success h2{
  margin:0 0 10px;
  font-weight:900;
  color:#1f2b36;
  font-size:24px;
}

.success p{
  margin:0 0 18px;
  color:var(--muted);
  font-weight:800;
  font-size:18px;
}

.again{
  border:none;
  border-radius:var(--radius-md);
  padding:18px 20px;
  background:linear-gradient(180deg,#2ebf68,#26a65b);
  color:#fff;
  font-family:'Cairo',sans-serif;
  font-weight:900;
  font-size:20px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  width:60%;
  max-width:420px;
  margin:25px auto 0;
  text-align:center;
  box-shadow:0 10px 20px rgba(39,174,96,.20);
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.again:hover{ transform:translateY(-2px); opacity:.95; }
.again:active{ transform:translateY(0); }
.again i{ font-size:18px; }

#toast{
  position:fixed;
  bottom:22px;
  left:50%;
  transform:translateX(-50%) translateY(0);
  min-width:240px;
  max-width:90%;
  background:#223243;
  color:#fff;
  padding:12px 20px;
  border-radius:var(--radius-md);
  font-weight:900;
  font-family:'Cairo',sans-serif;
  font-size:14px;
  display:none;
  z-index:99999;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.28);
  animation:toastIn .25s ease;
}

@keyframes toastIn{
  from{ transform:translateX(-50%) translateY(20px); opacity:0; }
  to  { transform:translateX(-50%) translateY(0);    opacity:1; }
}

#toast.ok  { background:#27ae60; }
#toast.warn{ background:#f39c12; }
#toast.err { background:#e74c3c; }

@media (max-width:820px){
  .company-header{ padding:28px 14px 48px; gap:12px; }
  .logo{ width:78px; height:78px; }
  .header-text h1{ font-size:22px; }
  .header-text p{ font-size:14px; }
  .main-content{ padding:0 10px 24px; margin-top:-24px; }
  .card{ border-radius:18px; padding:10px; }
  .again{ width:100%; }
}

@media (max-width:480px){
  .company-header{ padding:22px 12px 38px; }
  .logo{ width:68px; height:68px; }
  .header-text h1{ font-size:18px; }
  .header-text p{ font-size:13px; }
  .user-pill{ font-size:12px; padding:4px 12px; }
}

#orderID{
  font-size:20px;
  font-weight:600;
  color:#000;
  text-align:center;
  height:40px;
  width:100%;
}

#orderID::placeholder{
  height:40px;
  width:100%;
  font-size:16px;
  font-weight:600;
  color:#999;
  opacity:1;
}
</style>
</head>

<body>

<div id="pageWrap" class="loading">
  <div class="page-shell">

    <header class="company-header">
      <img class="logo" src="https://siei-tracking.github.io/system/logo.png" alt="logo">

      <div class="header-text">
        <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>

        <p>
          <i class="fas fa-sack-dollar"></i>
          منصة تتبع اوامر العمل - قسم الشؤون المالية / التسديد
        </p>

        <div id="welcomeUser" class="user-pill"></div>
      </div>
    </header>

    <div class="page-content">
      <main class="main-content">

        <div class="card" id="cardForm">
          <div id="inputForm">

            <div class="input-group">
              <label><i class="fas fa-barcode"></i> رقم أمر العمل الموحد</label>
              <input type="text" id="orderID" placeholder="أدخل الرقم..." inputmode="numeric" pattern="[0-9]*">
            </div>

            <button class="main-btn" id="fetchBtn" type="button" onclick="fetchData()">
              <i class="fas fa-search"></i>
              جلب بيانات المعاملة
            </button>

            <div id="loader">
              <i class="fas fa-spinner fa-spin fa-2x"></i>
              <p style="font-weight:900; margin:8px 0 0;">جاري البحث...</p>
            </div>

            <div id="resPanel">
              <div class="input-group" style="margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:8px;">
                <label><i class="fas fa-building"></i> الجهة المستفيدة:</label>
                <div id="cName" style="font-size:19px;font-weight:900;color:var(--primary);">---</div>
              </div>

              <div class="input-group" style="margin-bottom:12px;">
                <label><i class="fas fa-receipt"></i> التسعيرة المثبتة:</label>
                <div id="priceText" style="font-size:17px;font-weight:900;color:#222;">—</div>
              </div>

              <button id="payBtn" class="main-btn" type="button" style="background:linear-gradient(180deg,#2ebf68,#26a65b);" onclick="pay()">
                <i class="fas fa-check"></i>
                توثيق التسديد
              </button>
            </div>

          </div>
        </div>

        <div class="card success" id="successMessage">
          <i class="fas fa-check-circle"></i>
          <h2>تم الحفظ بنجاح</h2>
          <p id="detailsText">تم التسديد مبلغ امر العمل وتوثيقة</p>
          <button class="again" type="button" onclick="resetPage()">
            <i class="fas fa-plus"></i>
            معاملة جديدة
          </button>
        </div>

      </main>
    </div>

  </div>
</div>



<script>
const API_BASE = window.APP_CONFIG.API_BASE;
const PAGE_NAME = "finance";
  /* ── Cookie helpers ── */
  function setCookie(name, value, hours) {
    const exp = new Date(Date.now() + hours * 3600000).toUTCString();
    document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + exp + ";path=/;SameSite=Lax";
  }
  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
    return match ? decodeURIComponent(match[1]) : "";
  }
  function deleteCookie(name) {
    document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
  }


const STORAGE_KEY_PAGE   = "tracking_session_token_" + PAGE_NAME;
const STORAGE_KEY_GLOBAL = "tracking_session_token";
const SESSION_CACHE_KEY  = "tracking_session_cache_" + PAGE_NAME;

let currentUserName     = "";
let lastPayStatus       = "";
let sessionFailCount    = 0;
let liveSessionInterval = null;
let isFetching          = false;  // debounce للبحث
let isPaying            = false;  // debounce للتسديد
const MAX_SESSION_FAILS = 3;

/* ============================================================
 * SESSION HELPERS
 * ============================================================ */
function getSessionToken(){
  return (
    sessionStorage.getItem(STORAGE_KEY_PAGE)   ||
    sessionStorage.getItem(STORAGE_KEY_GLOBAL) ||
    localStorage.getItem(STORAGE_KEY_PAGE)     ||
    localStorage.getItem(STORAGE_KEY_GLOBAL)   ||
    ""
  );
}

function setSessionToken(token){
  if(!token) return;
  sessionStorage.setItem(STORAGE_KEY_PAGE,   token);
  sessionStorage.setItem(STORAGE_KEY_GLOBAL, token);
  localStorage.setItem(STORAGE_KEY_PAGE,     token);
  localStorage.setItem(STORAGE_KEY_GLOBAL,   token);
}

function clearSessionToken(){
  [STORAGE_KEY_PAGE, STORAGE_KEY_GLOBAL, SESSION_CACHE_KEY].forEach(function(k){
    sessionStorage.removeItem(k);
    localStorage.removeItem(k);
  });
}

function goToLogin(){
  clearSessionToken();
  if(liveSessionInterval){ clearInterval(liveSessionInterval); liveSessionInterval = null; }
  window.location.href = "login.html?p=" + encodeURIComponent(PAGE_NAME);
}

/* ============================================================
 * API — مع تحقق من HTTP status
 * ============================================================ */
async function apiPost(payload){
  const response = await fetch(API_BASE, {
    method:  "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body:    JSON.stringify(payload)
  });
  if(!response.ok) throw new Error("HTTP " + response.status + ": " + response.statusText);
  const text = await response.text();
  try{ return JSON.parse(text); }
  catch(err){ throw new Error(text || "Invalid JSON response"); }
}

/* ============================================================
 * SESSION CHECK — مع cache مثل main.html
 * ============================================================ */
function applySessionUI(userName){
  currentUserName = userName;
  document.getElementById("welcomeUser").innerHTML =
    '<i class="fas fa-user-shield"></i> المستخدم: ' + escapeHtml(userName);
  document.getElementById("pageWrap").classList.remove("loading");
}

async function ensurePageSession(){
  const token = getSessionToken();
  if(!token){ goToLogin(); return; }

  let usedCache = false;
  try{
    const raw = sessionStorage.getItem(SESSION_CACHE_KEY) || localStorage.getItem(SESSION_CACHE_KEY);
    if(raw){
      const cached = JSON.parse(raw);
      if(cached && cached.token === token && (Date.now() - (cached.ts||0)) < 600000){
        applySessionUI(cached.userName || "مخول غير معروف");
        usedCache = true;
      }
    }
  }catch(e){}

  try{
    const result = await apiPost({ action:"checkSession", token, page:PAGE_NAME });
    if(result && result.ok){
      setSessionToken(token);
      sessionFailCount = 0;
      const userName = result.user || result.userName || "مخول غير معروف";
      applySessionUI(userName);
      try{
        const cd = JSON.stringify({ token, userName, ts:Date.now() });
        sessionStorage.setItem(SESSION_CACHE_KEY, cd);
        localStorage.setItem(SESSION_CACHE_KEY, cd);
      }catch(e){}
    }else{
      try{ sessionStorage.removeItem(SESSION_CACHE_KEY); localStorage.removeItem(SESSION_CACHE_KEY); }catch(e){}
      if(!usedCache) goToLogin();
      else{ showMsg("⚠️ انتهت الجلسة، سيتم تسجيل الخروج...", "warn"); setTimeout(goToLogin, 2000); }
    }
  }catch(error){
    if(!usedCache){
      showMsg("❌ تعذر التحقق من الجلسة", "err");
      setTimeout(goToLogin, 900);
    }else{
      console.warn("Session check failed (using cache):", error);
    }
  }
}

async function checkLiveSession(){
  const token = getSessionToken();
  if(!token){ goToLogin(); return; }
  try{
    const res = await apiPost({ action:"checkSession", token, page:PAGE_NAME });
    if(!res || !res.ok){ sessionFailCount++; if(sessionFailCount >= MAX_SESSION_FAILS) goToLogin(); }
    else sessionFailCount = 0;
  }catch(e){
    sessionFailCount++;
    if(sessionFailCount >= MAX_SESSION_FAILS) goToLogin();
  }
}

/* ============================================================
 * UI HELPERS
 * ============================================================ */
function escapeHtml(text){
  return String(text == null ? "" : text)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function showMsg(text, type){ }

/* دالة مشتركة للتحقق من انتهاء الجلسة */
function handleSessionExpiry(msg){
  const s = String(msg || "");
  if(s.indexOf("انتهت الجلسة") !== -1 || s.indexOf("غير صالح") !== -1 || s.indexOf("غير مصرح") !== -1){
    showMsg("❌ انتهت الجلسة", "err");
    setTimeout(function(){ clearSessionToken(); goToLogin(); }, 800);
    return true;
  }
  return false;
}

function setFetchLoading(on){
  isFetching = on;
  const btn = document.getElementById("fetchBtn");
  if(on){
    btn.disabled = true;
    document.getElementById("loader").style.display = "block";
    document.getElementById("resPanel").style.display = "none";
  }else{
    btn.disabled = false;
    document.getElementById("loader").style.display = "none";
  }
}

/* ============================================================
 * FETCH DATA
 * ============================================================ */
async function fetchData(){
  if(isFetching) return;
  const id = String(document.getElementById("orderID").value || "").trim();
  if(!id){ showMsg("⚠️ يرجى إدخال رقم أمر العمل", "warn"); return; }
  const token = getSessionToken();
  if(!token){ goToLogin(); return; }

  setFetchLoading(true);
  isPaying = false;

  try{
    const data = await apiPost({ action:"getFinanceDetails", token, page:PAGE_NAME, orderNo:id });
    setFetchLoading(false);

    if(data && data.ok === false && data.message){
      if(handleSessionExpiry(data.message)) return;
      showMsg(data.message, "err");
      return;
    }

    if(data && data.found){
      document.getElementById("cName").innerText = data.clientName || "---";

      const btn        = document.getElementById("payBtn");
      const priceValue = Number(data.price || 0);

      if(priceValue > 0){
        document.getElementById("priceText").innerText = priceValue.toLocaleString("ar-IQ") + " دينار";
      }else{
        document.getElementById("priceText").innerText = "غير مسعّر";
        btn.disabled = true;
        btn.style.background = "#bdc3c7";
        btn.innerHTML = '<i class="fas fa-ban"></i> لا يمكن التسديد';
        document.getElementById("resPanel").style.display = "block";
        return;
      }

      lastPayStatus = String(data.status || "").trim();
      const done = lastPayStatus.includes("تم التسديد") || lastPayStatus.includes("✅");

      if(done){
        btn.disabled = true;
        btn.style.background = "#bdc3c7";
        btn.innerHTML = '<i class="fas fa-lock"></i> مسدد مسبقاً';
      }else{
        btn.disabled = false;
        btn.style.background = "linear-gradient(180deg,#2ebf68,#26a65b)";
        btn.innerHTML = '<i class="fas fa-check"></i> توثيق التسديد';
      }

      document.getElementById("resPanel").style.display = "block";
    }else{
      showMsg("⚠️ الرقم غير موجود", "warn");
    }
  }catch(err){
    setFetchLoading(false);
    showMsg("❌ خطأ في الاتصال", "err");
  }
}

/* ============================================================
 * PAY
 * ============================================================ */
async function pay(){
  if(isPaying) return;
  const id = String(document.getElementById("orderID").value || "").trim();
  if(!id){ showMsg("⚠️ يرجى إدخال رقم أمر العمل", "warn"); return; }
  const token = getSessionToken();
  if(!token){ goToLogin(); return; }

  isPaying = true;
  const btn = document.getElementById("payBtn");
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

  try{
    const r   = await apiPost({ action:"updatePaymentStatus", token, page:PAGE_NAME, orderNo:id, userName:currentUserName });
    const msg = String((r && (r.message || r.result)) || "");

    if(r && r.ok){
      document.getElementById("cardForm").style.display      = "none";
      document.getElementById("successMessage").style.display = "block";
    }else{
      if(handleSessionExpiry(msg)) return;
      showMsg(msg || "❌ تعذر الحفظ", "err");
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check"></i> توثيق التسديد';
      isPaying = false;
    }
  }catch(err){
    showMsg("❌ خطأ في الاتصال", "err");
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check"></i> توثيق التسديد';
    isPaying = false;
  }
}

/* ============================================================
 * RESET
 * ============================================================ */
function resetPage(){
  document.getElementById("orderID").value = "";
  document.getElementById("cardForm").style.display       = "block";
  document.getElementById("successMessage").style.display = "none";
  document.getElementById("resPanel").style.display       = "none";
  document.getElementById("loader").style.display         = "none";

  const btn = document.getElementById("payBtn");
  btn.disabled = false;
  btn.style.background = "linear-gradient(180deg,#2ebf68,#26a65b)";
  btn.innerHTML = '<i class="fas fa-check"></i> توثيق التسديد';

  document.getElementById("cName").innerText      = "---";
  document.getElementById("priceText").innerText  = "—";
  document.getElementById("fetchBtn").disabled    = false;

  lastPayStatus = "";
  isFetching    = false;
  isPaying      = false;
  document.getElementById("orderID").focus();
}

/* ============================================================
 * INIT
 * ============================================================ */
window.addEventListener("load", function(){
  ensurePageSession();
  liveSessionInterval = setInterval(checkLiveSession, 10000);

  document.getElementById("orderID").addEventListener("keydown", function(e){
    if(e.key === "Enter") fetchData();
  });
});
</script>
