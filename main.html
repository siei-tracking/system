<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const tokenFromUrl = params.get("token") || "";
      const tokenFromStorage = localStorage.getItem("wo_auth_token") || "";
      const roleFromUrl = params.get("role") || "";
      const roleFromStorage = localStorage.getItem("wo_auth_role") || "";
      const userFromUrl = params.get("user") || "";
      const userFromStorage = localStorage.getItem("wo_auth_user") || "";

      const finalToken = tokenFromUrl || tokenFromStorage;
      const finalRole  = roleFromUrl || roleFromStorage;
      const finalUser  = userFromUrl || userFromStorage;

      if (!finalToken) {
        window.location.replace("login.html?p=main");
        return;
      }

      try {
        localStorage.setItem("wo_auth_token", finalToken);
        if (finalRole) localStorage.setItem("wo_auth_role", finalRole);
        if (finalUser) localStorage.setItem("wo_auth_user", finalUser);
      } catch (e) {}

      if (tokenFromUrl || roleFromUrl || userFromUrl) {
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
      }
    })();
  </script>

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.88);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --disabled:#bdc3c7;
      --soft:#f8fafc;
      --warn:#f39c12;
      --admin:#6f42c1;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
        var(--bg);
      color:#111;
    }

    .company-header{
      background-image:
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
        url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');
      background-size:cover;
      background-position:center;
      padding:64px 5% 60px;
      display:flex;
      align-items:center;
      gap:16px;
      color:#fff;
      flex-wrap:wrap;
      justify-content:center;
      text-align:center;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .company-logo{
      width:100px;
      height:100px;
      background:#fff;
      border-radius:50%;
      padding:5px;
      object-fit:contain;
      display:block;
      flex-shrink:0;
      box-shadow:
        -1px -1px 0 rgba(0,0,0,0.1),
         1px -1px 0 rgba(0,0,0,0.1),
        -1px  1px 0 rgba(0,0,0,0.1),
         1px  1px 0 rgba(0,0,0,0.1),
         0 1px 4px rgba(0,0,0,0.1) !important;
    }

    .header-text{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .header-text h1{
      color:#fff !important;
      margin:0;
      font-size:30px !important;
      font-weight:900 !important;
      text-shadow:
        -1px -1px 0 rgba(0,0,0,0.9),
         1px -1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9),
         1px  1px 0 rgba(0,0,0,0.9),
         0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .header-text p{
      color:#fff !important;
      margin:0;
      font-size:18px !important;
      font-weight:900 !important;
      text-shadow:
        -1px -1px 0 rgba(0,0,0,0.9),
         1px -1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9),
         1px  1px 0 rgba(0,0,0,0.9),
         0 4px 10px rgba(0,0,0,0.8) !important;
    }

    .wrap{
      padding:0 5% 30px;
      display:flex;
      justify-content:center;
      position:relative;
      margin-top:-40px;
    }

    .panel{
      width:100%;
      max-width:1275px;
      margin-top:13px;
      background:rgba(255,255,255,0.88);
      border-radius:22px;
      padding:0;
      box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 6px 18px rgba(0,0,0,.06);
      position:relative;
      z-index:2;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition:.25s;
      border:1px solid rgba(255,255,255,.65);
      overflow:hidden;
    }

    .panel:hover{
      transform:translateY(-3px);
      box-shadow:
        0 26px 60px rgba(0,0,0,.16),
        0 8px 22px rgba(0,0,0,.08);
    }

    .panel::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:60px;
      background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
      border-radius:22px 22px 0 0;
      pointer-events:none;
    }

    .panel-head{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      position:relative;
      z-index:2;
      background:linear-gradient(180deg, rgba(243,156,18,0.08), transparent);
    }

    .title{
      font-weight:900;
      color:var(--primary);
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      position:relative;
      z-index:10;
      width:100%;
    }

    input, select{
      padding:12px 12px;
      border-radius:10px;
      border:1.5px solid var(--line);
      font-family:'Cairo',sans-serif;
      font-weight:900;
      text-align:center;
      min-width:180px;
      outline:none;
      background:#fff;
      transition:.2s;
      color:#1f2d3a;
    }

    input:focus, select:focus{
      border-color:#d8b15d;
      box-shadow:0 0 0 4px rgba(245,166,35,.10);
    }

    input::placeholder{
      color:#9aa6b2;
      font-weight:800;
    }

    .btn{
      padding:12px 14px;
      border:none;
      border-radius:10px;
      font-family:'Cairo',sans-serif;
      font-weight:900;
      font-size:18px;
      cursor:pointer;
      display:inline-flex;
      gap:10px;
      align-items:center;
      transition:.2s;
      white-space:nowrap;
      touch-action:manipulation;
      position:relative;
      overflow:hidden;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      right:-120%;
      width:120%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,.18) 40%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.18) 60%,
        transparent 80%
      );
      transition:.65s;
    }

    .btn:hover::before{
      right:120%;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:.96;
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .btn-primary{
      background:linear-gradient(180deg,#1e3c72,#162c52);
      color:#fff;
      box-shadow:0 10px 20px rgba(30,60,114,.20);
    }

    .btn-warn{
      background:linear-gradient(180deg,#e74c3c,#c0392b);
      color:#fff;
      box-shadow:0 10px 20px rgba(231,76,60,.20);
    }

    .btn-ok{
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      color:#fff;
      box-shadow:0 10px 20px rgba(39,174,96,.20);
    }

    .btn-ghost{
      background:#eef2f6;
      color:#1f2d3a;
    }

    .btn-admin{
      background:linear-gradient(180deg,#7b4bd3,#5f35b1);
      color:#fff;
      box-shadow:0 10px 20px rgba(111,66,193,.20);
    }

    .file-btn{
      border:none;
      border-radius:10px;
      padding:12px 14px;
      font-family:'Cairo',sans-serif;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:linear-gradient(180deg,#2ebf68,#26a65b);
      color:#fff;
      box-shadow:0 10px 20px rgba(39,174,96,.20);
      transition:.2s;
      white-space:nowrap;
    }

    .file-btn:hover{
      transform:translateY(-1px);
      opacity:.96;
    }

    .bar{
      padding:12px 18px;
      border-bottom:1px solid var(--line);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      background:#fafbfc;
      font-weight:900;
      position:relative;
      z-index:2;
    }

    .bar-right,
    .bar-left{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .stat{
      display:inline-flex;
      align-items:center;
      justify-content:flex-start;
      gap:6px;
      padding:8px 12px;
      border-radius:12px;
      background:#fff;
      border:1px solid #eef1f4;
      font-weight:900;
      color:#111;
    }

    .stat .muted{
      color:var(--muted);
      font-size:15px;
      margin-left:2px;
    }

    #count{
      font-size:18px;
      margin-right:2px;
      height:32px;
      min-width:25px;
    }

    #at{
      font-size:18px;
      margin-right:2px;
      height:32px;
      min-width:60px;
    }

    .date-input{
      min-width:181px;
      width:181px;
      height:50px;
      padding:0 14px;
      border-radius:12px;
      border:1.5px solid var(--line);
      font-family:'Cairo',sans-serif;
      font-weight:900;
      font-size:16px;
      text-align:center;
      line-height:56px;
      background:#fff;
      color:#1f2d3a;
    }

    #status{
      padding:10px 18px;
      border-bottom:1px solid var(--line);
      font-weight:900;
      position:relative;
      z-index:2;
    }

    #status.ok{ color:#1d5e3b; }
    #status.bad{ color:var(--danger); }

    .list{
      padding:14px 18px 22px;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      position:relative;
      z-index:2;
    }

    .item{
      border:1px solid #eef1f4;
      border-radius:16px;
      padding:14px;
      background:#fff;
      box-shadow:0 10px 24px rgba(0,0,0,.04);
    }

    .row1{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
      border-bottom:1px solid #f0f3f6;
      padding-bottom:10px;
      margin-bottom:10px;
    }

    .action-wrap{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .idbox{
      display:flex;
      font-size:17px;
      align-items:center;
      gap:10px;
      font-weight:900;
      color:var(--primary);
      flex-wrap:wrap;
    }

    .pill{
      padding:6px 10px;
      border-radius:999px;
      background:#f6f8fa;
      border:1px solid #eef1f4;
      font-weight:900;
      font-size:15px;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .pill.ok{
      background:rgba(39,174,96,.10);
      border-color:rgba(39,174,96,.22);
      color:#1d5e3b;
    }

    .pill.bad{
      background:rgba(231,76,60,.10);
      border-color:rgba(231,76,60,.20);
      color:#7b1f17;
    }

    .late{
      margin-top:8px;
      font-weight:900;
      color:var(--danger);
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .client{
      margin-top:8px;
      font-size:17px;
      font-weight:900;
      color:#111;
    }

    .stepper-scroll{
      overflow-x:auto;
      padding:4px 2px 2px;
    }

    .stepper{
      display:flex;
      gap:12px;
      width:max-content;
      align-items:flex-start;
      padding:4px 2px 8px;
      direction:rtl;
    }

    .node{
      width:98px;
      min-width:98px;
      text-align:center;
      font-weight:900;
      position:relative;
      padding:2px 1px 6px;
      user-select:none;
    }

    .node:not(:first-child)::before{
      content:"";
      position:absolute;
      top:25px;
      right:-10px;
      width:10px;
      height:3px;
      background:#dfe5ec;
      border-radius:999px;
    }

    .circle{
      width:56px;
      height:56px;
      border-radius:50%;
      background:var(--disabled);
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      margin:auto;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
    }

    .circle i{ font-size:16px; }
    .node.done .circle{ background:var(--ok); }
    .node.next .circle{ background:var(--accent); transform:scale(1.04); }
    .node.done:not(:first-child)::before{ background:var(--ok); }
    .node.next:not(:first-child)::before{ background:var(--accent); }

    .label{
      margin-top:5px;
      font-size:15px;
    }

    .sub{
      margin-top:5px;
      min-height:36px;
      line-height:1.2;
    }

    .sub-name{
      font-size:13px;
      font-weight:900;
      display:block;
      line-height:1.2;
      margin-top:8px;
    }

    .sub-date{
      font-size:11px;
      font-weight:900;
      direction:ltr;
      display:block;
      line-height:1.2;
      margin-top:2px;
    }

    .empty{
      padding:26px 18px;
      text-align:center;
      font-weight:900;
      color:var(--muted);
    }

    #toast{
      position:fixed;
      bottom:22px;
      left:50%;
      transform:translateX(-50%);
      min-width:240px;
      max-width:90%;
      background:#223243;
      color:#fff;
      padding:12px 18px;
      border-radius:12px;
      font-weight:900;
      font-family:'Cairo',sans-serif;
      font-size:14px;
      display:none;
      z-index:99999;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,.22);
    }

    #toast.ok{ background:#27ae60; }
    #toast.warn{ background:#f39c12; }
    #toast.err{ background:#e74c3c; }

    #qDone{
      flex:1;
      min-width:100px;
      height:50px;
      font-size:18px;
      line-height:50px;
      padding:0 12px;
    }

    #qDone::placeholder{
      font-size:15px;
      font-weight:900;
    }

    #sheetSelect{
      flex:1;
      min-width:100px;
      height:50px;
      font-size:18px;
      line-height:50px;
      padding:0 12px;
    }

    #btnAdmin{
      margin-left:20px;
    }

    #btnSearchDone{
      height:57px;
      min-width:106px;
      padding:0 16px;
      font-size:16px;
      font-weight:900;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-left:auto;
    }

    #btnExport{
      height:57px;
      min-width:106px;
      padding:0 16px;
      font-size:16px;
      font-weight:900;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    @media (max-width:820px){
      .header-text h1{ font-size:24px; }
      .header-text p{ font-size:15px; }
      input, select{ min-width:220px; width:100%; }
      .controls{ width:100%; justify-content:stretch; }
      .btn{ width:100%; justify-content:center; }
      .file-btn{ width:100%; justify-content:center; }
      .action-wrap{ width:100%; justify-content:stretch; }
      .bar-right, .bar-left{ width:100%; }
      .date-input{ width:100%; min-width:unset; }
    }
  </style>
</head>
<body>

<header class="company-header">
  <img src="https://drive.google.com/thumbnail?id=1NN7G2zhk7nhgXuPWGW4qE_pdGC-Ptjkt&sz=w500" class="company-logo" alt="logo">
  <div class="header-text">
    <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
    <p>
      <i class="fas fa-layer-group"></i>
      منصة تتبع اوامر العمل - المعاملات
    </p>
  </div>
</header>

<div class="wrap">
  <div class="panel">

    <div class="panel-head">
      <div>
        <div class="title"><i class="fas fa-list-check"></i> قائمة المعاملات</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="btnOpen" type="button">
          <i class="fas fa-folder-open"></i> غير المنجز
        </button>

        <button class="btn btn-warn" id="btnDelayed" type="button">
          <i class="fas fa-triangle-exclamation"></i> المتأخر
        </button>

        <button class="btn btn-ghost" id="btnOpenArchive" type="button" style="display:none;">
          <i class="fas fa-table"></i> فتح شيت المعاملات
        </button>

        <button class="btn btn-admin" id="btnAdmin" type="button" style="display:none;">
          <i class="fas fa-users-cog"></i> إدارة المستخدمين
        </button>

        <select id="sheetSelect"></select>

        <input id="qDone" type="text" placeholder="بحث: رقم أمر العمل" />
        <button class="btn btn-primary" id="btnSearchDone" type="button">
          <i class="fas fa-magnifying-glass"></i> بحث
        </button>
      </div>
    </div>

    <div class="bar">
      <div class="bar-right">
        <div class="stat"><i class="fas fa-list"></i> <span class="muted">العدد:</span> <span id="count">0</span></div>
        <div class="stat"><i class="fas fa-clock"></i> <span class="muted">آخر تحديث:</span> <span id="at">—</span></div>
      </div>

      <div class="bar-left">
        <input type="date" id="dateFrom" class="date-input">
        <input type="date" id="dateTo" class="date-input">

        <button class="btn btn-ok" id="btnDone" type="button">
          <i class="fas fa-check-circle"></i> الإنجاز
        </button>

        <button class="btn btn-primary" id="btnExport" type="button">
          <i class="fas fa-file-excel"></i> تصدير
        </button>
      </div>
    </div>

    <div id="status" class="ok">جاهز...</div>
    <div id="list" class="list"></div>

  </div>
</div>

<div id="toast"></div>

<script>
  const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxtdvFycvRHSKeXh5Wqh3BZpBQ0Mzlr3pakPB86WrYabIUS9hbl9WeMyBolQrQCyvPl/exec";

  const PARAMS = new URLSearchParams(window.location.search);
  const AUTH_TOKEN = PARAMS.get("token") || localStorage.getItem("wo_auth_token") || "";
  const CURRENT_USER_ROLE = PARAMS.get("role") || localStorage.getItem("wo_auth_role") || "";
  const APP_URL = window.location.origin + window.location.pathname.replace(/[^/]+$/, "");

  let CURRENT_MODE = "open";
  let CURRENT_ITEMS = [];

  function safeErr(err){
    try{
      if(!err) return "Unknown error";
      if(typeof err === "string") return err;
      if(err.message) return err.message;
      return JSON.stringify(err);
    }catch(e){
      return String(err);
    }
  }

  function showMsg(text, type){
    var t = document.getElementById("toast");
    t.className = "";

    if(type === "ok") t.classList.add("ok");
    else if(type === "warn") t.classList.add("warn");
    else if(type === "err") t.classList.add("err");

    t.textContent = text || "";
    t.style.display = "block";

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){
      t.style.display = "none";
    }, 2500);
  }

  function setStatus(msg, ok){
    var el = document.getElementById("status");
    el.className = ok ? "ok" : "bad";
    el.textContent = msg;
  }

  function setLoading(on){
    document.getElementById("btnOpen").disabled = on;
    document.getElementById("btnDelayed").disabled = on;
    document.getElementById("btnDone").disabled = on;
    document.getElementById("btnSearchDone").disabled = on;
    document.getElementById("sheetSelect").disabled = on;
    document.getElementById("dateFrom").disabled = on;
    document.getElementById("dateTo").disabled = on;
    document.getElementById("qDone").disabled = on;

    var btnExport = document.getElementById("btnExport");
    if(btnExport) btnExport.disabled = on;

    var btnOpenArchive = document.getElementById("btnOpenArchive");
    if(btnOpenArchive){
      var isAdmin = String(CURRENT_USER_ROLE || "").trim().toLowerCase() === "admin";
      btnOpenArchive.disabled = on || !isAdmin;
    }

    var btnAdmin = document.getElementById("btnAdmin");
    if(btnAdmin){
      var isAdmin2 = String(CURRENT_USER_ROLE || "").trim().toLowerCase() === "admin";
      btnAdmin.disabled = on || !isAdmin2;
    }

    if(on) setStatus("جاري التحميل...", true);
  }

  async function apiGet(action, params){
    const qs = new URLSearchParams({ action: action });

    Object.keys(params || {}).forEach(function(key){
      const val = params[key];
      if(val !== undefined && val !== null && val !== ""){
        qs.append(key, val);
      }
    });

    const res = await fetch(GAS_WEBAPP_URL + "?" + qs.toString(), {
      method: "GET",
      mode: "cors"
    });

    const text = await res.text();

    if(!res.ok){
      throw new Error("HTTP " + res.status + " | " + text.slice(0, 200));
    }

    try{
      return JSON.parse(text);
    }catch(e){
      throw new Error("JSON parse error | " + text.slice(0, 200));
    }
  }

  async function loadSheetOptions(){
    try{
      const res = await apiGet("mainSearchSheets", {});
      var sheets = (res && res.items) ? res.items : [];
      var select = document.getElementById("sheetSelect");
      if(!select) return;

      select.innerHTML = "";

      if(!sheets.length){
        var opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "لا توجد سنوات";
        select.appendChild(opt);
        return;
      }

      sheets.forEach(function(name){
        var opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });

      var currentYear = new Date().getFullYear().toString();
      if(sheets.indexOf(currentYear) !== -1){
        select.value = currentYear;
      }else{
        select.value = sheets[0];
      }
    }catch(err){
      console.log("sheet options error:", safeErr(err));
    }
  }

  function showAdminButton(){
    var btnAdmin = document.getElementById("btnAdmin");
    var btnSheet = document.getElementById("btnOpenArchive");
    var isAdmin = String(CURRENT_USER_ROLE || "").trim().toLowerCase() === "admin";

    if(btnAdmin){
      btnAdmin.style.display = isAdmin ? "inline-flex" : "none";
      btnAdmin.disabled = !isAdmin;
    }

    if(btnSheet){
      btnSheet.style.display = isAdmin ? "inline-flex" : "none";
      btnSheet.disabled = !isAdmin;

  function openAdminPage(){
    if(!AUTH_TOKEN){
      setStatus("❌ رمز الجلسة غير متوفر", false);
      showMsg("❌ لا يمكن فتح صفحة الإدارة", "err");
      window.location.href = "login.html?p=main";
      return;
    }

    var url = "admin.html?token=" + encodeURIComponent(AUTH_TOKEN) + "&role=" + encodeURIComponent(CURRENT_USER_ROLE || "admin");
    window.location.href = url;
  }

  function isDoneAny(v){
    return String(v || "").indexOf("✅") !== -1;
  }

  function formatSub(val, done, cls, stepKey){
    if(!done){
      return (cls.indexOf("next") !== -1)
        ? '<div class="sub-date">الخطوة الحالية</div>'
        : '<div class="sub-date">بانتظار</div>';
    }

    val = String(val || "");
    val = val.replace("✅", "").replace("استلام -", "").replace("استلام", "").trim();

    var name = "";
    var date = "";

    var dt = val.match(/(\d{4}-\d{2}-\d{2}\s*\|\s*\d{2}:\d{2})/);
    if(dt){
      date = dt[1].trim();
      name = val.replace(dt[1], "").trim();
    } else {
      date = val.trim();
    }

    if(stepKey === "pricing"){
      name = name.replace(/^[\-\–—\s]+/, "").trim();
      name = name.replace(/[\-\–—\s]+$/, "").trim();
      name = name.replace(/[()]/g, "").trim();
    }

    if(stepKey === "payment"){
      name = name.replace("تم التسديد", "").trim();
      date = date.replace("تم التسديد", "").trim();
    }

    return ''
      + '<div class="sub-name">' + (name || "") + '</div>'
      + '<div class="sub-date">' + (date || "") + '</div>';
  }

  function inferType(it){
    var pricingDone = isDoneAny(it.pricing);
    if(!pricingDone) return "";

    var t = String(it.testType || "").trim();
    if(t === "مصاعد" || t === "مختبرات") return t;

    var elev = String(it.elev || "").trim();
    var lab1 = String(it.lab1 || "").trim();
    var workshop = String(it.workshop || "").trim();
    var lab2 = String(it.lab2 || "").trim();

    if(elev && elev !== "-" && elev !== "—") return "مصاعد";
    if(lab1 || workshop || lab2) return "مختبرات";

    return "";
  }

  function inferLabPath(it){
    var pricingDone = isDoneAny(it.pricing);
    if(!pricingDone) return "";

    var labPath = String(it.labPath || "").trim();
    if(labPath) return labPath;

    var workshop = String(it.workshop || "").trim();
    var lab2 = String(it.lab2 || "").trim();

    if(workshop || lab2) return "ورشة";
    return "مختبرات فقط";
  }

  function buildSteps(it){
    var type = inferType(it);
    var labPath = inferLabPath(it);

    var pricingDone = isDoneAny(it.pricing);
    var workflowReady = pricingDone && !!type;

    var steps = [
      {key:"inspection",  label:"استلام",  icon:"fa-handshake"},
      {key:"pricing",     label:"تسعيرة",  icon:"fa-receipt"}
    ];

    if(!workflowReady){
      return steps;
    }

    steps.push({key:"payment", label:"تسديد", icon:"fa-sack-dollar"});

    if(type === "مصاعد"){
      steps.push({key:"elev", label:"مصاعد", icon:"fa-elevator"});
    }else{
      steps.push({key:"lab1", label:"مختبرات", icon:"fa-microscope"});
      if(labPath !== "مختبرات فقط"){
        steps.push({key:"workshop", label:"ورشة", icon:"fa-screwdriver-wrench"});
        steps.push({key:"lab2", label:"مختبرات", icon:"fa-flask"});
      }
    }

    steps.push({key:"testResults", label:"نتائج", icon:"fa-clipboard-check"});
    steps.push({key:"official",    label:"كتاب",  icon:"fa-file"});
    steps.push({key:"barcode",     label:"باركود", icon:"fa-qrcode"});
    steps.push({key:"email",       label:"ايميل", icon:"fa-paper-plane"});
    steps.push({key:"final",       label:"استلام", icon:"fa-flag-checkered"});

    return steps;
  }

  function typePills(it){
    var pricingDone = isDoneAny(it.pricing);
    var type = inferType(it);
    var labPath = inferLabPath(it);

    if(!pricingDone || !type){
      return '<span class="pill bad"><i class="fas fa-hourglass-half"></i>بانتظار التسعيرة</span>';
    }

    var typePill = '<span class="pill bad"><i class="fas fa-triangle-exclamation"></i> غير محدد</span>';

    if(type === "مصاعد"){
      typePill = '<span class="pill ok"><i class="fas fa-elevator"></i> مصاعد</span>';
    } else if(type === "مختبرات"){
      typePill = '<span class="pill ok"><i class="fas fa-microscope"></i> مختبرات</span>';
    }

    var showPathPill =
      type === "مختبرات" &&
      labPath &&
      labPath !== "مختبرات فقط";

    var pathPill = showPathPill
      ? '<span class="pill"><i class="fas fa-route"></i> ' + labPath + '</span>'
      : "";

    return typePill + (pathPill ? " " + pathPill : "");
  }

  function renderStepper(it){
    var steps = buildSteps(it);
    var firstPending = false;

    var pricingDone = isDoneAny(it.pricing);
    var type = inferType(it);
    var workflowReady = pricingDone && !!type;

    var html = '<div class="stepper-scroll"><div class="stepper">';

    for(var i = 0; i < steps.length; i++){
      var s = steps[i];
      var val = String(it[s.key] || "");
      var done = isDoneAny(val);

      var cls = "node";
      if(done){
        cls += " done";
      }else if(!firstPending){
        cls += " next";
        firstPending = true;
      }else{
        cls += " locked";
      }

      var sub = formatSub(val, done, cls, s.key);

      html += '<div class="' + cls + '">'
           +    '<div class="circle"><i class="fas ' + s.icon + '"></i></div>'
           +    '<div class="label">' + s.label + '</div>'
           +    '<div class="sub">' + sub + '</div>'
           +  '</div>';
    }

    html += '</div></div>';

    if(!workflowReady){
      html += ''
        + '<div class="empty" style="padding-top:8px;">'
        +   '<i class="fas fa-circle-info"></i> '
        +   'تظهر بقية المراحل بعد تثبيت التسعيرة ونوع الفحص'
        + '</div>';
    }

    return html;
  }

  function escapeHtml(s){
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function getExportTitleByMode(mode){
    if(mode === "open") return "تقرير المعاملات غير المنجزة";
    if(mode === "delayed") return "تقرير المعاملات المتأخرة";
    if(mode === "done") return "تقرير المعاملات المنجزة";
    if(mode === "search") return "تقرير نتائج البحث";
    return "تقرير المعاملات";
  }

  function exportCurrentTable(){
    if(!CURRENT_ITEMS || !CURRENT_ITEMS.length){
      setStatus("⚠️ لا توجد بيانات معروضة للتصدير", false);
      showMsg("⚠️ لا توجد بيانات للتصدير", "warn");
      return;
    }

    var rows = [];
    for(var i = 0; i < CURRENT_ITEMS.length; i++){
      var it = CURRENT_ITEMS[i] || {};
      rows.push({
        orderNo: String(it.orderNo || "").trim() || "—",
        orderDate: String(it.orderDate || "").trim() || "—",
        clientName: String(it.clientName || "").trim() || "—",
        lastStage: String(it.lastStage || "").trim() || "—"
      });
    }

    var title = getExportTitleByMode(CURRENT_MODE);
    var now = new Date();
    var yyyy = now.getFullYear();
    var mm = String(now.getMonth() + 1).padStart(2, "0");
    var dd = String(now.getDate()).padStart(2, "0");
    var hh = String(now.getHours()).padStart(2, "0");
    var mi = String(now.getMinutes()).padStart(2, "0");
    var fileName = title + "_" + yyyy + "-" + mm + "-" + dd + "_" + hh + "-" + mi + ".xls";

    var html = ''
      + '<html dir="rtl" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">'
      + '<head><meta charset="UTF-8"></head>'
      + '<body>'
      + '<table border="1" style="border-collapse:collapse;font-family:Cairo,Arial,sans-serif;text-align:center;">'
      + '<tr>'
      +   '<th colspan="4" style="background:#223243;color:#fff;font-size:18px;padding:10px;">' + escapeHtml(title) + '</th>'
      + '</tr>'
      + '<tr>'
      +   '<th style="background:#f5a623;color:#111;padding:8px;">رقم أمر العمل</th>'
      +   '<th style="background:#f5a623;color:#111;padding:8px;">تاريخ أمر العمل</th>'
      +   '<th style="background:#f5a623;color:#111;padding:8px;">الجهة المستفيدة</th>'
      +   '<th style="background:#f5a623;color:#111;padding:8px;">آخر مرحلة</th>'
      + '</tr>';

    for(var j = 0; j < rows.length; j++){
      html += '<tr>'
        + '<td style="padding:8px;">' + escapeHtml(rows[j].orderNo) + '</td>'
        + '<td style="padding:8px;">' + escapeHtml(rows[j].orderDate) + '</td>'
        + '<td style="padding:8px;">' + escapeHtml(rows[j].clientName) + '</td>'
        + '<td style="padding:8px;">' + escapeHtml(rows[j].lastStage) + '</td>'
        + '</tr>';
    }

    html += '</table></body></html>';

    var blob = new Blob(['\ufeff' + html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showMsg("✅ تم تصدير الجدول بنجاح", "ok");
  }

  function renderList(res, mode){
    if(res && res.error){
      CURRENT_MODE = mode || "open";
      CURRENT_ITEMS = [];

      document.getElementById("count").textContent = "0";
      document.getElementById("at").textContent = res.at || "—";
      document.getElementById("list").innerHTML = "";
      setStatus("❌ خطأ من السيرفر: " + res.error, false);
      showMsg("❌ خطأ من السيرفر", "err");
      return;
    }

    var items = (res && res.items) ? res.items : [];
    CURRENT_MODE = mode || "open";
    CURRENT_ITEMS = items.slice();

    document.getElementById("count").textContent = String(items.length);
    document.getElementById("at").textContent = (res && res.at) ? res.at : "—";

    if(!items.length){
      document.getElementById("list").innerHTML =
        '<div class="empty"><i class="fas fa-check-circle"></i> لا توجد معاملات</div>';
      setStatus("تم التحميل — items=0", true);
      return;
    }

    var html = "";

    for(var i = 0; i < items.length; i++){
      var it = items[i] || {};
      var orderNo = it.orderNo || "";
      var client  = it.clientName || "—";
      var lateDays = Number(it.lateDays || 0);
      var fileUrl = String(it.barcodeFileUrl || it.barcodeLink || it.fileUrl || it.fileLink || "").trim();

      html += '<div class="item">';
      html +=   '<div class="row1">';
      html +=     '<div>';
      html +=       '<div class="idbox">أمر العمل : <span>' + escapeHtml(orderNo) + '</span> ' + typePills(it) + '</div>';
      html +=       '<div class="client"><i class="fas fa-building"></i> ' + escapeHtml(client) + '</div>';

      if(mode === "delayed"){
        html += '<div class="late"><i class="fas fa-hourglass-half"></i> متأخر ' + lateDays + ' يوم</div>';
      }

      html +=     '</div>';
      html +=     '<div class="action-wrap">';

      if(mode === "done" || mode === "search"){
        if(fileUrl){
          html += '<a href="' + escapeHtml(fileUrl) + '" target="_blank" class="file-btn">'
               +    '<i class="fas fa-up-right-from-square"></i> فتح الملف'
               +  '</a>';
        } else {
          html += '<button class="btn btn-ghost" type="button" disabled>'
               +    '<i class="fas fa-ban"></i> لا يوجد ملف'
               +  '</button>';
        }
      }

      html +=     '</div>';
      html +=   '</div>';
      html +=   renderStepper(it);
      html += '</div>';
    }

    document.getElementById("list").innerHTML = html;
    setStatus("تم التحميل بنجاح", true);
  }

  async function loadOpen(){
    try{
      setLoading(true);
      const res = await apiGet("openOrders", {});
      setLoading(false);
      renderList(res, "open");
    }catch(err){
      setLoading(false);
      setStatus("❌ فشل تحميل غير المنجز: " + safeErr(err), false);
      showMsg("❌ فشل تحميل غير المنجز", "err");
    }
  }

  async function loadDelayed(){
    try{
      setLoading(true);
      const res = await apiGet("delayedOrders", {});
      setLoading(false);
      renderList(res, "delayed");
    }catch(err){
      setLoading(false);
      setStatus("❌ فشل تحميل المتأخر: " + safeErr(err), false);
      showMsg("❌ فشل تحميل المتأخر", "err");
    }
  }

  async function loadDone(){
    try{
      var from = String(document.getElementById("dateFrom").value || "").trim();
      var to   = String(document.getElementById("dateTo").value || "").trim();

      setLoading(true);
      const res = await apiGet("completedOrders", { from: from, to: to });
      setLoading(false);
      renderList(res, "done");
    }catch(err){
      setLoading(false);
      setStatus("❌ فشل تحميل الإنجاز: " + safeErr(err), false);
      showMsg("❌ فشل تحميل الإنجاز", "err");
    }
  }

  async function searchAny(){
    try{
      var q = String(document.getElementById("qDone").value || "").trim();
      var sheet = String(document.getElementById("sheetSelect").value || "").trim();
      var from = String(document.getElementById("dateFrom").value || "").trim();
      var to   = String(document.getElementById("dateTo").value || "").trim();

      if(!q){
        setStatus("⚠️ أدخل رقم أمر العمل للبحث", false);
        showMsg("⚠️ أدخل رقم أمر العمل", "warn");
        return;
      }

      setLoading(true);
      const res = await apiGet("mainSearch", {
        q: q,
        sheet: sheet,
        from: from,
        to: to
      });
      setLoading(false);
      renderList(res, "search");
    }catch(err){
      setLoading(false);
      setStatus("❌ فشل البحث: " + safeErr(err), false);
      showMsg("❌ فشل البحث", "err");
    }
  }

  async function openArchiveSheet(){
    if(String(CURRENT_USER_ROLE || "").trim().toLowerCase() !== "admin"){
      setStatus("❌ هذه العملية متاحة للمشرف فقط", false);
      showMsg("❌ غير مصرح", "err");
      return;
    }

    try{
      const res = await apiGet("openArchiveSheet", { token: AUTH_TOKEN });
      if(!res || !res.ok){
        setStatus("❌ " + (res && res.error ? res.error : "لا يمكن فتح الشيت"), false);
        showMsg("❌ لا يمكن فتح الشيت", "err");
        return;
      }
      window.open(res.url, "_blank");
    }catch(err){
      setStatus("❌ خطأ: " + safeErr(err), false);
      showMsg("❌ خطأ في فتح الشيت", "err");
    }
  }

  window.addEventListener("load", function(){
    var openSheetBtn = document.getElementById("btnOpenArchive");
    var adminBtn = document.getElementById("btnAdmin");

    (function setDefaultDates(){
      const today = new Date();
      const toDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const fromDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());

      const formatLocal = function(d){
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      };

      document.getElementById("dateFrom").value = formatLocal(fromDate);
      document.getElementById("dateTo").value = formatLocal(toDate);
    })();

    showAdminButton();
    loadSheetOptions();

    document.getElementById("btnOpen").addEventListener("click", loadOpen);
    document.getElementById("btnDelayed").addEventListener("click", loadDelayed);
    document.getElementById("btnDone").addEventListener("click", loadDone);
    document.getElementById("btnSearchDone").addEventListener("click", searchAny);
    document.getElementById("btnExport").addEventListener("click", exportCurrentTable);

    if(openSheetBtn){
      openSheetBtn.addEventListener("click", openArchiveSheet);
    }

    if(adminBtn){
      adminBtn.addEventListener("click", openAdminPage);
    }

    document.getElementById("qDone").addEventListener("keypress", function(e){
      if(e.key === "Enter") searchAny();
    });

    loadOpen();
  });
</script>
