<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>المعاملات - منصة تتبع أوامر العمل</title>
  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
  <link rel="stylesheet" href="watermark.css">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --primary:#223243;
      --primary-2:#1b2835;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.92);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --warn:#f39c12;
      --info:#3498db;
      --disabled:#bdc3c7;
      --soft:#f8fafc;
      --admin:#6f42c1;
      --shadow:0 12px 30px rgba(20,34,51,.08);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      padding:0;
      font-family:'Cairo',sans-serif;
      background:linear-gradient(180deg,#f6f8fb 0%, #eef2f6 100%);
      color:var(--primary);
      min-height:100%;
    }

    body{
      padding:18px;
    }

    .container{
      width:min(1500px, 100%);
      margin:0 auto;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      background:
        linear-gradient(rgba(34,50,67,.82), rgba(34,50,67,.88)),
        url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1600');
      background-size:cover;
      background-position:center;
      box-shadow:var(--shadow);
      color:#fff;
      padding:26px 24px 20px;
      margin-bottom:16px;
    }

    .hero-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .logo-wrap{
      width:78px;
      height:78px;
      border-radius:22px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      backdrop-filter:blur(6px);
    }

    .logo-wrap img{
      width:56px;
      height:56px;
      object-fit:contain;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,.2));
    }

    .titles{
      min-width:0;
    }

    .titles h1{
      margin:0 0 6px;
      font-size:28px;
      line-height:1.2;
      font-weight:900;
    }

    .titles p{
      margin:0;
      color:rgba(255,255,255,.88);
      font-size:15px;
      line-height:1.8;
    }

    .session-box{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-end;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.15);
      color:#fff;
      font-size:14px;
      white-space:nowrap;
      backdrop-filter:blur(8px);
    }

    .toolbar{
      background:var(--card);
      border:1px solid rgba(255,255,255,.65);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }

    .toolbar-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }

    .toolbar-group{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .btn,
    .field,
    .select{
      font-family:'Cairo',sans-serif;
      border:none;
      outline:none;
      border-radius:16px;
      transition:.2s ease;
    }

    .btn{
      height:46px;
      padding:0 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
      white-space:nowrap;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .btn-primary{ background:var(--primary); color:#fff; }
    .btn-warn{ background:var(--warn); color:#fff; }
    .btn-success{ background:var(--ok); color:#fff; }
    .btn-info{ background:var(--info); color:#fff; }
    .btn-ghost{ background:#fff; color:var(--primary); border:1px solid var(--line); }
    .btn-admin{ background:var(--admin); color:#fff; }
    .btn-danger{ background:var(--danger); color:#fff; }

    .btn.active{
      box-shadow:0 0 0 3px rgba(245,166,35,.22), 0 8px 20px rgba(0,0,0,.08);
      transform:translateY(-1px);
    }

    .select,
    .field{
      height:46px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--primary);
      padding:0 14px;
      font-size:15px;
      min-width:150px;
    }

    .field{
      min-width:190px;
    }

    .field[type="date"]{
      min-width:160px;
    }

    .toolbar-note{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-top:14px;
      padding-top:14px;
      border-top:1px dashed var(--line);
      color:var(--muted);
      font-size:14px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-bottom:16px;
    }

    .stat{
      background:var(--card);
      border:1px solid rgba(255,255,255,.65);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .stat-icon{
      width:52px;
      height:52px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:20px;
      flex:0 0 auto;
    }

    .stat.open .stat-icon{ background:var(--primary); }
    .stat.delay .stat-icon{ background:var(--warn); }
    .stat.done .stat-icon{ background:var(--ok); }
    .stat.total .stat-icon{ background:var(--info); }

    .stat h3{
      margin:0;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .stat strong{
      display:block;
      margin-top:4px;
      font-size:26px;
      color:var(--primary);
      line-height:1;
    }

    .content-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .content-head h2{
      margin:0;
      font-size:22px;
      color:var(--primary);
    }

    .content-head .small{
      color:var(--muted);
      font-size:14px;
    }

    .cards{
      display:grid;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(255,255,255,.7);
      border-radius:26px;
      padding:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .order-meta{
      min-width:0;
      flex:1 1 480px;
    }

    .order-title{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .order-no{
      font-size:22px;
      font-weight:900;
      color:var(--primary);
      line-height:1.2;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .badge-open{ background:rgba(34,50,67,.1); color:var(--primary); }
    .badge-delay{ background:rgba(243,156,18,.12); color:#b86e00; }
    .badge-done{ background:rgba(39,174,96,.12); color:#1f8d4e; }
    .badge-type{ background:rgba(52,152,219,.12); color:#1f6ea5; }

    .order-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
    }

    .meta-box{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      min-width:0;
    }

    .meta-box span{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-bottom:4px;
      font-weight:700;
    }

    .meta-box strong{
      display:block;
      color:var(--primary);
      font-size:15px;
      line-height:1.8;
      word-break:break-word;
    }

    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .mini-btn{
      width:42px;
      height:42px;
      border-radius:14px;
      border:none;
      cursor:pointer;
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      transition:.2s ease;
    }

    .mini-btn:hover{
      transform:translateY(-1px);
    }

    .mini-copy{ background:var(--info); }
    .mini-open{ background:var(--primary); }
    .mini-print{ background:var(--ok); }

    .path-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:14px;
    }

    .path-chip{
      background:#fff;
      border:1px dashed #d8e0e8;
      color:var(--primary);
      border-radius:999px;
      padding:7px 12px;
      font-size:13px;
      font-weight:800;
    }

    .stepper-wrap{
      display:flex;
      justify-content:flex-end;
      width:100%;
      overflow:hidden;
    }

    .stepper-scroll{
      overflow-x:auto;
      overflow-y:hidden;
      max-width:100%;
      margin-left:auto;
      padding-bottom:4px;
      scrollbar-width:none;
    }

    .stepper-scroll::-webkit-scrollbar{
      display:none;
    }

    /* مهم: 11 كرة تبقى دائمًا بنهاية الكارت */
    .stepper{
      width:max-content;
      min-width:fit-content;
      display:flex;
      gap:8px;
      justify-content:flex-end;
      align-items:flex-start;
      margin-right:0;
      margin-left:auto;
    }

    .node{
      width:74px;
      min-width:74px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:7px;
      position:relative;
      flex:0 0 auto;
    }

    .node:not(:last-child)::before{
      content:"";
      position:absolute;
      top:17px;
      left:-42px;
      width:42px;
      height:3px;
      border-radius:999px;
      background:#d8dee6;
    }

    .node.done:not(:last-child)::before{
      background:var(--ok);
    }

    .ball{
      width:34px;
      height:34px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:3px solid #d8dee6;
      background:#fff;
      color:#9aa7b5;
      font-size:13px;
      font-weight:900;
      box-shadow:0 6px 12px rgba(0,0,0,.05);
    }

    .node.done .ball{
      background:var(--ok);
      border-color:var(--ok);
      color:#fff;
    }

    .node.current .ball{
      background:#fff3df;
      border-color:var(--accent);
      color:var(--accent-dark);
    }

    .node.pending .ball{
      background:#fff;
      border-color:#d8dee6;
      color:#9aa7b5;
    }

    .node-label{
      text-align:center;
      font-size:11px;
      line-height:1.5;
      color:var(--muted);
      font-weight:800;
      max-width:74px;
      word-break:break-word;
    }

    .node.done .node-label{
      color:var(--ok);
    }

    .node.current .node-label{
      color:var(--accent-dark);
    }

    .empty,
    .loading{
      background:var(--card);
      border-radius:24px;
      padding:34px 20px;
      text-align:center;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.7);
      color:var(--muted);
    }

    .empty i,
    .loading i{
      font-size:34px;
      margin-bottom:12px;
      color:var(--accent);
      display:block;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%) translateY(20px);
      min-width:260px;
      max-width:min(92vw, 520px);
      background:#1f2937;
      color:#fff;
      padding:13px 16px;
      border-radius:16px;
      box-shadow:0 14px 30px rgba(0,0,0,.18);
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
      z-index:9999;
      text-align:center;
      font-weight:700;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .footer-space{
      height:16px;
    }

    @media (max-width:1200px){
      .stats{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .order-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
    }

    @media (max-width:768px){
      body{
        padding:12px;
      }

      .hero{
        border-radius:24px;
        padding:18px 16px;
      }

      .logo-wrap{
        width:64px;
        height:64px;
      }

      .logo-wrap img{
        width:46px;
        height:46px;
      }

      .titles h1{
        font-size:21px;
      }

      .titles p{
        font-size:13px;
      }

      .toolbar{
        border-radius:20px;
        padding:12px;
      }

      .toolbar-row,
      .toolbar-group{
        width:100%;
      }

      .toolbar-group > *{
        flex:1 1 100%;
      }

      .btn,
      .field,
      .select{
        width:100%;
        min-width:0;
      }

      .stats{
        grid-template-columns:1fr;
      }

      .card{
        padding:14px;
        border-radius:22px;
      }

      .order-no{
        font-size:19px;
      }

      .order-grid{
        grid-template-columns:1fr;
      }

      .card-actions{
        width:100%;
        justify-content:flex-start;
      }

      .stepper-wrap{
        justify-content:flex-start;
      }

      .stepper-scroll{
        width:100%;
        overflow-x:auto;
      }

      .stepper{
        width:max-content;
        min-width:fit-content;
        display:flex;
        gap:8px;
        justify-content:flex-end;
        align-items:flex-start;
        margin-right:0;
        margin-left:auto;
      }

      .node{
        width:72px;
        min-width:72px;
      }

      .node-label{
        max-width:72px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="logo-wrap">
            <img src="https://siei-tracking.github.io/system/logo.png" alt="logo">
          </div>
          <div class="titles">
            <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
            <p>منصة تتبع أوامر العمل - قائمة المعاملات</p>
          </div>
        </div>

        <div class="session-box">
          <div class="pill"><i class="fas fa-user"></i> <span id="userDisplay">جاري التحقق...</span></div>
          <div class="pill"><i class="fas fa-calendar-alt"></i> <span id="todayDisplay">--</span></div>
          <button class="btn btn-danger" id="btnLogout" type="button">
            <i class="fas fa-right-from-bracket"></i>
            تسجيل الخروج
          </button>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="toolbar-row">
        <div class="toolbar-group">
          <button class="btn btn-primary active" id="btnOpen" type="button">
            <i class="fas fa-folder-open"></i>
            غير المنجز
          </button>

          <button class="btn btn-warn" id="btnDelayed" type="button">
            <i class="fas fa-triangle-exclamation"></i>
            المتأخر
          </button>

          <button class="btn btn-success" id="btnDone" type="button">
            <i class="fas fa-circle-check"></i>
            المنجز
          </button>
        </div>

        <div class="toolbar-group">
          <button class="btn btn-ghost" id="btnOpenArchive" type="button">
            <i class="fas fa-table"></i>
            فتح شيت المعاملات
          </button>

          <button class="btn btn-admin" id="btnAdmin" type="button" disabled>
            <i class="fas fa-users-cog"></i>
            إدارة المستخدمين
          </button>
        </div>
      </div>

      <div class="toolbar-row" style="margin-top:10px;">
        <div class="toolbar-group">
          <select class="select" id="sheetSelect"></select>

          <input class="field" id="qSearch" type="text" placeholder="بحث: رقم أمر العمل">

          <button class="btn btn-info" id="btnSearch" type="button">
            <i class="fas fa-search"></i>
            بحث
          </button>
        </div>

        <div class="toolbar-group">
          <input class="field" id="dateFrom" type="date" title="من تاريخ">
          <input class="field" id="dateTo" type="date" title="إلى تاريخ">

          <button class="btn btn-ghost" id="btnApplyDate" type="button">
            <i class="fas fa-filter"></i>
            تطبيق التاريخ
          </button>

          <button class="btn btn-ghost" id="btnResetDate" type="button">
            <i class="fas fa-rotate-left"></i>
            تصفير
          </button>

          <button class="btn btn-ghost" id="btnExport" type="button">
            <i class="fas fa-file-export"></i>
            تصدير
          </button>
        </div>
      </div>

      <div class="toolbar-note">
        <div>
          <i class="fas fa-circle-info"></i>
          <span id="currentModeText">الوضع الحالي: غير المنجز</span>
        </div>
        <div>
          عدد النتائج المعروضة:
          <strong id="resultCount">0</strong>
        </div>
      </div>
    </section>

    <section class="stats">
      <div class="stat open">
        <div class="stat-icon"><i class="fas fa-folder-open"></i></div>
        <div>
          <h3>غير المنجز</h3>
          <strong id="statOpen">0</strong>
        </div>
      </div>

      <div class="stat delay">
        <div class="stat-icon"><i class="fas fa-triangle-exclamation"></i></div>
        <div>
          <h3>المتأخر</h3>
          <strong id="statDelayed">0</strong>
        </div>
      </div>

      <div class="stat done">
        <div class="stat-icon"><i class="fas fa-circle-check"></i></div>
        <div>
          <h3>المنجز</h3>
          <strong id="statDone">0</strong>
        </div>
      </div>

      <div class="stat total">
        <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
        <div>
          <h3>إجمالي المعروض</h3>
          <strong id="statTotal">0</strong>
        </div>
      </div>
    </section>

    <div class="content-head">
      <h2 id="sectionTitle">قائمة المعاملات</h2>
      <div class="small" id="sectionSubTitle">جاهز للتحميل</div>
    </div>

    <div id="contentArea">
      <div class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        جاري التحميل...
      </div>
    </div>

    <div class="footer-space"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* =========================
       إعدادات أساسية
    ========================= */
    const API_BASE = "https://script.google.com/macros/s/AKfycbx4UPWuOEzRjjOXbvNXVpXhPIQSphmkoQfULp2QULxovOz_lC0Z7vpt1MUvphwogyPJ/exec";
    const PAGE_NAME = "main";
    const SESSION_KEYS = ["tracking_session_token_main", "tracking_session_token"];
    const TZ = "Asia/Baghdad";

    /* =========================
       الحالة العامة
    ========================= */
    const state = {
      sessionToken: "",
      userName: "",
      role: "",
      pages: [],
      mode: "open", // open | delayed | done
      sheet: "",
      orders: [],
      filteredOrders: [],
      allStats: { open: 0, delayed: 0, done: 0 }
    };

    const els = {
      userDisplay: document.getElementById("userDisplay"),
      todayDisplay: document.getElementById("todayDisplay"),

      btnOpen: document.getElementById("btnOpen"),
      btnDelayed: document.getElementById("btnDelayed"),
      btnDone: document.getElementById("btnDone"),
      btnOpenArchive: document.getElementById("btnOpenArchive"),
      btnAdmin: document.getElementById("btnAdmin"),
      btnLogout: document.getElementById("btnLogout"),

      btnSearch: document.getElementById("btnSearch"),
      btnApplyDate: document.getElementById("btnApplyDate"),
      btnResetDate: document.getElementById("btnResetDate"),
      btnExport: document.getElementById("btnExport"),

      qSearch: document.getElementById("qSearch"),
      sheetSelect: document.getElementById("sheetSelect"),
      dateFrom: document.getElementById("dateFrom"),
      dateTo: document.getElementById("dateTo"),

      currentModeText: document.getElementById("currentModeText"),
      resultCount: document.getElementById("resultCount"),

      statOpen: document.getElementById("statOpen"),
      statDelayed: document.getElementById("statDelayed"),
      statDone: document.getElementById("statDone"),
      statTotal: document.getElementById("statTotal"),

      sectionTitle: document.getElementById("sectionTitle"),
      sectionSubTitle: document.getElementById("sectionSubTitle"),
      contentArea: document.getElementById("contentArea"),
      toast: document.getElementById("toast")
    };

    /* =========================
       أدوات مساعدة
    ========================= */
    function showToast(message, ok = true){
      els.toast.textContent = message;
      els.toast.style.background = ok ? "#1f2937" : "#8b1e1e";
      els.toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => els.toast.classList.remove("show"), 2500);
    }

    function setLoading(text = "جاري التحميل..."){
      els.contentArea.innerHTML = `
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          ${text}
        </div>
      `;
    }

    function setEmpty(text = "لا توجد بيانات"){
      els.contentArea.innerHTML = `
        <div class="empty">
          <i class="fas fa-inbox"></i>
          ${text}
        </div>
      `;
    }

    function safeText(v, fallback = "—"){
      if(v === null || v === undefined) return fallback;
      const s = String(v).trim();
      return s ? s : fallback;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(v){
      if(!v) return "—";
      try{
        const d = new Date(v);
        if(isNaN(d.getTime())) return String(v);
        return new Intl.DateTimeFormat("ar-IQ", {
          timeZone: TZ,
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        }).format(d);
      }catch{
        return String(v);
      }
    }

    function formatDateTime(v){
      if(!v) return "—";
      try{
        const d = new Date(v);
        if(isNaN(d.getTime())) return String(v);
        return new Intl.DateTimeFormat("ar-IQ", {
          timeZone: TZ,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(d);
      }catch{
        return String(v);
      }
    }

    function isDoneValue(v){
      return String(v ?? "").includes("✅");
    }

    function daysBetween(fromDate, toDate = new Date()){
      try{
        const a = new Date(fromDate);
        const b = new Date(toDate);
        if(isNaN(a) || isNaN(b)) return null;
        const diff = b.setHours(0,0,0,0) - a.setHours(0,0,0,0);
        return Math.floor(diff / 86400000);
      }catch{
        return null;
      }
    }

    function getSessionToken(){
      for(const key of SESSION_KEYS){
        const token = sessionStorage.getItem(key);
        if(token) return token;
      }
      return "";
    }

    function clearSession(){
      SESSION_KEYS.forEach(k => sessionStorage.removeItem(k));
    }

    function redirectToLogin(){
      window.location.href = `login.html?p=${encodeURIComponent(PAGE_NAME)}`;
    }

    async function apiGet(params = {}){
      const url = new URL(API_BASE);
      Object.entries(params).forEach(([k,v]) => {
        if(v !== undefined && v !== null && v !== ""){
          url.searchParams.set(k, v);
        }
      });

      const res = await fetch(url.toString(), {
        method: "GET",
        cache: "no-store"
      });

      if(!res.ok){
        throw new Error("فشل الاتصال بالخادم");
      }
      return res.json();
    }

    async function apiPost(payload = {}){
      const res = await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      if(!res.ok){
        throw new Error("فشل الاتصال بالخادم");
      }
      return res.json();
    }

    function normalizeOrders(data){
      if(!Array.isArray(data)) return [];

      return data.map((item, idx) => {
        if(Array.isArray(item)){
          return fromArrayRow(item, idx);
        }
        return fromObjectRow(item, idx);
      });
    }

    function fromArrayRow(row, idx){
      return {
        _id: `arr-${idx}-${row[1] || ""}`,
        createdAt: row[0] || "",
        orderNo: safeText(row[1]),
        client: safeText(row[2]),
        receive: row[3] || "",
        planning: row[4] || "",
        pricing: row[5] || "",
        days: safeText(row[6], ""),
        payment: row[7] || "",
        lab1: row[8] || "",
        elev: row[9] || "",
        workshop: row[10] || "",
        lab2: row[11] || "",
        results: row[12] || "",
        official: row[13] || "",
        barcode: row[14] || "",
        email: row[15] || "",
        delivered: row[16] || "",
        raw: row
      };
    }

    function fromObjectRow(o, idx){
      return {
        _id: `obj-${idx}-${o.orderNo || o["رقم أمر العمل"] || ""}`,
        createdAt: o.createdAt || o.date || o.created_at || o["التاريخ"] || "",
        orderNo: safeText(o.orderNo || o.orderNumber || o["رقم أمر العمل"]),
        client: safeText(o.client || o.beneficiary || o.customer || o["الجهة المستفيدة"]),
        receive: o.receive || o.received || o["استلام المعاملة"] || "",
        planning: o.planning || o["التخطيط"] || "",
        pricing: o.pricing || o["التسعيرة"] || "",
        days: safeText(o.days || o["الايام"], ""),
        payment: o.payment || o["التسديد"] || "",
        lab1: o.lab1 || o["المختبرات 1"] || "",
        elev: o.elev || o["المصاعد"] || "",
        workshop: o.workshop || o["الورشة"] || "",
        lab2: o.lab2 || o["المختبرات 2"] || "",
        results: o.results || o["نتائج الفحص"] || "",
        official: o.official || o["الكتاب الرسمي"] || "",
        barcode: o.barcode || o["الباركود"] || "",
        email: o.email || o["ارسال الايميل"] || "",
        delivered: o.delivered || o.resultReceived || o["استلام النتائج"] || "",
        raw: o
      };
    }

    function getInspectionTypeText(order){
      const p = String(order.planning || "");
      if(p.includes("مصاعد")) return "مصاعد";
      if(p.includes("مختبرات")) return "مختبرات";
      return "غير محدد";
    }

    function getRouteText(order){
      const p = String(order.planning || "");
      if(p.includes("ورشة")) return "ورشة";
      if(p.includes("مختبرات فقط")) return "مختبرات فقط";
      if(p.includes("مصاعد")) return "مصاعد";
      return "—";
    }

    function getStatusLabel(order){
      if(isDoneValue(order.delivered)) return { cls:"badge-done", text:"منجز", icon:"fa-circle-check" };

      const age = daysBetween(order.createdAt);
      if(age !== null && age > 7) return { cls:"badge-delay", text:"متأخر", icon:"fa-triangle-exclamation" };

      return { cls:"badge-open", text:"غير منجز", icon:"fa-folder-open" };
    }

    function getLastCompletedStage(order){
      const stages = [
        ["استلام المعاملة", order.receive],
        ["التخطيط", order.planning],
        ["التسعيرة", order.pricing],
        ["التسديد", order.payment],
        ["المختبرات 1", order.lab1],
        ["المصاعد", order.elev],
        ["الورشة", order.workshop],
        ["نتائج الفحص", order.results],
        ["الكتاب الرسمي", order.official],
        ["الباركود", order.barcode],
        ["استلام النتائج", order.delivered]
      ];

      let last = "لم يبدأ";
      for(const [name, val] of stages){
        if(isDoneValue(val) || (name === "التخطيط" && String(val).trim()) || (name === "التسعيرة" && String(val).trim())){
          last = name;
        }
      }
      return last;
    }

    function get11Steps(order){
      return [
        { key:"receive", label:"استلام", done:isDoneValue(order.receive) },
        { key:"planning", label:"تخطيط", done:Boolean(String(order.planning).trim()) },
        { key:"pricing", label:"تسعيرة", done:Boolean(String(order.pricing).trim()) },
        { key:"payment", label:"تسديد", done:isDoneValue(order.payment) },
        { key:"lab1", label:"مختبرات", done:isDoneValue(order.lab1) || isDoneValue(order.lab2) },
        { key:"elev", label:"مصاعد", done:isDoneValue(order.elev) },
        { key:"workshop", label:"ورشة", done:isDoneValue(order.workshop) },
        { key:"results", label:"نتائج", done:isDoneValue(order.results) },
        { key:"official", label:"رسمي", done:isDoneValue(order.official) },
        { key:"barcode", label:"باركود", done:isDoneValue(order.barcode) || isDoneValue(order.email) },
        { key:"delivered", label:"استلام النتائج", done:isDoneValue(order.delivered) }
      ];
    }

    function decorateStepStates(steps){
      const firstPendingIndex = steps.findIndex(s => !s.done);
      return steps.map((s, i) => ({
        ...s,
        state: s.done ? "done" : (i === firstPendingIndex ? "current" : "pending")
      }));
    }

    function renderStepper(order){
      const steps = decorateStepStates(get11Steps(order));
      return `
        <div class="stepper-wrap">
          <div class="stepper-scroll">
            <div class="stepper">
              ${steps.map((s, idx) => `
                <div class="node ${s.state}">
                  <div class="ball">${s.done ? '<i class="fas fa-check"></i>' : (idx + 1)}</div>
                  <div class="node-label">${escapeHtml(s.label)}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderCard(order){
      const status = getStatusLabel(order);
      const orderType = getInspectionTypeText(order);
      const route = getRouteText(order);
      const lastStage = getLastCompletedStage(order);

      return `
        <article class="card">
          <div class="card-top">
            <div class="order-meta">
              <div class="order-title">
                <div class="order-no">أمر العمل: ${escapeHtml(order.orderNo)}</div>
                <span class="badge ${status.cls}">
                  <i class="fas ${status.icon}"></i>
                  ${escapeHtml(status.text)}
                </span>
                <span class="badge badge-type">
                  <i class="fas fa-sitemap"></i>
                  ${escapeHtml(orderType)}
                </span>
              </div>

              <div class="order-grid">
                <div class="meta-box">
                  <span>الجهة المستفيدة</span>
                  <strong>${escapeHtml(order.client)}</strong>
                </div>
                <div class="meta-box">
                  <span>تاريخ الإدخال</span>
                  <strong>${escapeHtml(formatDateTime(order.createdAt))}</strong>
                </div>
                <div class="meta-box">
                  <span>آخر مرحلة مكتملة</span>
                  <strong>${escapeHtml(lastStage)}</strong>
                </div>
                <div class="meta-box">
                  <span>الأيام</span>
                  <strong>${escapeHtml(order.days || "—")}</strong>
                </div>
              </div>
            </div>

            <div class="card-actions">
              <button class="mini-btn mini-copy" type="button" title="نسخ رقم أمر العمل" onclick="copyOrderNo('${escapeHtml(order.orderNo)}')">
                <i class="fas fa-copy"></i>
              </button>
              <button class="mini-btn mini-open" type="button" title="بحث سريع" onclick="quickSearch('${escapeHtml(order.orderNo)}')">
                <i class="fas fa-magnifying-glass"></i>
              </button>
              <button class="mini-btn mini-print" type="button" title="طباعة الكارت" onclick="printCard(this)">
                <i class="fas fa-print"></i>
              </button>
            </div>
          </div>

          <div class="path-row">
            <div class="path-chip"><i class="fas fa-diagram-project"></i> نوع الفحص: ${escapeHtml(orderType)}</div>
            <div class="path-chip"><i class="fas fa-route"></i> التوجيه: ${escapeHtml(route)}</div>
            <div class="path-chip"><i class="fas fa-calendar-days"></i> حالة الأيام: ${escapeHtml(order.days || "—")}</div>
          </div>

          ${renderStepper(order)}
        </article>
      `;
    }

    function renderOrders(list){
      if(!list.length){
        setEmpty("لا توجد معاملات مطابقة للبحث الحالي");
        return;
      }

      els.contentArea.innerHTML = `
        <div class="cards">
          ${list.map(renderCard).join("")}
        </div>
      `;
    }

    function setModeButtons(){
      [els.btnOpen, els.btnDelayed, els.btnDone].forEach(btn => btn.classList.remove("active"));

      if(state.mode === "open"){
        els.btnOpen.classList.add("active");
        els.currentModeText.textContent = "الوضع الحالي: غير المنجز";
        els.sectionTitle.textContent = "قائمة المعاملات غير المنجزة";
      }else if(state.mode === "delayed"){
        els.btnDelayed.classList.add("active");
        els.currentModeText.textContent = "الوضع الحالي: المتأخر";
        els.sectionTitle.textContent = "قائمة المعاملات المتأخرة";
      }else{
        els.btnDone.classList.add("active");
        els.currentModeText.textContent = "الوضع الحالي: المنجز";
        els.sectionTitle.textContent = "قائمة المعاملات المنجزة";
      }
    }

    function updateStatsDisplay(){
      els.statOpen.textContent = state.allStats.open;
      els.statDelayed.textContent = state.allStats.delayed;
      els.statDone.textContent = state.allStats.done;
      els.statTotal.textContent = state.filteredOrders.length;
      els.resultCount.textContent = state.filteredOrders.length;
      els.sectionSubTitle.textContent = `السنة الحالية: ${state.sheet || "—"} | عدد النتائج: ${state.filteredOrders.length}`;
    }

    function applyClientSideFilters(){
      const q = els.qSearch.value.trim();
      const from = els.dateFrom.value;
      const to = els.dateTo.value;

      let list = [...state.orders];

      if(q){
        list = list.filter(o => String(o.orderNo).includes(q));
      }

      if(from || to){
        list = list.filter(o => {
          const d = new Date(o.createdAt);
          if(isNaN(d.getTime())) return false;

          const ymd = d.toISOString().slice(0,10);
          if(from && ymd < from) return false;
          if(to && ymd > to) return false;
          return true;
        });
      }

      state.filteredOrders = list;
      renderOrders(state.filteredOrders);
      updateStatsDisplay();
    }

    async function loadSheets(){
      try{
        const res = await apiGet({ action:"getMainSearchSheets" });
        const list = Array.isArray(res?.sheets) ? res.sheets : (Array.isArray(res) ? res : []);

        els.sheetSelect.innerHTML = "";

        if(!list.length){
          const currentYear = String(new Date().getFullYear());
          els.sheetSelect.innerHTML = `<option value="${currentYear}">${currentYear}</option>`;
          state.sheet = currentYear;
          return;
        }

        list.forEach(name => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          els.sheetSelect.appendChild(opt);
        });

        const currentYear = String(new Date().getFullYear());
        const defaultValue = list.includes(currentYear) ? currentYear : String(list[0]);
        els.sheetSelect.value = defaultValue;
        state.sheet = defaultValue;
      }catch{
        const currentYear = String(new Date().getFullYear());
        els.sheetSelect.innerHTML = `<option value="${currentYear}">${currentYear}</option>`;
        state.sheet = currentYear;
      }
    }

    async function loadStats(){
      try{
        const [openRes, delayedRes, doneRes] = await Promise.all([
          apiGet({ action:"getOpenOrders", sheet: state.sheet }),
          apiGet({ action:"getDelayedOrders", sheet: state.sheet }),
          apiGet({ action:"getCompletedOrders", sheet: state.sheet })
        ]);

        state.allStats.open = normalizeOrders(openRes?.orders || openRes?.data || openRes).length;
        state.allStats.delayed = normalizeOrders(delayedRes?.orders || delayedRes?.data || delayedRes).length;
        state.allStats.done = normalizeOrders(doneRes?.orders || doneRes?.data || doneRes).length;

        updateStatsDisplay();
      }catch{
        state.allStats = { open:0, delayed:0, done:0 };
        updateStatsDisplay();
      }
    }

    async function loadOrders(){
      try{
        setModeButtons();
        setLoading("جاري تحميل المعاملات...");

        let res;

        if(state.mode === "open"){
          res = await apiGet({ action:"getOpenOrders", sheet: state.sheet });
        }else if(state.mode === "delayed"){
          res = await apiGet({ action:"getDelayedOrders", sheet: state.sheet });
        }else{
          const from = els.dateFrom.value;
          const to = els.dateTo.value;

          if(from || to){
            res = await apiGet({
              action:"getCompletedOrdersByDateRange",
              sheet: state.sheet,
              from,
              to
            });
          }else{
            res = await apiGet({ action:"getCompletedOrders", sheet: state.sheet });
          }
        }

        state.orders = normalizeOrders(res?.orders || res?.data || res);
        state.filteredOrders = [...state.orders];
        applyClientSideFilters();
      }catch(err){
        console.error(err);
        setEmpty("تعذر تحميل البيانات من الخادم");
        showToast("تعذر تحميل البيانات", false);
      }
    }

    async function verifySession(){
      state.sessionToken = getSessionToken();
      if(!state.sessionToken){
        redirectToLogin();
        return false;
      }

      try{
        const res = await apiPost({
          action: "checkSession",
          token: state.sessionToken,
          page: PAGE_NAME
        });

        const ok = Boolean(res?.ok || res?.success || res?.authorized);
        if(!ok){
          clearSession();
          redirectToLogin();
          return false;
        }

        const user = res?.user || res?.session || res?.data || res || {};
        state.userName = user.userName || user.name || user.username || "مستخدم النظام";
        state.role = user.role || user.userRole || "";
        state.pages = Array.isArray(user.pages) ? user.pages : [];

        els.userDisplay.textContent = state.userName;

        const isAdmin =
          state.role === "admin" ||
          state.userName === "مدير النظام" ||
          state.pages.includes("admin");

        els.btnAdmin.disabled = !isAdmin;

        return true;
      }catch(err){
        console.error(err);
        clearSession();
        redirectToLogin();
        return false;
      }
    }

    async function logout(){
      try{
        if(state.sessionToken){
          await apiPost({
            action:"logout",
            token: state.sessionToken
          });
        }
      }catch(err){
        console.warn("logout warning", err);
      }finally{
        clearSession();
        redirectToLogin();
      }
    }

    async function openArchiveSheet(){
      try{
        const res = await apiGet({ action:"getArchiveSheetUrl", sheet: state.sheet });
        const url = res?.url || res?.sheetUrl || res?.archiveUrl;

        if(url){
          window.open(url, "_blank");
          return;
        }

        showToast("لم يتم العثور على رابط الشيت", false);
      }catch{
        showToast("تعذر فتح الشيت", false);
      }
    }

    function exportCurrentView(){
      if(!state.filteredOrders.length){
        showToast("لا توجد بيانات للتصدير", false);
        return;
      }

      const rows = state.filteredOrders.map(o => ({
        "رقم أمر العمل": o.orderNo,
        "تاريخ الأمر": formatDate(o.createdAt),
        "الجهة المستفيدة": o.client,
        "آخر مرحلة مكتملة": getLastCompletedStage(o)
      }));

      let csv = "\uFEFF";
      const headers = Object.keys(rows[0]);
      csv += headers.join(",") + "\n";
      rows.forEach(r => {
        csv += headers.map(h => `"${String(r[h] ?? "").replace(/"/g, '""')}"`).join(",") + "\n";
      });

      const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `main-${state.mode}-${state.sheet || "sheet"}.csv`;
      a.click();
      URL.revokeObjectURL(url);

      showToast("تم إنشاء ملف التصدير");
    }

    function setTodayText(){
      const now = new Date();
      els.todayDisplay.textContent = new Intl.DateTimeFormat("ar-IQ", {
        timeZone: TZ,
        year:"numeric",
        month:"long",
        day:"numeric"
      }).format(now);
    }

    function bindEvents(){
      els.btnOpen.addEventListener("click", async () => {
        state.mode = "open";
        await loadOrders();
        await loadStats();
      });

      els.btnDelayed.addEventListener("click", async () => {
        state.mode = "delayed";
        await loadOrders();
        await loadStats();
      });

      els.btnDone.addEventListener("click", async () => {
        state.mode = "done";
        await loadOrders();
        await loadStats();
      });

      els.sheetSelect.addEventListener("change", async (e) => {
        state.sheet = e.target.value;
        await loadOrders();
        await loadStats();
      });

      els.btnSearch.addEventListener("click", applyClientSideFilters);
      els.qSearch.addEventListener("keydown", (e) => {
        if(e.key === "Enter") applyClientSideFilters();
      });

      els.btnApplyDate.addEventListener("click", async () => {
        if(state.mode === "done"){
          await loadOrders();
        }else{
          applyClientSideFilters();
        }
      });

      els.btnResetDate.addEventListener("click", async () => {
        els.dateFrom.value = "";
        els.dateTo.value = "";
        els.qSearch.value = "";
        if(state.mode === "done"){
          await loadOrders();
        }else{
          applyClientSideFilters();
        }
      });

      els.btnExport.addEventListener("click", exportCurrentView);
      els.btnOpenArchive.addEventListener("click", openArchiveSheet);

      els.btnAdmin.addEventListener("click", () => {
        if(els.btnAdmin.disabled){
          showToast("هذه الصفحة متاحة فقط لمدير النظام", false);
          return;
        }
        window.location.href = "admin.html";
      });

      els.btnLogout.addEventListener("click", logout);
    }

    /* =========================
       دوال عامة للأزرار داخل الكارت
    ========================= */
    window.copyOrderNo = async function(orderNo){
      try{
        await navigator.clipboard.writeText(orderNo);
        showToast("تم نسخ رقم أمر العمل");
      }catch{
        showToast("تعذر النسخ", false);
      }
    };

    window.quickSearch = function(orderNo){
      els.qSearch.value = orderNo;
      applyClientSideFilters();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.printCard = function(btn){
      const card = btn.closest(".card");
      if(!card) return;

      const html = `
        <html dir="rtl" lang="ar">
        <head>
          <meta charset="UTF-8">
          <title>طباعة معاملة</title>
          <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
