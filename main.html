<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <script src="/system/config.js"></script>
  <script src="/system/pwa-install.js"></script>
  <link rel="manifest" href="/system/manifest-main.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المعاملات - منصة تتبع أوامر العمل</title>
  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ===== CSS VARIABLES ===== */
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.88);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --disabled:#bdc3c7;
      --soft:#f8fafc;
      --warn:#f39c12;
      --admin:#6f42c1;
      --transition-fast: .15s ease;
      --transition-med: .25s ease;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 22px;
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
        var(--bg);
      color: #111;
    }

    /* ===== PAGE WRAP ===== */
    #pageWrap { display: block; }

    /* إخفاء المحتوى الحساس فقط حتى تتحقق الجلسة */
    #pageWrap.loading .panel,
    #pageWrap.loading .wrap {
      opacity: 0;
      pointer-events: none;
    }
    #pageWrap .panel,
    #pageWrap .wrap {
      transition: opacity .3s ease;
    }



    /* ===== HEADER ===== */
    .company-header {
      background-image:
        linear-gradient(rgba(34,50,67,.35), rgba(34,50,67,.35)),
        url('https://siei-tracking.github.io/system/company.jpg');
      background-size: cover;
      background-position: center;
      padding: 64px 5% 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: #fff;
      flex-wrap: wrap;
      justify-content: center;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
      position: relative;
      overflow: hidden;
    }

    .company-logo {
      width: 100px;
      height: 100px;
      background: #fff;
      border-radius: 50%;
      padding: 5px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }

    .header-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      max-width: 100%;
    }

    .header-text h1 {
      color: #fff;
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      line-height: 1.45;
      text-shadow: 0 2px 8px rgba(0,0,0,.7);
    }

    .header-text p {
      color: #fff;
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.5;
      text-shadow: 0 2px 8px rgba(0,0,0,.7);
    }

    .user-pill {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 16px;
      border-radius: 999px;
      background: rgba(128,0,32,0.4);
      border: 1px solid rgba(231,76,60,0.45);
      color: #fff;
      font-weight: 900;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(231,76,60,.25);
      max-width: 100%;
      word-break: break-word;
    }

    /* ===== LAYOUT ===== */
    .wrap {
      padding: 0 5% 30px;
      display: flex;
      justify-content: center;
      position: relative;
      margin-top: -40px;
    }

    .panel {
      width: 100%;
      max-width: 1275px;
      margin-top: 13px;
      background: rgba(255,255,255,0.92);
      border-radius: var(--radius-lg);
      padding: 0;
      box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 6px 18px rgba(0,0,0,.06);
      position: relative;
      z-index: 2;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform var(--transition-med), box-shadow var(--transition-med);
      border: 1px solid rgba(255,255,255,.65);
      overflow: visible;
    }

    .panel:hover {
      transform: translateY(-3px);
      box-shadow:
        0 26px 60px rgba(0,0,0,.16),
        0 8px 22px rgba(0,0,0,.08);
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      pointer-events: none;
    }

    /* ===== PANEL HEAD ===== */
    .panel-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      position: relative;
      z-index: 2;
      background: linear-gradient(180deg, rgba(243,156,18,0.08), transparent);
    }

    .title {
      font-weight: 900;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
    }

    /* ===== CONTROLS ===== */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: relative;
      z-index: 10;
      width: 100%;
    }

    input, select {
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--line);
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      text-align: center;
      min-width: 180px;
      outline: none;
      background: #fff;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      color: #1f2d3a;
    }

    input:focus, select:focus {
      border-color: #d8b15d;
      box-shadow: 0 0 0 4px rgba(245,166,35,.12);
    }

    input::placeholder {
      color: #9aa6b2;
      font-weight: 800;
    }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 12px 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: 18px;
      cursor: pointer;
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition-fast), opacity var(--transition-fast), box-shadow var(--transition-fast);
      white-space: nowrap;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
      min-width: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* Shimmer effect */
    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      right: -120%;
      width: 120%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,.18) 40%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.18) 60%,
        transparent 80%
      );
      transition: .65s;
    }

    .btn:hover::before { right: 120%; }
    .btn:hover { transform: translateY(-1px); opacity: .96; }
    .btn:active { transform: translateY(0); opacity: .9; }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; pointer-events: none; }

    .btn-primary {
      background: linear-gradient(180deg, #1e3c72, #162c52);
      color: #fff;
      box-shadow: 0 10px 20px rgba(30,60,114,.20);
    }

    .btn-warn {
      background: linear-gradient(180deg, #e74c3c, #c0392b);
      color: #fff;
      box-shadow: 0 10px 20px rgba(231,76,60,.20);
    }

    .btn-ok {
      background: linear-gradient(180deg, #2ebf68, #26a65b);
      color: #fff;
      box-shadow: 0 10px 20px rgba(39,174,96,.20);
    }

    .btn-ghost {
      background: #eef2f6;
      color: #1f2d3a;
    }

    .btn-admin {
      background: linear-gradient(180deg, #7b4bd3, #5f35b1);
      color: #fff;
      box-shadow: 0 10px 20px rgba(111,66,193,.20);
    }

    .file-btn {
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(180deg, #2ebf68, #26a65b);
      color: #fff;
      box-shadow: 0 10px 20px rgba(39,174,96,.20);
      transition: transform var(--transition-fast), opacity var(--transition-fast);
      white-space: nowrap;
      width: auto;
      max-width: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .file-btn:hover { transform: translateY(-1px); opacity: .96; }

    /* ===== BAR ===== */
    .bar {
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #fafbfc;
      font-weight: 900;
      position: relative;
      z-index: 2;
    }

    .bar-right, .bar-left {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .bar-left { justify-content: center; }

    /* ===== STATS ===== */
    .stat {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 8px 12px;
      border-radius: var(--radius-md);
      background: #fff;
      border: 1px solid #eef1f4;
      font-weight: 900;
      color: #111;
    }

    .stat .muted { color: var(--muted); font-size: 15px; margin-left: 2px; }

    #count { font-size: 18px; margin-right: 2px; height: 32px; min-width: 25px; }
    #at    { font-size: 18px; margin-right: 2px; height: 32px; min-width: 60px; }

    .date-input {
      min-width: 181px;
      width: 181px;
      height: 50px;
      padding: 0 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--line);
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: 16px;
      text-align: center;
      line-height: 50px;
      background: #fff;
      color: #1f2d3a;
    }

    /* ===== STATUS ===== */
    #status {
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 900;
      position: relative;
      z-index: 2;
      word-break: break-word;
      transition: color var(--transition-fast);
    }

    #status.ok  { color: #1d5e3b; }
    #status.bad { color: var(--danger); }

    /* ===== LIST ===== */
    .list {
      padding: 14px 18px 22px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    /* ===== ITEM CARD ===== */
    .item {
      border: 1px solid #eef1f4;
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.04);
      overflow: hidden;
      transition: box-shadow var(--transition-med), transform var(--transition-med);
      animation: fadeInUp .3s ease both;
    }

    .item:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .row1 {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      border-bottom: 1px solid #f0f3f6;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .action-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      max-width: 100%;
    }

    .idbox {
      display: flex;
      font-size: 17px;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      color: var(--primary);
      flex-wrap: wrap;
      word-break: break-word;
    }

    /* ===== PILLS ===== */
    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: #f6f8fa;
      border: 1px solid #eef1f4;
      font-weight: 900;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      word-break: break-word;
    }

    .pill.ok  {
      background: rgba(39,174,96,.10);
      border-color: rgba(39,174,96,.22);
      color: #1d5e3b;
    }

    .pill.bad {
      background: rgba(231,76,60,.10);
      border-color: rgba(231,76,60,.20);
      color: #7b1f17;
    }

    .late {
      margin-top: 8px;
      font-weight: 900;
      color: var(--danger);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .client {
      margin-top: 8px;
      font-size: 17px;
      font-weight: 900;
      color: #111;
      word-break: break-word;
    }

    /* ===== STEPPER ===== */
    .stepper-scroll { overflow: visible; width: 100%; }

    .stepper {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(11, minmax(0, 1fr));
      align-items: flex-start;
      padding: 4px 0 8px;
      direction: rtl;
    }

    .node {
      min-width: 0;
      text-align: center;
      font-weight: 900;
      position: relative;
      padding: 2px 0 6px;
      user-select: none;
    }

    .node.ghost { visibility: hidden; pointer-events: none; }

    .node:not(.ghost)::after {
      content: "";
      position: absolute;
      top: 25px;
      right: calc(100% - 11px);
      width: 22px;
      height: 3px;
      background: #dfe5ec;
      border-radius: 999px;
      transition: background var(--transition-med);
    }

    .stepper .node.last-real::after { display: none; }

    .circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--disabled);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      margin: auto;
      box-shadow: 0 6px 14px rgba(0,0,0,.12);
      transition: background var(--transition-med), transform var(--transition-med);
    }

    .circle i { font-size: 16px; }

    .node.done .circle { background: var(--ok); }
    .node.next .circle { background: var(--accent); transform: scale(1.06); box-shadow: 0 8px 20px rgba(245,166,35,.35); }

    .node.done:not(.ghost)::after { background: var(--ok); }
    .node.next:not(.ghost)::after { background: var(--accent); }

    .label    { margin-top: 5px; font-size: 15px; }
    .sub      { margin-top: 5px; min-height: 36px; line-height: 1.2; }
    .sub-name { font-size: 13px; font-weight: 900; display: block; line-height: 1.2; margin-top: 8px; word-break: break-word; }
    .sub-date { font-size: 11px; font-weight: 900; direction: ltr; display: block; line-height: 1.2; margin-top: 2px; word-break: break-word; }

    /* ===== EMPTY STATE ===== */
    .empty {
      padding: 36px 18px;
      text-align: center;
      font-weight: 900;
      color: var(--muted);
      font-size: 16px;
    }

    .empty i { font-size: 32px; display: block; margin-bottom: 10px; opacity: .4; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      min-width: 240px;
      max-width: 90%;
      background: #223243;
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius-md);
      font-weight: 900;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      display: none;
      z-index: 99999;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
      animation: toastIn .25s ease;
    }

    @keyframes toastIn {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0);   opacity: 1; }
    }

    #toast.ok   { background: #27ae60; }
    #toast.warn { background: #f39c12; }
    #toast.err  { background: #e74c3c; }

    /* ===== SEARCH INPUTS ===== */
    #qDone {
      flex: 1;
      min-width: 100px;
      height: 50px;
      font-size: clamp(15px, 2vw, 18px);
      line-height: 50px;
      padding: 0 12px;
    }

    #qDone::placeholder { font-size: clamp(12px, .9vw, 15px); }

    #sheetSelect {
      flex: 1;
      min-width: 100px;
      height: 50px;
      font-size: 18px;
      line-height: 50px;
      padding: 0 12px;
    }

    #btnAdmin { margin-left: 20px; }

    #btnSearchDone, #btnExport {
      height: 57px;
      min-width: 106px;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 900;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }



    /* ===== EXPORT MENU ===== */
    .export-menu-fixed {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 220px;
      background: #fff;
      border: 1px solid #dfe7ef;
      border-radius: var(--radius-md);
      box-shadow: 0 18px 35px rgba(0,0,0,.16);
      padding: 8px;
      display: none;
      z-index: 999999;
    }

    .export-menu-fixed.show { display: block; animation: fadeInDown .15s ease; }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .export-option {
      width: 100%;
      border: none;
      outline: none;
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: 15px;
      text-align: right;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      color: #223243;
      transition: background var(--transition-fast);
      white-space: nowrap;
    }

    .export-option:hover { background: #f4f7fb; }
    .export-option i { width: 20px; text-align: center; flex: 0 0 20px; }

    /* ===== LOADING SKELETON ===== */
    .skeleton {
      background: linear-gradient(90deg, #f0f4f8 25%, #e2e8f0 50%, #f0f4f8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-item {
      height: 120px;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1100px) {
      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: center;
        gap: 10px;
      }
      input, select { min-width: 0; width: 100%; }
      .btn { width: 100%; }
      #qDone, #sheetSelect, #btnSearchDone { width: 100%; min-width: 0; margin-left: 0; }
    }

    @media (max-width: 820px) {
      .company-header { padding: 34px 14px 48px; gap: 12px; }
      .company-logo   { width: 78px; height: 78px; }
      .header-text h1 { font-size: 22px; }
      .header-text p  { font-size: 14px; }

      .wrap  { padding: 0 10px 20px; margin-top: -24px; }
      .panel { border-radius: 18px; }
      .panel-head { padding: 14px; }

      .title {
        width: 100%;
        justify-content: center;
        text-align: center;
        font-size: 17px;
      }

      .controls { display: grid; grid-template-columns: 1fr; width: 100%; }

      input, select, .btn, .file-btn,
      #qDone, #sheetSelect, #btnSearchDone, #btnExport {
        width: 100%;
        min-width: 0;
      }

      .bar { padding: 12px 14px; }
      .bar-right, .bar-left { width: 100%; }
      .bar-right { justify-content: space-between; }
      .bar-left  { justify-content: center; }

      .date-input { width: 100%; min-width: 0; height: 50px; text-align: center; }
      .stat { flex: 1 1 calc(50% - 5px); justify-content: center; }

      .list { padding: 12px 12px 18px; }
      .item { padding: 12px; }

      .row1 { flex-direction: column; align-items: stretch; }
      .action-wrap { width: 100%; justify-content: stretch; }
      .action-wrap .btn, .action-wrap .file-btn { width: 100%; }

      .idbox  { font-size: 15px; }
      .client { font-size: 15px; }
      .pill   { font-size: 13px; }

      .stepper-scroll {
        overflow-x: auto;
        scroll-behavior: smooth;
        scroll-snap-type: x mandatory;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
      }

      .stepper-scroll::-webkit-scrollbar { display: none; }

      .stepper {
        width: max-content;
        min-width: 100%;
        display: flex;
        gap: 11px;
        justify-content: flex-start;
        align-items: flex-start;
      }

      .node {
        width: 98px;
        min-width: 98px;
        flex: 0 0 auto;
        scroll-snap-align: center;
      }

      .node.ghost { display: none; }

      .node:not(.ghost)::after {
        top: 25px;
        left: -16.5px;
        width: 22px;
        height: 3px;
      }

      .circle  { width: 50px; height: 50px; }
      .label   { font-size: 13px; }

  <script>
  /* ============================================================
   * CONFIG
   * ============================================================ */
  const API_BASE = window.APP_CONFIG.API_BASE;
  const PAGE_NAME     = "main";
  /* ── Cookie helpers ── */
  function setCookie(name, value, hours) {
    const exp = new Date(Date.now() + hours * 3600000).toUTCString();
    document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + exp + ";path=/;SameSite=Lax";
  }
  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
    return match ? decodeURIComponent(match[1]) : "";
  }
  function deleteCookie(name) {
    document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
  }


  const STORAGE_KEY      = "tracking_session_token_" + PAGE_NAME;
  const STORAGE_KEY_G    = "tracking_session_token";
  const SESSION_CACHE_KEY = "tracking_session_cache_" + PAGE_NAME;  /* cache بيانات الجلسة */

  /* ============================================================
   * STATE
   * ============================================================ */
  let CURRENT_MODE  = "open";
  let CURRENT_ITEMS = [];
  let CURRENT_USER_ROLE = "";
  let CURRENT_USER_NAME = "";
  let CURRENT_USERNAME  = "";
  let sessionFailCount = 0;
  let liveSessionInterval = null;   // ← لحفظ الـ interval وإلغائه عند الخروج
  let dataAlreadyLoaded = false;    // ← منع تحميل البيانات مرتين (race condition)
  let isLoadingData = false;        // ← debounce: منع طلبات متوازية
  const MAX_SESSION_FAILS = 3;

  /* ============================================================
   * SESSION HELPERS
   * ============================================================ */
  function getSessionToken(){
    return (
      sessionStorage.getItem(STORAGE_KEY)   ||
      sessionStorage.getItem(STORAGE_KEY_G) ||
      localStorage.getItem(STORAGE_KEY)     ||
      localStorage.getItem(STORAGE_KEY_G)   ||
      ""
    );
  }

  function setSessionToken(token){
    if(!token) return;
    sessionStorage.setItem(STORAGE_KEY,   token);
    sessionStorage.setItem(STORAGE_KEY_G, token);
    localStorage.setItem(STORAGE_KEY,     token);
    localStorage.setItem(STORAGE_KEY_G,   token);
  }

  function clearSessionToken(){
    [STORAGE_KEY, STORAGE_KEY_G, SESSION_CACHE_KEY].forEach(function(k){
      sessionStorage.removeItem(k);
      localStorage.removeItem(k);
    });
  }

  function redirectToLogin(){
    clearSessionToken();
    if(liveSessionInterval){ clearInterval(liveSessionInterval); liveSessionInterval = null; }
    window.location.href = "login.html?p=" + encodeURIComponent(PAGE_NAME);
  }

  function isAdminUser(){
    /* الأولوية للـ role الذي يحدده السيرفر، مع fallback لاسم "admin" */
    if(CURRENT_USER_ROLE === "admin") return true;
    return String(CURRENT_USERNAME || "").trim().toLowerCase() === "admin";
  }

  /* ============================================================
   * API
   * ============================================================ */
  async function apiPost(payload){
    const response = await fetch(API_BASE, {
      method:  "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body:    JSON.stringify(payload)
    });
    if(!response.ok){
      throw new Error("HTTP " + response.status + ": " + response.statusText);
    }
    const text = await response.text();
    try {
      return JSON.parse(text);
    } catch(err) {
      throw new Error(text || "Invalid JSON response");
    }
  }

  /* ============================================================
   * SESSION CHECK
   * ============================================================ */
  function applySessionCache(cached){
    CURRENT_USER_NAME = cached.userName || "مخول غير معروف";
    CURRENT_USERNAME  = cached.username || "";
    CURRENT_USER_ROLE = isAdminUser() ? "admin" : "user";
    document.getElementById("welcomeUser").innerHTML =
      '<i class="fas fa-user-shield"></i> المستخدم: ' + escapeHtml(CURRENT_USER_NAME);
    document.getElementById("pageWrap").classList.remove("loading");
    showAdminButton();
  }

  /* دالة مشتركة لتحديث واجهة المستخدم بعد التحقق من الجلسة */
  function applySessionResult(result){
    CURRENT_USER_NAME = result.user || result.userName || "مخول غير معروف";
    CURRENT_USERNAME  = result.username || "";
    CURRENT_USER_ROLE = (result.role === "admin" || String(CURRENT_USERNAME).trim().toLowerCase() === "admin") ? "admin" : "user";
    document.getElementById("welcomeUser").innerHTML =
      '<i class="fas fa-user-shield"></i> المستخدم: ' + escapeHtml(CURRENT_USER_NAME);
    document.getElementById("pageWrap").classList.remove("loading");
    showAdminButton();
  }

  async function ensurePageSession(){
    const token = getSessionToken();
    if(!token){ redirectToLogin(); return; }

    /* ── محاولة عرض الصفحة فوراً من الـ cache ── */
    let usedCache = false;
    try {
      const raw = sessionStorage.getItem(SESSION_CACHE_KEY) || localStorage.getItem(SESSION_CACHE_KEY);
      if(raw){
        const cached = JSON.parse(raw);
        if(cached && cached.token === token && (Date.now() - (cached.ts || 0)) < 600000){
          applySessionCache(cached);
          usedCache = true;
          if(!dataAlreadyLoaded){
            dataAlreadyLoaded = true;
            await Promise.all([
              loadSheetOptions().catch(function(){}),
              loadOpen().catch(function(){})
            ]);
            if(typeof window.loadNotifications === 'function') window.loadNotifications();
          }
        }
      }
    } catch(e){}

    /* ── تحقق من السيرفر في الخلفية ── */
    try{
      const result = await apiPost({ action:"checkSession", token, page:PAGE_NAME });

      if(result && result.ok){
        setSessionToken(token);
        sessionFailCount = 0;
        applySessionResult(result);

        try {
          const cacheData = JSON.stringify({ token, userName: CURRENT_USER_NAME, username: CURRENT_USERNAME, ts: Date.now() });
          sessionStorage.setItem(SESSION_CACHE_KEY, cacheData);
          localStorage.setItem(SESSION_CACHE_KEY, cacheData);
        } catch(e){}

        if(!dataAlreadyLoaded){
          dataAlreadyLoaded = true;
          await Promise.all([
            loadSheetOptions(),
            loadOpen()
          ]);
          if(typeof window.loadNotifications === 'function') window.loadNotifications();
        }
      } else {
        try { sessionStorage.removeItem(SESSION_CACHE_KEY); localStorage.removeItem(SESSION_CACHE_KEY); } catch(e){}
        if(!usedCache) redirectToLogin();
        else { showMsg("⚠️ انتهت الجلسة، سيتم تسجيل الخروج...", "warn"); setTimeout(redirectToLogin, 2000); }
      }
    } catch(error){
      if(!usedCache){
        showMsg("❌ تعذر التحقق من الجلسة", "err");
        setTimeout(redirectToLogin, 900);
      } else {
        console.warn("Session check failed (using cache):", error);
      }
    }
  }

  /* ← تحسين: لا يُطرد المستخدم فور انقطاع الشبكة */
  async function checkLiveSession(){
    const token = getSessionToken();
    if(!token){ redirectToLogin(); return; }

    try{
      const res = await apiPost({ action:"checkSession", token, page:PAGE_NAME });
      if(!res || !res.ok){
        sessionFailCount++;
        if(sessionFailCount >= MAX_SESSION_FAILS) redirectToLogin();
      } else {
        sessionFailCount = 0;
      }
    } catch(e){
      sessionFailCount++;
      console.warn("Session check failed (" + sessionFailCount + "/" + MAX_SESSION_FAILS + "):", e.message);
      if(sessionFailCount >= MAX_SESSION_FAILS) redirectToLogin();
    }
  }

  /* ============================================================
   * UI HELPERS
   * ============================================================ */
  function safeErr(err){
    if(!err)          return "Unknown error";
    if(typeof err === "string") return err;
    if(err.message)   return err.message;
    try{ return JSON.stringify(err); } catch(e){ return String(err); }
  }

  function showMsg(text, type){
    const t = document.getElementById("toast");
    t.className = type === "ok" ? "ok" : type === "warn" ? "warn" : type === "err" ? "err" : "";
    t.textContent = text || "";
    t.style.display = "block";
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(function(){ t.style.display = "none"; }, 3000);
  }

  function setStatus(msg, ok){
    const el = document.getElementById("status");
    el.className = ok ? "ok" : "bad";
    el.textContent = msg;
  }

  function setLoading(on){
    isLoadingData = on;
    const ids = ["btnOpen","btnDelayed","btnDone","btnSearchDone","sheetSelect","dateFrom","dateTo","qDone","btnExport","btnExportExcel","btnExportPDF"];
    ids.forEach(function(id){
      const el = document.getElementById(id);
      if(el) el.disabled = on;
    });

    const btnOpenArchive = document.getElementById("btnOpenArchive");
    if(btnOpenArchive) btnOpenArchive.disabled = on || !isAdminUser();

    const btnAdmin = document.getElementById("btnAdmin");
    if(btnAdmin) btnAdmin.disabled = on || !isAdminUser();

    if(on){ closeExportMenu(); setStatus("جاري التحميل...", true); }
  }

  function escapeHtml(s){
    return String(s == null ? "" : s)
      .replace(/&/g,  "&amp;")
      .replace(/</g,  "&lt;")
      .replace(/>/g,  "&gt;")
      .replace(/"/g,  "&quot;")
      .replace(/'/g,  "&#39;");
  }

  /* ============================================================
   * SHEET OPTIONS
   * ============================================================ */
  const SHEET_CACHE_KEY = "tracking_sheet_options_" + PAGE_NAME;

  async function loadSheetOptions(){
    const token = getSessionToken();
    if(!token) return;

    /* ── محاولة تحميل من الـ cache أولاً (صالح 30 دقيقة) ── */
    try {
      const raw = sessionStorage.getItem(SHEET_CACHE_KEY);
      if(raw){
        const cached = JSON.parse(raw);
        if(cached && (Date.now() - (cached.ts || 0)) < 1800000 && Array.isArray(cached.sheets)){
          applySheetOptions(cached.sheets);
          return;
        }
      }
    } catch(e){}

    try{
      const res = await apiPost({ action:"getMainSearchSheets", token, page:PAGE_NAME });
      const sheets = Array.isArray(res && res.items) ? res.items : (Array.isArray(res) ? res : []);
      applySheetOptions(sheets);
      /* حفظ في الـ cache */
      try { sessionStorage.setItem(SHEET_CACHE_KEY, JSON.stringify({ sheets, ts: Date.now() })); } catch(e){}
    } catch(err){
      console.warn("sheet options error:", safeErr(err));
    }
  }

  function applySheetOptions(sheets){
    const select = document.getElementById("sheetSelect");
    if(!select) return;
    select.innerHTML = "";
    if(!sheets || !sheets.length){
      const opt = document.createElement("option");
      opt.value = ""; opt.textContent = "لا توجد سنوات";
      select.appendChild(opt);
      return;
    }
    sheets.forEach(function(name){
      const opt = document.createElement("option");
      opt.value = name; opt.textContent = name;
      select.appendChild(opt);
    });
    const currentYear = new Date().getFullYear().toString();
    select.value = sheets.includes(currentYear) ? currentYear : sheets[0];
  }

  /* ============================================================
   * ADMIN
   * ============================================================ */
  function showAdminButton(){
    const admin = isAdminUser();

    /* أزرار الـ admin فقط */
    ["btnAdmin", "btnOpenArchive"].forEach(function(id){
      const btn = document.getElementById(id);
      if(!btn) return;
      btn.style.display  = "inline-flex";
      btn.disabled       = !admin;
      btn.title          = admin ? "" : "متاح لمدير النظام فقط";
      btn.style.opacity  = admin ? "1" : "0.6";
      btn.style.cursor   = admin ? "pointer" : "not-allowed";
    });

  }


  function openAdminPage(){
    if(!isAdminUser()){ showMsg("⚠️ متاح لمدير النظام فقط", "warn"); return; }
    const token = getSessionToken();
    if(!token){ redirectToLogin(); return; }
    sessionStorage.setItem("tracking_session_token_admin", token);
    sessionStorage.setItem("tracking_session_token",       token);
    window.location.href = "admin.html";
  }

  async function openArchiveSheet(){
    if(!isAdminUser()){ showMsg("⚠️ متاح لمدير النظام فقط", "warn"); return; }
    const token = getSessionToken();
    if(!token){ redirectToLogin(); return; }

    try{
      const res = await apiPost({ action:"getArchiveSheetUrl", token, page:PAGE_NAME });
      if(!res || !res.ok){
        const msg = (res && (res.error || res.message)) || "لا يمكن فتح الشيت";
        setStatus("❌ " + msg, false);
        showMsg("❌ " + msg, "err");
        return;
      }
      window.open(res.url, "_blank", "noopener,noreferrer");
    } catch(err){
      setStatus("❌ خطأ: " + safeErr(err), false);
      showMsg("❌ خطأ في فتح الشيت", "err");
    }
  }

  /* ============================================================
   * STEPPER LOGIC
   * ============================================================ */
  function isDoneAny(v){ return String(v || "").indexOf("✅") !== -1; }

  function formatSub(val, done, cls, stepKey){
    if(!done){
      return cls.indexOf("next") !== -1
        ? '<div class="sub-date">الخطوة الحالية</div>'
        : '<div class="sub-date">بانتظار</div>';
    }

    val = String(val || "")
      .replace("✅","").replace("استلام -","").replace("استلام","").trim();

    let name = "", date = "";

    const userMatch = val.match(/\((.*?)\)/);
    if(userMatch && userMatch[1]){
      name = userMatch[1].trim();
      date = val.replace(userMatch[0], "").trim();
    } else {
      const dt = val.match(/(\d{4}-\d{2}-\d{2}\s*\|\s*\d{2}:\d{2})/);
      if(dt){
        date = dt[1].trim();
        name = val.replace(dt[1], "").trim();
      } else {
        const parts = val.split(/\s*\|\s*/);
        if(parts.length >= 2){
          name = parts[0].trim();
          date = parts.slice(1).join(" | ").trim();
        } else {
          date = val.trim();
        }
      }
    }

    if(stepKey === "pricing"){
      const dt2 = val.match(/(\d{4}-\d{2}-\d{2}\s*\|\s*\d{2}:\d{2})/);
      date = dt2 ? dt2[1].trim() : "";
      const um2 = val.match(/\((.*?)\)/);
      name = (um2 && um2[1]) ? um2[1].trim() : "";
    }

    if(stepKey === "payment"){
      name = name.replace("تم التسديد","").trim();
      date = date.replace("تم التسديد","").trim();
    }

    const clean = function(s){ return s.replace(/^[\-\–—\s]+/, "").replace(/[\-\–—\s]+$/, "").trim(); };
    name = clean(name);
    date = clean(date);

    return '<div class="sub-name">' + escapeHtml(name) + '</div>'
         + '<div class="sub-date">' + escapeHtml(date) + '</div>';
  }

  function inferType(it){
    if(!isDoneAny(it.pricing)) return "";
    const t = String(it.testType || "").trim();
    if(t === "مصاعد" || t === "مختبرات") return t;
    const elev     = String(it.elev     || "").trim();
    const lab1     = String(it.lab1     || "").trim();
    const workshop = String(it.workshop || "").trim();
    const lab2     = String(it.lab2     || "").trim();
    if(elev && elev !== "-" && elev !== "—") return "مصاعد";
    if(lab1 || workshop || lab2) return "مختبرات";
    return "";
  }

  function inferLabPath(it){
    if(!isDoneAny(it.pricing)) return "";
    const labPath = String(it.labPath || "").trim();
    if(labPath) return labPath;
    const workshop = String(it.workshop || "").trim();
    const lab2     = String(it.lab2     || "").trim();
    return (workshop || lab2) ? "ورشة" : "مختبرات فقط";
  }

  function buildSteps(it){
    const type    = inferType(it);
    const labPath = inferLabPath(it);
    const workflowReady = isDoneAny(it.pricing) && !!type;

    const steps = [
      {key:"inspection", label:"أصدار امر العمل",  icon:"fa-handshake"},
      {key:"pricing",    label:"تسعيرة",  icon:"fa-receipt"}
    ];

    if(!workflowReady) return steps;

    steps.push({key:"payment", label:"تسديد", icon:"fa-sack-dollar"});

    if(type === "مصاعد"){
      steps.push({key:"elev", label:"مصاعد", icon:"fa-elevator"});
    } else {
      steps.push({key:"lab1", label:"مختبرات", icon:"fa-microscope"});
      if(labPath !== "مختبرات فقط"){
        steps.push({key:"workshop", label:"ورشة",      icon:"fa-screwdriver-wrench"});
        steps.push({key:"lab2",     label:"مختبرات",   icon:"fa-flask"});
      }
    }

    steps.push(
      {key:"testResults", label:"نتائج الفحص",  icon:"fa-clipboard-check"},
      {key:"official",    label:"اصدار الكتاب",   icon:"fa-file"},
      {key:"barcode",     label:"باركود", icon:"fa-qrcode"},
      {key:"email",       label:"ايميل",  icon:"fa-paper-plane"},
      {key:"final",       label:"تسليم النتائج", icon:"fa-flag-checkered"}
    );

    return steps;
  }

  function typePills(it){
    const pricingDone = isDoneAny(it.pricing);
    const type    = inferType(it);
    const labPath = inferLabPath(it);

    if(!pricingDone || !type){
      return '<span class="pill bad"><i class="fas fa-hourglass-half"></i> بانتظار التسعيرة</span>';
    }

    let typePill = '<span class="pill bad"><i class="fas fa-triangle-exclamation"></i> غير محدد</span>';
    if(type === "مصاعد")   typePill = '<span class="pill ok"><i class="fas fa-elevator"></i> مصاعد</span>';
    if(type === "مختبرات") typePill = '<span class="pill ok"><i class="fas fa-microscope"></i> مختبرات</span>';

    const showPath = type === "مختبرات" && labPath && labPath !== "مختبرات فقط";
    const pathPill = showPath ? '<span class="pill"><i class="fas fa-route"></i> ' + escapeHtml(labPath) + '</span>' : "";

    return typePill + (pathPill ? " " + pathPill : "");
  }

  function renderStepper(it){
    const steps       = buildSteps(it);
    const TOTAL_SLOTS = 11;
    const pricingDone = isDoneAny(it.pricing);
    const type        = inferType(it);
    const workflowReady = pricingDone && !!type;

    let html = '<div class="stepper-scroll"><div class="stepper">';
    let firstPending = false;

    for(let i = 0; i < steps.length; i++){
      const s   = steps[i];
      const val = String(it[s.key] || "");
      const done = isDoneAny(val);

      let cls = "node";
      if(done){
        cls += " done";
      } else if(!firstPending){
        cls += " next";
        firstPending = true;
      } else {
        cls += " locked";
      }

      if(i === steps.length - 1) cls += " last-real";

      const sub = formatSub(val, done, cls, s.key);

      /* تأمين icon: نسمح فقط بأحرف وأرقام وشرطة */
      const safeIcon = String(s.icon || "").replace(/[^a-z0-9\-]/g, "");

      html += '<div class="' + cls + '">'
            +   '<div class="circle"><i class="fas ' + safeIcon + '"></i></div>'
            +   '<div class="label">' + escapeHtml(s.label) + '</div>'
            +   '<div class="sub">' + sub + '</div>'
            + '</div>';
    }

    for(let j = steps.length; j < TOTAL_SLOTS; j++){
      html += '<div class="node ghost" aria-hidden="true">'
            +   '<div class="circle"></div>'
            +   '<div class="label"></div>'
            +   '<div class="sub"></div>'
            + '</div>';
    }

    html += '</div></div>';

    if(!workflowReady){
      html += '<div class="empty" style="padding-top:8px;">'
            +   '<i class="fas fa-circle-info"></i> '
            +   'تظهر بقية المراحل بعد تثبيت التسعيرة ونوع الفحص'
            + '</div>';
    }

    return html;
  }

  /* ============================================================
   * EXPORT
   * ============================================================ */
  function getExportTitleByMode(mode){
    const titles = {
      open:    "تقرير المعاملات غير المنجزة",
      delayed: "تقرير المعاملات المتأخرة",
      done:    "تقرير المعاملات المنجزة",
      search:  "تقرير نتائج البحث"
    };
    return titles[mode] || "تقرير المعاملات";
  }

  function openExportMenu(anchorEl){
    const menu = document.getElementById("exportMenu");
    if(!menu || !anchorEl) return;
    const rect = anchorEl.getBoundingClientRect();
    menu.style.display = "block";
    menu.classList.add("show");

    const menuWidth = menu.offsetWidth || 220;
    let left = rect.right - menuWidth;
    let top  = rect.bottom + 10;

    left = Math.max(10, Math.min(left, window.innerWidth - menuWidth - 10));
    menu.style.left = left + "px";
    menu.style.top  = top  + "px";
  }

  function closeExportMenu(){
    const menu = document.getElementById("exportMenu");
    if(!menu) return;
    menu.classList.remove("show");
    menu.style.display = "none";
  }

  function exportCurrentTable(){
    if(!CURRENT_ITEMS || !CURRENT_ITEMS.length){
      showMsg("⚠️ لا توجد بيانات للتصدير", "warn");
      return;
    }

    if(typeof XLSX === "undefined"){
      showMsg("⚠️ مكتبة Excel غير محملة، حاول مجدداً", "warn");
      return;
    }

    const title = getExportTitleByMode(CURRENT_MODE);
    const now   = new Date();
    const stamp = now.getFullYear()
      + "-" + String(now.getMonth()+1).padStart(2,"0")
      + "-" + String(now.getDate()).padStart(2,"0")
      + "_" + String(now.getHours()).padStart(2,"0")
      + "-" + String(now.getMinutes()).padStart(2,"0");

    /* ── بناء بيانات الجدول ── */
    const headers = ["رقم أمر العمل", "تاريخ أمر العمل", "الجهة المستفيدة", "آخر مرحلة"];
    const dataRows = CURRENT_ITEMS.map(function(it){
      return [
        String(it.orderNo    || "").trim() || "—",
        String(it.orderDate  || "").trim() || "—",
        String(it.clientName || "").trim() || "—",
        String(it.lastStage  || "").trim() || "—"
      ];
    });

    /* ── إنشاء الـ Workbook ── */
    const wb = XLSX.utils.book_new();
    const wsData = [headers].concat(dataRows);
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    /* ── عرض الأعمدة ── */
    ws["!cols"] = [
      { wch: 18 },
      { wch: 18 },
      { wch: 36 },
      { wch: 22 }
    ];

    /* ── تنسيق الهيدر ── */
    const headerStyle = {
      font:      { bold: true, color: { rgb: "111111" } },
      fill:      { fgColor: { rgb: "F5A623" } },
      alignment: { horizontal: "center", vertical: "center", readingOrder: 2 },
      border: {
        top:    { style: "thin", color: { rgb: "CCCCCC" } },
        bottom: { style: "thin", color: { rgb: "CCCCCC" } },
        left:   { style: "thin", color: { rgb: "CCCCCC" } },
        right:  { style: "thin", color: { rgb: "CCCCCC" } }
      }
    };

    const dataStyle = {
      alignment: { horizontal: "center", vertical: "center", readingOrder: 2 },
      border: {
        top:    { style: "thin", color: { rgb: "E0E0E0" } },
        bottom: { style: "thin", color: { rgb: "E0E0E0" } },
        left:   { style: "thin", color: { rgb: "E0E0E0" } },
        right:  { style: "thin", color: { rgb: "E0E0E0" } }
      }
    };

    const range = XLSX.utils.decode_range(ws["!ref"]);
    for(var R = range.s.r; R <= range.e.r; R++){
      for(var C = range.s.c; C <= range.e.c; C++){
        const addr = XLSX.utils.encode_cell({ r: R, c: C });
        if(!ws[addr]) continue;
        ws[addr].s = (R === 0) ? headerStyle : dataStyle;
      }
    }

    XLSX.utils.book_append_sheet(wb, ws, title.substring(0, 31));

    /* ── تحميل الملف ── */
    XLSX.writeFile(wb, title + "_" + stamp + ".xlsx");
    showMsg("✅ تم تصدير Excel بنجاح", "ok");
  }

  async function exportCurrentPDF(){
    if(!CURRENT_ITEMS || !CURRENT_ITEMS.length){
      showMsg("⚠️ لا توجد بيانات للتصدير", "warn");
      return;
    }

    const token = getSessionToken();
    if(!token){ redirectToLogin(); return; }

    const rows = CURRENT_ITEMS.map(function(it){
      return {
        orderNo:    String(it.orderNo    || "").trim() || "—",
        orderDate:  String(it.orderDate  || "").trim() || "—",
        clientName: String(it.clientName || "").trim() || "—",
        lastStage:  String(it.lastStage  || "").trim() || "—"
      };
    });

    setLoading(true);
    try{
      const res = await apiPost({
        action: "exportPDF",
        token, page: PAGE_NAME,
        title: getExportTitleByMode(CURRENT_MODE),
        mode:  CURRENT_MODE,
        rows
      });

      setLoading(false);

      if(!res || !res.ok || !res.base64){
        showMsg((res && res.message) || "❌ فشل إنشاء PDF", "err");
        setStatus("❌ فشل إنشاء PDF", false);
        return;
      }

      const byteCharacters = atob(res.base64);
      const byteNumbers    = new Uint8Array(byteCharacters.length);
      for(let i = 0; i < byteCharacters.length; i++){
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }

      const blob    = new Blob([byteNumbers], { type:"application/pdf" });
      const blobUrl = URL.createObjectURL(blob);

      /* ← إصلاح: إضافة للـ DOM قبل النقر */
      const a = document.createElement("a");
      a.href     = blobUrl;
      a.download = getExportTitleByMode(CURRENT_MODE) + ".pdf";
      a.target   = "_blank";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      setTimeout(function(){ URL.revokeObjectURL(blobUrl); }, 10000);
      showMsg("✅ تم إنشاء PDF بنجاح", "ok");
    } catch(err){
      setLoading(false);
      setStatus("❌ export pdf error: " + safeErr(err), false);
      showMsg("❌ فشل تصدير PDF", "err");
    }
  }

  /* ============================================================
   * RENDER
   * ============================================================ */
  function computeLastStage(item){
    const steps = [
      {key:"final",       label:"استلام النتائج"},
      {key:"email",       label:"ارسال الايميل"},
      {key:"barcode",     label:"الباركود"},
      {key:"official",    label:"الكتاب الرسمي"},
      {key:"testResults", label:"نتائج الفحص"},
      {key:"lab2",        label:"المختبرات بعد الورشة"},
      {key:"workshop",    label:"الورشة"},
      {key:"elev",        label:"المصاعد"},
      {key:"lab1",        label:"المختبرات"},
      {key:"payment",     label:"التسديد"},
      {key:"pricing",     label:"التسعيرة"},
      {key:"inspection",  label:"استلام المعاملة"}
    ];
    for(const s of steps){
      if(isDoneAny(item[s.key])) return s.label;
    }
    return "لم تبدأ";
  }

  function normalizeItemsForRender(items){
    return (items || []).map(function(it){
      const item = Object.assign({}, it);
      if(!item.orderDate){
        const src = String(item.inspection || "");
        const dt  = src.match(/(\d{4}-\d{2}-\d{2})/);
        item.orderDate = dt ? dt[1] : "—";
      }
      if(!item.lastStage) item.lastStage = computeLastStage(item);
      return item;
    });
  }

  /* ← تحسين: skeleton loading أثناء التحميل */
  function showSkeletons(count){
    count = count || 3;
    let html = "";
    for(let i = 0; i < count; i++){
      html += '<div class="skeleton skeleton-item" style="animation-delay:' + (i * .1) + 's"></div>';
    }
    document.getElementById("list").innerHTML = html;
  }

  function renderList(res, mode){
    if(res && res.error){
      CURRENT_MODE  = mode || "open";
      CURRENT_ITEMS = [];
      document.getElementById("count").textContent = "0";
      document.getElementById("at").textContent    = res.at || "—";
      document.getElementById("list").innerHTML    = "";
      setStatus("❌ خطأ من السيرفر: " + res.error, false);
      showMsg("❌ خطأ من السيرفر", "err");
      return;
    }

    const rawItems = (res && res.items) ? res.items : [];
    const items    = normalizeItemsForRender(rawItems);

    CURRENT_MODE  = mode || "open";
    CURRENT_ITEMS = items.slice();

    document.getElementById("count").textContent = String(items.length);
    document.getElementById("at").textContent    = (res && res.at) ? res.at : "—";

    if(!items.length){
      document.getElementById("list").innerHTML =
        '<div class="empty"><i class="fas fa-check-circle"></i>لا توجد معاملات</div>';
      setStatus("تم التحميل — لا توجد نتائج", true);
      return;
    }

    let html = "";
    items.forEach(function(it, idx){
      const orderNo  = escapeHtml(it.orderNo   || "");
      const client   = escapeHtml(it.clientName || "—");
      const lateDays = Number(it.lateDays || 0);
      const fileUrl  = String(it.barcodeFileUrl || it.barcodeLink || it.fileUrl || it.fileLink || "").trim();

      html += '<div class="item" role="listitem" style="animation-delay:' + (idx * .04) + 's">';
      html +=   '<div class="row1">';
      html +=     '<div>';
      html +=       '<div class="idbox">أمر العمل : <span>' + orderNo + '</span> ' + typePills(it) + '</div>';
      html +=       '<div class="client"><i class="fas fa-building"></i> ' + client + '</div>';
      if(mode === "delayed"){
        html += '<div class="late"><i class="fas fa-hourglass-half"></i> متأخر ' + lateDays + ' يوم</div>';
      }
      html +=     '</div>';
      html +=     '<div class="action-wrap">';
      if(mode === "done" || mode === "search"){
        if(fileUrl){
          html += '<a href="' + escapeHtml(fileUrl) + '" target="_blank" rel="noopener noreferrer" class="file-btn">'
               +    '<i class="fas fa-up-right-from-square"></i> فتح الملف'
               +  '</a>';
        } else {
          html += '<button class="btn btn-ghost" type="button" disabled>'
               +    '<i class="fas fa-ban"></i> لا يوجد ملف'
               +  '</button>';
        }
      }
      html +=     '</div>';
      html +=   '</div>';
      html +=   renderStepper(it);
      html += '</div>';
    });

    document.getElementById("list").innerHTML = html;
    setStatus("تم التحميل بنجاح (" + items.length + " معاملة)", true);
  }

    setLoading(true);

      const res = await apiPost({ action:"getOpenOrders", token, page:PAGE_NAME });
      setLoading(false);
      renderList(res, "open");

      setLoading(false);
      setStatus("❌ open error: " + safeErr(err), false);
      showMsg("❌ فشل تحميل غير المنجز", "err");
    }
  }

  async function loadDone(){
    const token = getSessionToken();
    if(!token){ redirectToLogin(); return; }
    if(isLoadingData) return;

    const from = String(document.getElementById("dateFrom").value || "").trim();
    const to   = String(document.getElementById("dateTo").value   || "").trim();

    showSkeletons(4);
    setLoading(true);
    try{
      const action = (from && to) ? "getCompletedOrdersByDateRange" : "getCompletedOrders";
      const payload = { action, token, page:PAGE_NAME, limit:5000 };
      if(from && to){ payload.fromDate = from; payload.toDate = to; }

      const res = await apiPost(payload);
      setLoading(false);
      renderList(res, "done");
      if(from && to) showMsg("✅ تم تحميل النتائج حسب التاريخ", "ok");
      /* تحذير إذا اقتربت من الحد الأقصى */
      if(res && res.items && res.items.length >= 5000){
        showMsg("⚠️ النتائج مقطوعة عند 5000 سجل، حدد نطاق تاريخ أضيق", "warn");
      }
    } catch(err){
      setLoading(false);
      setStatus("❌ done error: " + safeErr(err), false);
      showMsg("❌ فشل تحميل الإنجاز", "err");
    }
  }

  async function searchAny(){
    const token = getSessionToken();
    if(!token){ redirectToLogin(); return; }
    if(isLoadingData) return;

    const id        = String(document.getElementById("qDone").value       || "").trim();
    const sheetName = String(document.getElementById("sheetSelect").value || "").trim();

    if(!id)        { showMsg("⚠️ أدخل رقم أمر العمل", "warn");     setStatus("⚠️ أدخل رقم أمر العمل", false);          return; }
    if(!sheetName) { showMsg("⚠️ لا توجد سنة محددة", "warn");      setStatus("⚠️ لا توجد سنة محددة للبحث", false);     return; }

    showSkeletons(1);
    setLoading(true);
    try{
      const res = await apiPost({ action:"searchOrderAnywhere", token, page:PAGE_NAME, orderNo:id, sheetName });
      setLoading(false);

      if(res && res.error){ setStatus("❌ خطأ: " + res.error, false); showMsg("❌ خطأ من السيرفر", "err"); return; }

      if(!res || !res.found){
        CURRENT_MODE  = "search";
        CURRENT_ITEMS = [];
        document.getElementById("count").textContent = "0";
        document.getElementById("at").textContent    = "—";
        document.getElementById("list").innerHTML    =
          '<div class="empty"><i class="fas fa-circle-xmark"></i>لا توجد معاملة بهذا الرقم داخل السنة المحددة</div>';
        setStatus("❌ لم يتم العثور على أمر العمل " + escapeHtml(id), false);
        showMsg("⚠️ غير موجود", "warn");
        return;
      }

      const item = Object.assign({}, res.item ? res.item : res, { orderNo: (res.item && res.item.orderNo) || id });
      renderList({ at:(res.at || "—"), items:[item] }, "search");
      setStatus("✅ تم العثور على أمر العمل " + escapeHtml(id) + " في " + escapeHtml(item.sourceSheet || sheetName), true);
      showMsg("✅ تم العثور على المعاملة", "ok");
    } catch(err){
      setLoading(false);
      setStatus("❌ search error: " + safeErr(err), false);
      showMsg("❌ فشل البحث", "err");
    }
  }

      const fmt   = function(d){
        return d.getFullYear()

          + "-" + String(d.getDate()).padStart(2,"0");

      e.preventDefault(); e.stopPropagation();

    /* بدء التطبيق */
    ensurePageSession();
    liveSessionInterval = setInterval(checkLiveSession, 10000);
  });
