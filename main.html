<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#223243;
      --primary-dark:#17232e;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.95);
      --line:#e5ebf1;
      --text:#223243;
      --muted:#758292;
      --danger:#e74c3c;
      --ok:#27ae60;
      --shadow:0 20px 50px rgba(34,50,67,.18);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family:'Cairo',sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(34,50,67,.68), rgba(34,50,67,.68)),
        url('https://images.unsplash.com/photo-1497366412874-3415097a27e7?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat fixed;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:440px;
      background:var(--card);
      border:1px solid rgba(255,255,255,.5);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:34px 28px 26px;
      backdrop-filter:blur(8px);
    }

    .logo{
      width:78px;
      height:78px;
      margin:0 auto 14px;
      border-radius:22px;
      background:linear-gradient(180deg, var(--primary), var(--primary-dark));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:28px;
      font-weight:900;
      box-shadow:0 12px 24px rgba(34,50,67,.22);
    }

    .title{
      margin:0;
      text-align:center;
      color:var(--primary);
      font-size:30px;
      font-weight:900;
    }

    .subtitle{
      margin:8px 0 24px;
      text-align:center;
      color:var(--muted);
      line-height:1.9;
      font-size:14px;
    }

    .field{
      margin-bottom:16px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:800;
      color:var(--primary);
    }

    .input{
      width:100%;
      height:52px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:0 16px;
      font-family:'Cairo',sans-serif;
      font-size:15px;
      outline:none;
      transition:.2s ease;
    }

    .input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(245,166,35,.12);
    }

    .btn{
      width:100%;
      height:54px;
      margin-top:8px;
      border:none;
      border-radius:14px;
      background:linear-gradient(180deg, var(--accent), var(--accent-dark));
      color:#fff;
      font-family:'Cairo',sans-serif;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
      transition:.2s ease;
      box-shadow:0 12px 24px rgba(245,166,35,.3);
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .msg{
      display:none;
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      line-height:1.8;
    }

    .msg.error{
      display:block;
      background:rgba(231,76,60,.08);
      color:#b03a2e;
      border:1px solid rgba(231,76,60,.18);
    }

    .msg.success{
      display:block;
      background:rgba(39,174,96,.08);
      color:#1f7a45;
      border:1px solid rgba(39,174,96,.18);
    }

    .links{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .link{
      color:var(--primary);
      text-decoration:none;
      font-size:14px;
      font-weight:700;
    }

    .link:hover{
      text-decoration:underline;
    }

    .note{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">WO</div>

    <h1 class="title">تسجيل الدخول</h1>
    <p class="subtitle">
      أدخل اسم المستخدم وكلمة المرور للدخول إلى نظام تتبع أوامر العمل
    </p>

    <div class="field">
      <label class="label" for="username">اسم المستخدم</label>
      <input class="input" id="username" type="text" placeholder="أدخل اسم المستخدم">
    </div>

    <div class="field">
      <label class="label" for="password">كلمة المرور</label>
      <input class="input" id="password" type="password" placeholder="أدخل كلمة المرور">
    </div>

    <button class="btn" id="loginBtn" onclick="login()">دخول</button>

    <div id="msg" class="msg"></div>

    <div class="links">
      <a class="link" href="index.html">العودة إلى الصفحة الرئيسية</a>
      <a class="link" href="main.html">فتح اللوحة</a>
    </div>

    <div class="note">
      على GitHub Pages يجب فتح الصفحة باستخدام اسم الملف الكامل مثل
      <b>main.html</b> و <b>login.html</b>
    </div>
  </div>

  <script>
    const API_URL = "ضع_رابط_الويب_آب_هنا";

    const REPO_BASE = getBasePath();

    function getBasePath(){
      const path = window.location.pathname;
      const parts = path.split('/').filter(Boolean);

      if(parts.length <= 1) return '/';
      return '/' + parts[0] + '/';
    }

    function buildPageUrl(fileName){
      return REPO_BASE + fileName;
    }

    function showMessage(text, type){
      const msg = document.getElementById("msg");
      msg.className = "msg " + type;
      msg.textContent = text;
    }

    function clearMessage(){
      const msg = document.getElementById("msg");
      msg.className = "msg";
      msg.textContent = "";
    }

    function saveSession(data){
      localStorage.setItem("tracking_logged_in", "1");
      localStorage.setItem("tracking_session", data.session || "");
      localStorage.setItem("tracking_user", data.user || document.getElementById("username").value.trim());

      if(data.pages) localStorage.setItem("tracking_pages", JSON.stringify(data.pages));
      if(data.role) localStorage.setItem("tracking_role", data.role);
    }

    async function login(){
      clearMessage();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const btn = document.getElementById("loginBtn");

      if(!username || !password){
        showMessage("يرجى إدخال اسم المستخدم وكلمة المرور.", "error");
        return;
      }

      if(API_URL === "https://script.google.com/macros/s/AKfycbxDNDaXEN1011Y1Q_088C1yRsHqDir1dEY2-rYxmjYmbMOXOL_HpADnHH193FnhITWp/execا"){
        showMessage("يرجى أولاً وضع رابط Google Apps Script Web App داخل المتغير API_URL.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "جاري التحقق...";

      try{
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "login",
            user: username,
            pass: password
          })
        });

        const data = await res.json();

        if(data.ok){
          saveSession(data);
          showMessage("تم تسجيل الدخول بنجاح. جاري التحويل...", "success");

          setTimeout(() => {
            window.location.href = buildPageUrl("main.html");
          }, 700);
        }else{
          showMessage(data.message || data.msg || "اسم المستخدم أو كلمة المرور غير صحيحة.", "error");
        }
      }catch(err){
        showMessage("تعذر الاتصال بالخادم. تأكد من رابط Apps Script وأن النشر تم بصلاحية Anyone.", "error");
      }finally{
        btn.disabled = false;
        btn.textContent = "دخول";
      }
    }

    document.getElementById("password").addEventListener("keydown", function(e){
      if(e.key === "Enter") login();
    });

    document.getElementById("username").addEventListener("keydown", function(e){
      if(e.key === "Enter") login();
    });

    if(localStorage.getItem("tracking_logged_in") === "1"){
      window.location.href = buildPageUrl("main.html");
    }
  </script>
</body>
</html>
