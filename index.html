<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة تتبع أوامر العمل</title>

<link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
<link rel="stylesheet" href="watermark.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --primary:#223243;
  --accent:#f5a623;
  --bg:#eef2f6;
  --line:#e5ebf1;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:
    radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
    radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
    var(--bg);
}

/* HEADER */
.company-header{
  background:
    linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
    url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');
  background-size:cover;
  padding:60px 5%;
  text-align:center;
  color:#fff;
}

.company-logo{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#fff;
  padding:5px;
}

.header-text h1{
  margin:10px 0 0;
  font-size:26px;
  font-weight:900;
}

.header-text p{
  margin:5px 0 0;
  font-weight:900;
}

/* MAIN */
.wrap{
  padding:20px;
  display:flex;
  justify-content:center;
}

.panel{
  width:100%;
  max-width:1100px;
  background:#fff;
  border-radius:20px;
  margin-top:-40px;
  padding:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.1);
}

/* SEARCH */
.search{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

input{
  padding:12px;
  border-radius:10px;
  border:2px solid #ddd;
  font-weight:900;
  text-align:center;
  min-width:250px;
}

.btn{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
}

.btn-primary{
  background:var(--primary);
  color:#fff;
}

.btn-ghost{
  background:#eee;
}

/* STEPPER */
.stepper{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-top:20px;
}

.node{
  min-width:120px;
  text-align:center;
}

.circle{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ccc;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
}

.node.done .circle{background:#27ae60;}
.node.next .circle{background:#f5a623;}

.label{
  font-weight:900;
  margin-top:8px;
}

.empty{
  text-align:center;
  padding:30px;
  color:#777;
}
</style>
</head>

<body>

<div class="page-shell">

<header class="company-header">
  <img class="company-logo" src="https://drive.google.com/thumbnail?id=1NN7G2zhk7nhgXuPWGW4qE_pdGC-Ptjkt&sz=w500">
  <div class="header-text">
    <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
    <p>منصة تتبع اوامر العمل</p>
  </div>
</header>

<div class="page-content">
  <div class="wrap">
    <div class="panel">

      <div class="search">
        <input id="orderID" placeholder="رقم أمر العمل">
        <button class="btn btn-ghost" onclick="clearOrder()">مسح</button>
        <button class="btn btn-primary" onclick="loadTracking()">تتبع</button>
      </div>

      <div id="stepperArea"></div>

    </div>
  </div>
</div>

</div>

<script>
const API_BASE="ضع رابط السكربت هنا";

function clearOrder(){
  document.getElementById("orderID").value="";
  document.getElementById("stepperArea").innerHTML="";
}

function buildStepper(){
  let html='<div class="stepper">';
  let steps=["استلام","تسعيرة","تسديد","مختبر","ورشة","نتائج"];

  steps.forEach((s,i)=>{
    let cls=i===2?'node next':'node';
    html+=`
    <div class="${cls}">
      <div class="circle"><i class="fas fa-check"></i></div>
      <div class="label">${s}</div>
    </div>`;
  });

  html+='</div>';
  document.getElementById("stepperArea").innerHTML=html;
}

function loadTracking(){
  const id=document.getElementById("orderID").value;
  if(!id) return alert("ادخل رقم");

  buildStepper(); // مؤقت
}
</script>

</body>
</html>
