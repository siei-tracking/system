<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>منصة تتبع أوامر العمل</title>
  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">

  <link rel="stylesheet" href="watermark.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.88);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --warn:#f39c12;
      --disabled:#bdc3c7;
      --soft:#f8fafc;
      --shadow:0 10px 30px rgba(17,24,39,.10);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      padding:0;
      font-family:'Cairo',sans-serif;
      background:var(--bg);
      color:var(--primary);
    }

    body{
      min-height:100vh;
    }

    .page-shell{
      min-height:100vh;
      position:relative;
      padding:24px 14px 40px;
    }

    .company-header{
      max-width:1150px;
      margin:0 auto 18px;
      background:
        linear-gradient(rgba(34,50,67,.90), rgba(34,50,67,.86)),
        url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      border-radius:28px;
      padding:28px 22px;
      box-shadow:var(--shadow);
      color:#fff;
      position:relative;
      overflow:hidden;
    }

    .company-header::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(245,166,35,.16), transparent 55%);
      pointer-events:none;
    }

    .brand{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:16px;
      justify-content:center;
      text-align:center;
      flex-wrap:wrap;
    }

    .brand img{
      width:78px;
      height:78px;
      object-fit:contain;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.18));
      background:rgba(255,255,255,.08);
      border-radius:18px;
      padding:8px;
    }

    .brand-text h1{
      margin:0;
      font-size:clamp(22px, 3.2vw, 34px);
      line-height:1.35;
      font-weight:900;
      letter-spacing:.2px;
    }

    .brand-text h2{
      margin:6px 0 0;
      font-size:clamp(16px, 2.1vw, 22px);
      font-weight:700;
      color:#f6d28b;
    }

    .content-wrap{
      max-width:1150px;
      margin:0 auto;
    }

    .panel{
      background:var(--card);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.65);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:20px 20px 10px;
      flex-wrap:wrap;
    }

    .panel-title{
      font-size:clamp(20px,2.4vw,28px);
      font-weight:900;
      color:var(--primary);
      display:flex;
      align-items:center;
      gap:10px;
    }

    .hint{
      margin-top:4px;
      color:var(--muted);
      font-size:15px;
      font-weight:700;
    }

    .search{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .search input{
      width:260px;
      max-width:100%;
      height:50px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 16px;
      font-family:'Cairo',sans-serif;
      font-size:16px;
      font-weight:700;
      color:var(--primary);
      outline:none;
      transition:.18s ease;
    }

    .search input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(245,166,35,.16);
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      height:50px;
      padding:0 18px;
      border-radius:14px;
      font-family:'Cairo',sans-serif;
      font-size:15px;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      transition:.18s ease;
      white-space:nowrap;
    }

    .btn i{
      font-size:15px;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--accent), var(--accent-dark));
      color:#fff;
      box-shadow:0 8px 18px rgba(245,166,35,.28);
    }

    .btn-primary:hover{
      transform:translateY(-1px);
    }

    .btn-ghost{
      background:#fff;
      color:var(--primary);
      border:1px solid var(--line);
    }

    .btn-ghost:hover{
      background:#f8fafc;
    }

    .info{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:8px 20px 0;
    }

    .chip,
    .status-badge{
      min-height:44px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--primary);
      font-weight:800;
      box-shadow:0 4px 12px rgba(15,23,42,.04);
    }

    .chip .muted{
      color:var(--muted);
      font-weight:700;
    }

    #stepperArea{
      padding:18px 20px 24px;
    }

    .empty-state{
      background:#fff;
      border:1px dashed #d6dee7;
      border-radius:18px;
      padding:34px 20px;
      text-align:center;
      color:var(--muted);
      font-weight:800;
    }

    .empty-state i{
      font-size:36px;
      margin-bottom:10px;
      color:#b6c2cf;
      display:block;
    }

    .stepper-wrap{
      overflow-x:auto;
      padding-bottom:4px;
    }

    .stepper{
      display:flex;
      align-items:flex-start;
      gap:8px;
      min-width:max-content;
    }

    .node{
      width:98px;
      min-width:98px;
      text-align:center;
      position:relative;
      flex:0 0 auto;
    }

    .node:not(:last-child)::after{
      content:"";
      position:absolute;
      top:18px;
      left:-53px;
      width:98px;
      height:4px;
      border-radius:999px;
      background:#dfe6ee;
      z-index:0;
    }

    .node.done:not(:last-child)::after{
      background:var(--ok);
    }

    .ball{
      width:36px;
      height:36px;
      border-radius:50%;
      margin:0 auto 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:900;
      position:relative;
      z-index:1;
      border:3px solid #dfe6ee;
      background:#fff;
      color:#94a3b8;
    }

    .node.done .ball{
      background:var(--ok);
      color:#fff;
      border-color:var(--ok);
      box-shadow:0 8px 18px rgba(39,174,96,.22);
    }

    .node.current .ball{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
      box-shadow:0 8px 18px rgba(245,166,35,.25);
    }

    .node.pending .ball{
      background:#fff;
      color:#94a3b8;
      border-color:#dfe6ee;
    }

    .label{
      font-size:13px;
      line-height:1.5;
      font-weight:800;
      color:var(--primary);
    }

    .node.pending .label{
      color:var(--muted);
    }

    .toast{
      position:fixed;
      top:18px;
      left:50%;
      transform:translateX(-50%) translateY(-20px);
      min-width:280px;
      max-width:min(92vw, 560px);
      background:#fff;
      border-right:6px solid var(--warn);
      color:var(--primary);
      box-shadow:0 16px 36px rgba(15,23,42,.18);
      border-radius:16px;
      padding:14px 16px;
      display:flex;
      align-items:flex-start;
      gap:12px;
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
    }

    .toast.show{
      opacity:1;
      pointer-events:auto;
      transform:translateX(-50%) translateY(0);
    }

    .toast i{
      color:var(--warn);
      font-size:20px;
      margin-top:2px;
    }

    .toast-title{
      font-weight:900;
      font-size:15px;
      margin-bottom:2px;
    }

    .toast-msg{
      font-weight:700;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    @media (max-width:768px){
      .page-shell{
        padding:14px 10px 28px;
      }

      .company-header{
        border-radius:22px;
        padding:22px 14px;
      }

      .brand{
        gap:10px;
      }

      .brand img{
        width:64px;
        height:64px;
      }

      .panel-head{
        padding:16px 14px 8px;
      }

      .info{
        padding:8px 14px 0;
      }

      #stepperArea{
        padding:16px 14px 18px;
      }

      .search{
        width:100%;
      }

      .search input{
        width:100%;
        flex:1 1 100%;
      }

      .btn{
        flex:1 1 calc(50% - 5px);
      }

      .chip,
      .status-badge{
        width:100%;
        justify-content:flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="company-header">
      <div class="brand">
        <img src="https://siei-tracking.github.io/system/logo.png" alt="logo">
        <div class="brand-text">
          <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
          <h2>منصة تتبع اوامر العمل</h2>
        </div>
      </div>
    </header>

    <div class="content-wrap">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title"><i class="fas fa-diagram-project"></i> تتبع حسب التسلسل</div>
            <div class="hint">أدخل رقم أمر العمل ثم اضغط (تتبع)</div>
          </div>

          <div class="search">
            <input id="orderID" type="text" placeholder="رقم أمر العمل" inputmode="numeric" />
            <button type="button" class="btn btn-ghost" onclick="clearOrder()">
              <i class="fas fa-eraser"></i> مسح
            </button>
            <button type="button" class="btn btn-primary" id="btnTrack" onclick="loadTracking()">
              <i class="fas fa-magnifying-glass"></i> تتبع
            </button>
          </div>
        </div>

        <div class="info" id="infoBar">
          <div class="chip">
            <i class="fas fa-building"></i>
            <span class="muted">الجهة:</span>
            <span id="clientName">—</span>
          </div>

          <div class="status-badge" id="typeBadge">
            <i class="fas fa-flask"></i>
            <span id="testTypeText">—</span>
          </div>
        </div>

        <div id="stepperArea">
          <div class="empty-state">
            <i class="fas fa-arrow-pointer"></i>
            أدخل رقم أمر العمل لعرض حالة التتبع
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-circle-exclamation"></i>
    <div>
      <div class="toast-title" id="toastTitle">تنبيه</div>
      <div class="toast-msg" id="toastMsg">يرجى إدخال أمر العمل</div>
    </div>
  </div>

  <script>
    const API_BASE = "ضع_رابط_الويب_آب_هنا";

    const STEP_LABELS = [
      "استلام المعاملة",
      "التخطيط",
      "التسعيرة",
      "التسديد",
      "المختبرات 1",
      "المصاعد",
      "الورشة",
      "المختبرات 2",
      "نتائج الفحص",
      "الكتاب الرسمي",
      "الباركود",
      "ارسال الايميل",
      "استلام النتائج"
    ];

    function showToast(message, title = "تنبيه"){
      const toast = document.getElementById("toast");
      document.getElementById("toastTitle").textContent = title;
      document.getElementById("toastMsg").textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("show"), 2800);
    }

    function clearOrder(){
      document.getElementById("orderID").value = "";
      document.getElementById("clientName").textContent = "—";
      document.getElementById("testTypeText").textContent = "—";
      document.getElementById("stepperArea").innerHTML = `
        <div class="empty-state">
          <i class="fas fa-arrow-pointer"></i>
          أدخل رقم أمر العمل لعرض حالة التتبع
        </div>
      `;
      document.getElementById("orderID").focus();
    }

    function buildStepper(completedIndex = -1){
      return `
        <div class="stepper-wrap">
          <div class="stepper">
            ${STEP_LABELS.map((label, i) => {
              let cls = "pending";
              if(i < completedIndex) cls = "done";
              else if(i === completedIndex) cls = "current";

              return `
                <div class="node ${cls}">
                  <div class="ball">${i < completedIndex ? '<i class="fas fa-check"></i>' : (i + 1)}</div>
                  <div class="label">${label}</div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    async function loadTracking(){
      const orderID = document.getElementById("orderID").value.trim();

      /* التعديل المطلوب فقط: تنبيه عند عدم إدخال رقم أمر العمل */
      if(!orderID){
        showToast("يرجى إدخال أمر العمل", "تنبيه");
        document.getElementById("orderID").focus();
        return;
      }

      const stepperArea = document.getElementById("stepperArea");
      stepperArea.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          جاري تحميل بيانات التتبع...
        </div>
      `;

      try{
        const res = await fetch(`${API_BASE}?action=trackingData&orderID=${encodeURIComponent(orderID)}`);
        const data = await res.json();

        if(!data || data.success === false || !data.row){
          document.getElementById("clientName").textContent = "—";
          document.getElementById("testTypeText").textContent = "—";
          stepperArea.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-circle-info"></i>
              لم يتم العثور على أمر العمل
            </div>
          `;
          return;
        }

        const row = data.row;
        const clientName = row.clientName || row.client || row.beneficiary || "—";
        const testType = row.testType || row.type || "—";
        const completedIndex = Number.isInteger(row.completedIndex) ? row.completedIndex : -1;

        document.getElementById("clientName").textContent = clientName;
        document.getElementById("testTypeText").textContent = testType;
        stepperArea.innerHTML = buildStepper(completedIndex);
      }catch(err){
        stepperArea.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-triangle-exclamation"></i>
            حدث خطأ أثناء جلب البيانات
          </div>
        `;
      }
    }

    document.getElementById("orderID").addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        loadTracking();
      }
    });
  </script>
</body>
</html>
