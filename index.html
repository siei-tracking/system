<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="watermark.css">

  <title>منصة تتبع أوامر العمل</title>
  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --card:rgba(255,255,255,0.88);
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --soft:#f8fafc;
      --shadow:0 12px 30px rgba(34,50,67,.12);
      --radius:22px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      font-family:'Cairo',sans-serif;
      background:var(--bg);
      color:var(--primary);
    }

    body{
      min-height:100vh;
    }

    .page-shell{
      position:relative;
      min-height:100vh;
      isolation:isolate;
      padding:24px 14px 40px;
    }

    .page-content{
      position:relative;
      z-index:1;
      width:min(1100px,100%);
      margin:0 auto;
    }

    .company-header{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      padding:26px 20px;
      margin-bottom:20px;
      color:#fff;
      background:
        linear-gradient(135deg, rgba(34,50,67,.94), rgba(34,50,67,.84)),
        url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');
      background-size:cover;
      background-position:center;
      box-shadow:var(--shadow);
    }

    .company-header::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, rgba(245,166,35,.16), transparent 40%);
      pointer-events:none;
    }

    .brand-wrap{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .brand-logo{
      width:72px;
      height:72px;
      border-radius:18px;
      background:rgba(255,255,255,.12);
      backdrop-filter:blur(3px);
      border:1px solid rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }

    .brand-logo img{
      width:56px;
      height:56px;
      object-fit:contain;
    }

    .brand-text{
      min-width:0;
    }

    .brand-text h1{
      margin:0 0 4px;
      font-size:clamp(20px,3vw,30px);
      font-weight:900;
      line-height:1.4;
    }

    .brand-text p{
      margin:0;
      font-size:clamp(14px,2vw,18px);
      opacity:.95;
      font-weight:700;
    }

    .panel{
      background:var(--card);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.65);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .panel-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .panel-title{
      font-size:clamp(20px,2.5vw,28px);
      font-weight:900;
      color:var(--primary);
      display:flex;
      align-items:center;
      gap:10px;
      line-height:1.3;
    }

    .hint{
      margin-top:6px;
      color:var(--muted);
      font-size:15px;
      font-weight:700;
    }

    .search{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      width:100%;
      justify-content:flex-end;
    }

    .search input{
      flex:1 1 280px;
      min-width:240px;
      height:52px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 16px;
      font-family:'Cairo',sans-serif;
      font-size:18px;
      font-weight:800;
      color:var(--primary);
      outline:none;
      transition:.2s ease;
    }

    .search input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(245,166,35,.14);
    }

    .btn{
      border:none;
      border-radius:14px;
      height:52px;
      padding:0 18px;
      font-family:'Cairo',sans-serif;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:.2s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      color:#fff;
      box-shadow:0 8px 18px rgba(245,166,35,.28);
    }

    .btn-primary:hover{
      transform:translateY(-1px);
    }

    .btn-ghost{
      background:#fff;
      color:var(--primary);
      border:1px solid var(--line);
    }

    .btn-ghost:hover{
      background:#f9fbfd;
    }

    .info{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:18px;
    }

    .chip,
    .status-badge{
      min-height:46px;
      padding:10px 14px;
      border-radius:14px;
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      border:1px solid var(--line);
      background:#fff;
      color:var(--primary);
    }

    .status-badge{
      background:#fffaf0;
      border-color:#fde2a7;
      color:#9a6700;
    }

    .muted{
      color:var(--muted);
      font-weight:700;
    }

    .stepper-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px 16px;
      box-shadow:0 8px 20px rgba(34,50,67,.06);
    }

    .stepper-scroll{
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      padding-bottom:6px;
    }

    .stepper-scroll::-webkit-scrollbar{
      height:7px;
    }

    .stepper-scroll::-webkit-scrollbar-thumb{
      background:#d8e0e8;
      border-radius:999px;
    }

    .stepper{
      display:flex;
      align-items:flex-start;
      gap:14px;
      min-width:max-content;
      padding:6px 2px;
    }

    .node{
      position:relative;
      width:110px;
      min-width:110px;
      text-align:center;
      flex:0 0 auto;
    }

    .node:not(:last-child)::before{
      content:"";
      position:absolute;
      top:23px;
      right:-63px;
      width:112px;
      height:4px;
      border-radius:999px;
      background:#dbe4ec;
      z-index:0;
    }

    .node.done:not(:last-child)::before{
      background:linear-gradient(90deg,var(--ok),#7ad6a5);
    }

    .ball{
      position:relative;
      z-index:1;
      width:46px;
      height:46px;
      margin:0 auto 10px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      border:3px solid #dbe4ec;
      background:#fff;
      color:#8b98a7;
      font-weight:900;
    }

    .node.done .ball{
      background:var(--ok);
      border-color:var(--ok);
      color:#fff;
      box-shadow:0 10px 20px rgba(39,174,96,.2);
    }

    .node.current .ball{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
      box-shadow:0 10px 20px rgba(245,166,35,.22);
    }

    .node-label{
      font-size:13px;
      font-weight:900;
      line-height:1.5;
      color:var(--primary);
    }

    .node-meta{
      margin-top:4px;
      font-size:11px;
      color:var(--muted);
      font-weight:700;
      line-height:1.4;
      word-break:break-word;
    }

    .empty-state{
      padding:22px 16px;
      text-align:center;
      color:var(--muted);
      font-weight:800;
      background:#fff;
      border:1px dashed #cfd9e3;
      border-radius:18px;
    }

    .toast-alert{
      position:fixed;
      top:22px;
      left:50%;
      transform:translateX(-50%) translateY(-20px);
      background:#e74c3c;
      color:#fff;
      padding:14px 18px;
      border-radius:14px;
      font-weight:900;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow:0 10px 25px rgba(231,76,60,.28);
      opacity:0;
      pointer-events:none;
      z-index:99999;
      transition:all .3s ease;
      font-size:15px;
      min-width:240px;
      justify-content:center;
    }

    .toast-alert.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .toast-alert i{
      font-size:18px;
    }

    @media (max-width:768px){
      .page-shell{
        padding:16px 10px 30px;
      }

      .company-header{
        border-radius:22px;
        padding:20px 14px;
      }

      .brand-wrap{
        align-items:center;
        justify-content:center;
        text-align:center;
      }

      .brand-logo{
        width:64px;
        height:64px;
      }

      .brand-logo img{
        width:48px;
        height:48px;
      }

      .panel{
        padding:14px;
        border-radius:20px;
      }

      .panel-head{
        align-items:stretch;
      }

      .search{
        flex-direction:column;
        align-items:stretch;
      }

      .search input,
      .btn{
        width:100%;
      }

      .search input{
        min-width:0;
        font-size:20px;
        height:54px;
      }

      .btn{
        height:52px;
        font-size:17px;
      }

      .panel-title{
        font-size:22px;
      }

      .hint{
        font-size:14px;
      }

      .info{
        flex-direction:column;
      }

      .chip,
      .status-badge{
        width:100%;
      }

      .node{
        width:98px;
        min-width:98px;
      }

      .node:not(:last-child)::before{
        right:-56px;
        width:100px;
      }

      .ball{
        width:42px;
        height:42px;
        font-size:16px;
      }

      .toast-alert{
        width:calc(100% - 24px);
        max-width:430px;
        top:14px;
      }
    }
  </style>
</head>
<body>
  <div id="toastAlert" class="toast-alert">
    <i class="fas fa-triangle-exclamation"></i>
    يرجى إدخال رقم أمر العمل
  </div>

  <div class="page-shell">
    <div class="page-content">
      <header class="company-header">
        <div class="brand-wrap">
          <div class="brand-logo">
            <img src="https://siei-tracking.github.io/system/logo.png" alt="logo">
          </div>
          <div class="brand-text">
            <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
            <p>منصة تتبع أوامر العمل</p>
          </div>
        </div>
      </header>

      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title"><i class="fas fa-diagram-project"></i> تتبع حسب التسلسل</div>
            <div class="hint">أدخل رقم أمر العمل ثم اضغط (تتبع)</div>
          </div>

          <div class="search">
            <input id="orderID" type="text" placeholder="رقم أمر العمل" inputmode="numeric" />
            <button type="button" class="btn btn-ghost" onclick="clearOrder()">
              <i class="fas fa-eraser"></i> مسح
            </button>
            <button type="button" class="btn btn-primary" id="btnTrack" onclick="loadTracking()">
              <i class="fas fa-magnifying-glass"></i> تتبع
            </button>
          </div>
        </div>

        <div class="info" id="infoBar">
          <div class="chip">
            <i class="fas fa-building"></i>
            <span class="muted">الجهة:</span>
            <span id="clientName">—</span>
          </div>

          <div class="status-badge" id="typeBadge">
            <i class="fas fa-flask"></i>
            <span id="testTypeText">—</span>
          </div>
        </div>

        <div id="stepperArea">
          <div class="empty-state">
            أدخل رقم أمر العمل لعرض حالة التتبع
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "PUT_YOUR_WEBAPP_URL_HERE";

    const STEPS = [
      { key:"receive", label:"استلام المعاملة", icon:"fa-inbox" },
      { key:"plan", label:"التخطيط", icon:"fa-diagram-project" },
      { key:"price", label:"التسعيرة", icon:"fa-money-bill-wave" },
      { key:"payment", label:"التسديد", icon:"fa-cash-register" },
      { key:"lab1", label:"المختبرات 1", icon:"fa-flask" },
      { key:"elev", label:"المصاعد", icon:"fa-elevator" },
      { key:"workshop", label:"الورشة", icon:"fa-screwdriver-wrench" },
      { key:"lab2", label:"المختبرات 2", icon:"fa-vials" },
      { key:"results", label:"نتائج الفحص", icon:"fa-file-lines" },
      { key:"official", label:"الكتاب الرسمي", icon:"fa-file-signature" },
      { key:"barcode", label:"الباركود", icon:"fa-barcode" },
      { key:"email", label:"إرسال الإيميل", icon:"fa-envelope" },
      { key:"receiveResults", label:"استلام النتائج", icon:"fa-clipboard-check" }
    ];

    function showToast(){
      const toast = document.getElementById("toastAlert");
      toast.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    }

    function clearOrder(){
      document.getElementById("orderID").value = "";
      document.getElementById("clientName").textContent = "—";
      document.getElementById("testTypeText").textContent = "—";
      document.getElementById("stepperArea").innerHTML = `
        <div class="empty-state">
          أدخل رقم أمر العمل لعرض حالة التتبع
        </div>
      `;
      document.getElementById("orderID").focus();
    }

    function isDone(val){
      return String(val || "").trim().startsWith("✅");
    }

    function getCurrentIndex(statuses){
      const firstPending = statuses.findIndex(s => !s.done);
      return firstPending === -1 ? statuses.length - 1 : firstPending;
    }

    function renderStepper(statuses){
      const currentIndex = getCurrentIndex(statuses);

      const html = `
        <div class="stepper-card">
          <div class="stepper-scroll">
            <div class="stepper">
              ${statuses.map((step, index) => `
                <div class="node ${step.done ? 'done' : ''} ${!step.done && index === currentIndex ? 'current' : ''}">
                  <div class="ball">
                    ${step.done ? '<i class="fas fa-check"></i>' : `<i class="fas ${step.icon}"></i>`}
                  </div>
                  <div class="node-label">${step.label}</div>
                  <div class="node-meta">${step.meta || ''}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;

      document.getElementById("stepperArea").innerHTML = html;
    }

    async function loadTracking(){
      const orderID = document.getElementById("orderID").value.trim();

      if(!orderID){
        showToast();
        return;
      }

      const btn = document.getElementById("btnTrack");
      const oldHTML = btn.innerHTML;

      btn.disabled = true;
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري التتبع`;

      try{
        const url = `${API_BASE}?action=trackingDataTrackingOnly&orderID=${encodeURIComponent(orderID)}`;
        const res = await fetch(url);
        const data = await res.json();

        if(!data || data.success === false || !data.row){
          document.getElementById("clientName").textContent = "غير موجود";
          document.getElementById("testTypeText").textContent = "—";
          document.getElementById("stepperArea").innerHTML = `
            <div class="empty-state">
              لا توجد بيانات مطابقة لرقم أمر العمل المدخل
            </div>
          `;
          return;
        }

        const row = data.row;

        document.getElementById("clientName").textContent = row.clientName || row.client || "—";
        document.getElementById("testTypeText").textContent = row.testType || "—";

        const statuses = [
          { label:"استلام المعاملة", icon:"fa-inbox", done:isDone(row.receive), meta:row.receive || "" },
          { label:"التخطيط", icon:"fa-diagram-project", done:isDone(row.plan), meta:row.plan || "" },
          { label:"التسعيرة", icon:"fa-money-bill-wave", done:isDone(row.price), meta:row.price || "" },
          { label:"التسديد", icon:"fa-cash-register", done:isDone(row.payment), meta:row.payment || "" },
          { label:"المختبرات 1", icon:"fa-flask", done:isDone(row.lab1), meta:row.lab1 || "" },
          { label:"المصاعد", icon:"fa-elevator", done:isDone(row.elev), meta:row.elev || "" },
          { label:"الورشة", icon:"fa-screwdriver-wrench", done:isDone(row.workshop), meta:row.workshop || "" },
          { label:"المختبرات 2", icon:"fa-vials", done:isDone(row.lab2), meta:row.lab2 || "" },
          { label:"نتائج الفحص", icon:"fa-file-lines", done:isDone(row.results), meta:row.results || "" },
          { label:"الكتاب الرسمي", icon:"fa-file-signature", done:isDone(row.official), meta:row.official || "" },
          { label:"الباركود", icon:"fa-barcode", done:isDone(row.barcode), meta:row.barcode || "" },
          { label:"إرسال الإيميل", icon:"fa-envelope", done:isDone(row.email), meta:row.email || "" },
          { label:"استلام النتائج", icon:"fa-clipboard-check", done:isDone(row.receiveResults), meta:row.receiveResults || "" }
        ];

        renderStepper(statuses);
      }catch(error){
        document.getElementById("clientName").textContent = "خطأ";
        document.getElementById("testTypeText").textContent = "—";
        document.getElementById("stepperArea").innerHTML = `
          <div class="empty-state">
            حدث خطأ أثناء تحميل البيانات
          </div>
        `;
      }finally{
        btn.disabled = false;
        btn.innerHTML = oldHTML;
      }
    }

    document.getElementById("orderID").addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        loadTracking();
      }
    });
  </script>
</body>
</html>
