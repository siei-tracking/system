<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="watermark.css">
  <title>منصة تتبع أوامر العمل</title>
  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --primary:#223243;
      --accent:#f5a623;
      --accent-dark:#e59712;
      --bg:#eef2f6;
      --line:#e5ebf1;
      --muted:#758292;
      --ok:#27ae60;
      --danger:#e74c3c;
      --disabled:#bdc3c7;
      --soft:#f8fafc;
      --warn:#f39c12;
      --transition-fast:.15s ease;
      --transition-med:.25s ease;
      --radius-sm:10px;
      --radius-md:14px;
      --radius-lg:22px;
    }

    *, *::before, *::after{ box-sizing:border-box; }
    html, body{ width:100%; overflow-x:hidden; }

    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),
        var(--bg);
      color:#111;
    }

    /* ===== HEADER ===== */
    .company-header{
      background-image:
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),
        url('https://siei-tracking.github.io/system/company.jpg');
      background-size:cover;
      background-position:center;
      padding:62px 5%;
      display:flex;
      align-items:center;
      gap:22px;
      color:#fff;
      flex-wrap:wrap;
      justify-content:center;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      position:relative;
      overflow:hidden;
    }

    .company-logo{
      width:100px;
      height:100px;
      background:#fff;
      border-radius:50%;
      padding:5px;
      object-fit:contain;
      display:block;
      flex-shrink:0;
      box-shadow:0 4px 16px rgba(0,0,0,.25);
    }

    .header-text{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      max-width:100%;
    }

    .header-text h1{
      color:#fff;
      margin:0;
      font-size:30px;
      font-weight:900;
      line-height:1.45;
      text-shadow:0 2px 8px rgba(0,0,0,.7);
    }

    .header-text p{
      color:#fff;
      margin:0;
      font-size:18px;
      font-weight:900;
      line-height:1.5;
      text-shadow:0 2px 8px rgba(0,0,0,.7);
    }

    /* ===== LAYOUT ===== */
    .page-content{ position:relative; z-index:2; }

    .wrap{
      padding:22px 5% 45px;
      display:flex;
      justify-content:center;
      position:relative;
      z-index:2;
    }

    /* ===== PANEL ===== */
    .panel{
      width:100%;
      max-width:1275px;
      background:rgba(255,255,255,0.92);
      border-radius:var(--radius-lg);
      box-shadow:
        0 20px 50px rgba(0,0,0,.12),
        0 6px 18px rgba(0,0,0,.06);
      margin-top:-48px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.65);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      position:relative;
      z-index:2;
      transition:transform var(--transition-med), box-shadow var(--transition-med);
    }

    .panel:hover{
      transform:translateY(-3px);
      box-shadow:
        0 26px 60px rgba(0,0,0,.16),
        0 8px 22px rgba(0,0,0,.08);
    }

    .panel::before{
      content:"";
      position:absolute;
      top:0; left:0; right:0;
      height:60px;
      background:linear-gradient(to bottom, rgba(255,255,255,.55), transparent);
      border-radius:var(--radius-lg) var(--radius-lg) 0 0;
      pointer-events:none;
    }

    /* ===== PANEL HEAD ===== */
    .panel-head{
      padding:18px 18px 14px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(243,156,18,.08), transparent);
      position:relative;
      z-index:2;
    }

    .panel-title{
      font-weight:900;
      font-size:16px;
      color:#111;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .hint{
      color:#758292;
      font-weight:900;
      font-size:13px;
      margin-top:6px;
    }

    /* ===== SEARCH ===== */
    .search{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
      position:relative;
      z-index:10;
    }

    #orderID{
      font-size:24px;
      font-weight:600;
      text-align:center;
      height:50px;
      line-height:50px;
    }

    #orderID::placeholder{
      font-size:15px;
      font-weight:900;
      text-align:center;
    }

    input{
      padding:12px 14px;
      border-radius:var(--radius-sm);
      border:2px solid #e7eaee;
      font-family:'Cairo',sans-serif;
      font-weight:900;
      text-align:center;
      min-width:260px;
      outline:none;
      transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
      background:#fff;
      min-height:44px;
      -webkit-tap-highlight-color:transparent;
    }

    input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(245,166,35,.12);
    }

    /* ===== BUTTONS ===== */
    .btn{
      height:50px;
      padding:0 12px;
      font-size:18px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:none;
      border-radius:var(--radius-sm);
      font-family:'Cairo',sans-serif;
      cursor:pointer;
      gap:8px;
      transition:transform var(--transition-fast), opacity var(--transition-fast);
      white-space:nowrap;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      position:relative;
      overflow:hidden;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0; right:-120%;
      width:120%; height:100%;
      background:linear-gradient(120deg, transparent 20%, rgba(255,255,255,.18) 50%, transparent 80%);
      transition:.65s;
    }

    .btn:hover::before{ right:120%; }
    .btn:hover{ transform:translateY(-1px); opacity:.96; }
    .btn:active{ transform:translateY(0); opacity:.9; }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; pointer-events:none; }

    .btn-primary{ background:var(--primary); color:#fff; box-shadow:0 8px 18px rgba(34,50,67,.20); }
    .btn-ghost  { background:#f3f5f7; color:#333; }

    /* ===== INFO BAR ===== */
    .info{
      padding:16px 18px;
      display:none;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:var(--radius-md);
      font-weight:900;
      background:#f6f8fa;
      border:1px solid #eef1f4;
      color:#111;
    }

    .chip .muted{ color:var(--muted); font-weight:900; }

    .status-badge{
      padding:10px 12px;
      border-radius:var(--radius-md);
      font-weight:900;
      border:1px solid #eef1f4;
      background:#f6f8fa;
      color:#111;
      display:inline-flex;
      align-items:center;
      gap:10px;
    }

    /* ===== STEPPER ===== */
    .stepper-scroll{
      padding:0 2px;
      overflow-x:auto;
      overflow-y:hidden;
      background:linear-gradient(180deg, rgba(44,62,80,.03), transparent);
    }

    .stepper-scroll::-webkit-scrollbar{ height:10px; }
    .stepper-scroll::-webkit-scrollbar-thumb{ background:#d9e1ea; border-radius:999px; }

    .stepper{
      display:flex;
      flex-wrap:nowrap;
      gap:10px;
      width:max-content;
      direction:rtl;
      align-items:flex-start;
      padding:6px 6px 10px;
    }

    .node{
      flex:0 0 auto;
      width:150px;
      min-width:150px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      position:relative;
      padding:6px 4px 4px;
      user-select:none;
    }

    .node:not(:first-child)::before{
      content:"";
      position:absolute;
      top:35px;
      right:-13px;
      width:16px;
      height:4px;
      background:#dfe5ec;
      z-index:0;
      border-radius:999px;
    }

    .circle{
      width:70px;
      height:70px;
      border-radius:50%;
      background:var(--disabled);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      box-shadow:0 10px 22px rgba(0,0,0,.10);
      z-index:1;
      transition:background var(--transition-med), transform var(--transition-med);
    }

    .label{
      text-align:center;
      font-weight:900;
      font-size:16px;
      color:#111;
      line-height:1.35;
    }

    .sub{
      text-align:center;
      font-weight:900;
      margin-top:-6px;
      min-height:40px;
      line-height:1.25;
      max-width:150px;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub-date{
      font-size:15px;
      font-weight:900;
      color:#111;
      direction:ltr;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:150px;
    }

    .node.locked{ opacity:.85; }
    .node.done .circle{ background:var(--ok); }
    .node.next .circle{ background:var(--accent); transform:scale(1.06); }
    .node.done:not(:first-child)::before{ background:var(--ok); }
    .node.next:not(:first-child)::before{ background:var(--accent); }

    /* ===== SKELETON ===== */
    .skeleton-node{
      flex:0 0 auto;
      width:150px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      padding:6px 4px 4px;
    }

    .skeleton-circle{
      width:70px; height:70px;
      border-radius:50%;
      background:linear-gradient(90deg,#e8ecf0 25%,#d5dce4 50%,#e8ecf0 75%);
      background-size:200% 100%;
      animation:shimmer 1.4s infinite;
    }

    .skeleton-line{
      height:14px; width:90px; border-radius:6px;
      background:linear-gradient(90deg,#e8ecf0 25%,#d5dce4 50%,#e8ecf0 75%);
      background-size:200% 100%;
      animation:shimmer 1.4s infinite;
    }

    .skeleton-line.short{ width:60px; height:12px; }

    @keyframes shimmer{
      0%  { background-position:200% 0; }
      100%{ background-position:-200% 0; }
    }

    /* ===== EMPTY + NOTE ===== */
    .empty{
      padding:26px 18px;
      text-align:center;
      color:var(--muted);
      font-weight:900;
    }

    .workflow-note{
      margin:10px 16px 16px;
      padding:12px 14px;
      border-radius:var(--radius-md);
      background:rgba(245,166,35,.12);
      border:1px solid rgba(245,166,35,.28);
      color:#7a5610;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      text-align:center;
      position:relative;
      z-index:2;
    }

    /* ===== TOAST ===== */
    .toast-alert{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%) translateY(20px);
      background:linear-gradient(180deg, #f3b43b, #eba31c);
      color:#fff;
      padding:14px 24px;
      border-radius:var(--radius-md);
      font-family:'Cairo',sans-serif;
      font-weight:900;
      font-size:16px;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow:0 16px 32px rgba(0,0,0,.18);
      opacity:0;
      visibility:hidden;
      transition:.28s ease;
      z-index:99999;
      pointer-events:none;
      white-space:nowrap;
    }

    .toast-alert.show{
      opacity:1;
      visibility:visible;
      transform:translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width:820px){
      .company-header{ padding:40px 14px 52px; gap:14px; }
      .company-logo{ width:78px; height:78px; }
      .header-text h1{ font-size:22px; }
      .header-text p{ font-size:15px; }
      .wrap{ padding:16px 10px 30px; }
      .panel{ margin-top:-32px; border-radius:18px; }
      input{ min-width:0; width:100%; }
      .search{ width:100%; justify-content:stretch; }
      .btn{ width:100%; justify-content:center; }
      .panel-head{ align-items:stretch; }
    }

    @media (max-width:520px){
      .company-header{ padding:32px 12px 44px; }
      .company-logo{ width:68px; height:68px; }
      .header-text h1{ font-size:18px; }
      .header-text p{ font-size:13px; }
      .toast-alert{
        width:calc(100% - 32px);
        justify-content:center;
        font-size:15px;
        padding:13px 18px;
        white-space:normal;
        text-align:center;
      }
    }
  </style>
</head>
<body>

<div class="page-shell">
  <header class="company-header">
    <img class="company-logo" src="https://siei-tracking.github.io/system/logo.png" alt="شعار الشركة">
    <div class="header-text">
      <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>
      <p><i class="fas fa-route"></i> منصة تتبع أوامر العمل</p>
    </div>
  </header>

  <div class="page-content">
    <div class="wrap">
      <div class="panel">

        <div class="panel-head">
          <div>
            <div class="panel-title"><i class="fas fa-diagram-project"></i> تتبع حسب التسلسل</div>
            <div class="hint">أدخل رقم أمر العمل ثم اضغط (تتبع)</div>
          </div>

          <div class="search">
            <input id="orderID" type="text" placeholder="رقم أمر العمل" inputmode="numeric">
            <button type="button" class="btn btn-ghost" id="btnClear" onclick="clearOrder()">
              <i class="fas fa-eraser"></i> مسح
            </button>
            <button type="button" class="btn btn-primary" id="btnTrack" onclick="loadTracking()">
              <i class="fas fa-magnifying-glass"></i> تتبع
            </button>
          </div>
        </div>

        <div class="info" id="infoBar">
          <div class="chip">
            <i class="fas fa-building"></i>
            <span class="muted">الجهة:</span>
            <span id="clientName">—</span>
          </div>
          <div class="status-badge" id="typeBadge">
            <i class="fas fa-flask"></i>
            <span id="testTypeText">—</span>
          </div>
        </div>

        <div id="stepperArea"></div>

      </div>
    </div>
  </div>
</div>

<div id="toastAlert" class="toast-alert" role="alert" aria-live="assertive">
  <i class="fas fa-triangle-exclamation"></i>
  <span id="toastText"></span>
</div>

<script>
  const API_BASE = "https://script.google.com/macros/s/AKfycbwtWELrbvCU6O-GToUfyVUEYR5RYyjBEFpTMwhkP7imoji_ApvgJwaMGKs-zQed-5nb/exec";

  let isLoading  = false;
  let toastTimer = null;

  /* ============================================================
   * UI HELPERS
   * ============================================================ */
  function showToast(msg, type){
    const toast = document.getElementById("toastAlert");
    const text  = document.getElementById("toastText");
    text.textContent = msg || "";
    toast.style.background = (type === "err")
      ? "linear-gradient(180deg,#e74c3c,#c0392b)"
      : "linear-gradient(180deg,#f3b43b,#eba31c)";
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toast.classList.remove("show"); }, 3000);
  }

  function setBtnLoading(on){
    const btn = document.getElementById("btnTrack");
    btn.disabled  = on;
    btn.innerHTML = on
      ? '<i class="fas fa-spinner fa-spin"></i> جاري...'
      : '<i class="fas fa-magnifying-glass"></i> تتبع';
  }

  function showSkeletonStepper(){
    var html = '<div class="stepper-scroll"><div class="stepper">';
    for(var i = 0; i < 6; i++){
      html += '<div class="skeleton-node">' +
        '<div class="skeleton-circle"></div>' +
        '<div class="skeleton-line"></div>' +
        '<div class="skeleton-line short"></div>' +
        '</div>';
    }
    html += '</div></div>';
    document.getElementById("stepperArea").innerHTML = html;
  }

  /* ============================================================
   * DATA HELPERS
   * ============================================================ */
  function normalizeOrderNo(value){
    return String(value || "")
      .replace(/[٠-٩]/g, function(d){ return "٠١٢٣٤٥٦٧٨٩".indexOf(d); })
      .replace(/[۰-۹]/g, function(d){ return "۰۱۲۳۴۵۶۷۸۹".indexOf(d); })
      .replace(/\s+/g, "")
      .trim();
  }

  function isReceiveDone(v){
    v = String(v || "");
    return v.includes("✅") && v.includes("استلام");
  }

  function isOkDone(v){
    return String(v || "").includes("✅");
  }

  function escapeHtml(text){
    return String(text == null ? "" : text)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function formatSub(val, done, cls){
    if(!done){
      return (cls.indexOf("next") !== -1)
        ? '<div class="sub-date">الخطوة الحالية</div>'
        : '<div class="sub-date">بانتظار</div>';
    }
    val = String(val || "")
      .replace("✅","").replace("استلام -","").replace("استلام","").trim();
    var m = val.match(/\d{4}-\d{2}-\d{2}\s*\|\s*\d{2}:\d{2}/);
    if(m && m[0]) return '<div class="sub-date">' + escapeHtml(m[0].trim()) + '</div>';
    return '<div class="sub-date">' + escapeHtml(val) + '</div>';
  }

  /* ============================================================
   * BUILD STEPPER
   * ============================================================ */
  function buildStepper(data){
    const pricingDone   = isOkDone(data.pricing);
    const testType      = String(data.testType || "").trim();
    const labPath       = String(data.labPath  || "").trim();
    const workflowReady = pricingDone && !!testType;

    var steps = [
      {key:"inspection", label:"استلام المعاملة", icon:"fa-handshake",     doneFn:isReceiveDone},
      {key:"pricing",    label:"التسعيرة",        icon:"fa-receipt",        doneFn:isOkDone}
    ];

    if(workflowReady){
      steps.push({key:"payment", label:"التسديد", icon:"fa-sack-dollar", doneFn:isOkDone});
      if(testType === "مصاعد"){
        steps.push({key:"elev", label:"المصاعد", icon:"fa-elevator", doneFn:isReceiveDone});
      }else{
        steps.push({key:"lab1", label:"المختبرات", icon:"fa-microscope", doneFn:isReceiveDone});
        if(labPath !== "مختبرات فقط"){
          steps.push({key:"workshop", label:"الورشة",    icon:"fa-screwdriver-wrench", doneFn:isReceiveDone});
          steps.push({key:"lab2",     label:"المختبرات", icon:"fa-flask-vial",         doneFn:isReceiveDone});
        }
      }
      steps.push({key:"testResults", label:"نتائج الفحص",   icon:"fa-clipboard-check", doneFn:isReceiveDone});
      steps.push({key:"official",    label:"الكتاب",         icon:"fa-file-signature",  doneFn:isReceiveDone});
      steps.push({key:"barcode",     label:"الباركود",       icon:"fa-qrcode",          doneFn:isReceiveDone});
      steps.push({key:"email",       label:"الإيميل",        icon:"fa-paper-plane",     doneFn:isReceiveDone});
      steps.push({key:"final",       label:"استلام النتائج", icon:"fa-flag-checkered",  doneFn:isReceiveDone});
    }

    var firstPending = false;
    var html = '<div class="stepper-scroll"><div class="stepper">';

    steps.forEach(function(s){
      var val  = String((data && data[s.key]) || "");
      var done = s.doneFn(val);
      var cls  = "node";
      if(done){
        cls += " done";
      }else if(!firstPending){
        cls += " next";
        firstPending = true;
      }else{
        cls += " locked";
      }

      /* تأمين icon */
      var safeIcon = String(s.icon || "").replace(/[^a-z0-9\-]/g,"");
      var subHtml  = formatSub(val, done, cls);

      html += '<div class="' + cls + '">' +
        '<div class="circle"><i class="fas ' + safeIcon + '"></i></div>' +
        '<div class="label">' + escapeHtml(s.label) + '</div>' +
        '<div class="sub">' + subHtml + '</div>' +
        '</div>';
    });

    html += '</div></div>';

    if(!workflowReady){
      html += '<div class="workflow-note">' +
        '<i class="fas fa-circle-info"></i>' +
        ' تظهر بقية المراحل بعد تثبيت التسعيرة ونوع الفحص' +
        '</div>';
    }

    document.getElementById("stepperArea").innerHTML = html;

    var next = document.querySelector(".node.next");
    if(next){
      next.scrollIntoView({ behavior:"smooth", inline:"center", block:"nearest" });
    }else{
      var nodes = document.querySelectorAll(".node");
      var last  = nodes[nodes.length - 1];
      if(last) last.scrollIntoView({ behavior:"smooth", inline:"end", block:"nearest" });
    }
  }

  /* ============================================================
   * CLEAR
   * ============================================================ */
  function clearOrder(){
    document.getElementById("orderID").value = "";
    document.getElementById("stepperArea").innerHTML = "";
    document.getElementById("infoBar").style.display = "none";
    document.getElementById("orderID").focus();
  }

  /* ============================================================
   * FETCH
   * ============================================================ */
  async function fetchTrackingData(orderId){
    const res = await fetch(API_BASE, {
      method:  "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body:    JSON.stringify({ action:"trackingDataFromTrackingOnly", order:orderId, _t:Date.now() })
    });
    if(!res.ok) throw new Error("فشل الاتصال بالسيرفر (HTTP " + res.status + ")");
    const text = await res.text();
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ throw new Error("رد غير صالح من السيرفر"); }
    if(data && data.ok === false && data.error) throw new Error(data.error);
    return data;
  }

  /* ============================================================
   * LOAD TRACKING — مع debounce + skeleton
   * ============================================================ */
  async function loadTracking(){
    if(isLoading) return;

    const id = normalizeOrderNo(document.getElementById("orderID").value || "");
    if(!id){ showToast("⚠️ يرجى إدخال رقم أمر العمل"); return; }

    isLoading = true;
    setBtnLoading(true);
    showSkeletonStepper();
    document.getElementById("infoBar").style.display = "none";

    try{
      const data = await fetchTrackingData(id);
      setBtnLoading(false);
      isLoading = false;

      if(!data || data.ok === false || data.found === false){
        document.getElementById("infoBar").style.display = "none";
        document.getElementById("stepperArea").innerHTML =
          '<div class="empty"><i class="fas fa-circle-exclamation"></i> المعاملة غير موجودة أو الرقم غير صحيح</div>';
        return;
      }

      document.getElementById("infoBar").style.display = "flex";
      document.getElementById("clientName").innerText = data.clientName || "—";

      const type        = String(data.testType || "").trim();
      const pricingDone = isOkDone(data.pricing);
      const badge       = document.getElementById("typeBadge");

      if(!pricingDone || !type){
        badge.innerHTML = '<i class="fas fa-hourglass-half"></i> <span>بانتظار التسعيرة وتحديد الفحص</span>';
      }else if(type === "مصاعد"){
        badge.innerHTML = '<i class="fas fa-elevator"></i> <span>مصاعد</span>';
      }else if(type === "مختبرات"){
        badge.innerHTML = '<i class="fas fa-microscope"></i> <span>مختبرات</span>';
      }else{
        badge.innerHTML = '<i class="fas fa-triangle-exclamation"></i> <span>نوع الفحص غير محدد</span>';
      }

      buildStepper(data);

    }catch(err){
      setBtnLoading(false);
      isLoading = false;
      const msg = (err && err.message) ? err.message : String(err || "خطأ غير معروف");
      document.getElementById("stepperArea").innerHTML =
        '<div class="empty"><i class="fas fa-circle-exclamation"></i> ' + escapeHtml(msg) + '</div>';
      showToast("❌ " + msg, "err");
    }
  }

  /* ============================================================
   * INIT
   * ============================================================ */
  window.addEventListener("load", function(){
    var inp = document.getElementById("orderID");
    if(inp){
      inp.addEventListener("keydown", function(e){ if(e.key === "Enter") loadTracking(); });
      inp.focus();
    }
  });

  window.loadTracking = loadTracking;
  window.clearOrder   = clearOrder;
</script>
