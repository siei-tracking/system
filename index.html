<!DOCTYPE html>  <html dir="rtl" lang="ar">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="watermark.css">

  <title>منصة تتبع أوامرالعمل</title>  <link rel="icon" href="https://siei-tracking.github.io/system/logo.png">    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    <style>  
    :root{  
      --primary:#223243;  
      --accent:#f5a623;  
      --accent-dark:#e59712;  
      --bg:#eef2f6;  
      --card:rgba(255,255,255,0.88);  
      --line:#e5ebf1;  
      --muted:#758292;  
      --ok:#27ae60;  
      --danger:#e74c3c;  
      --disabled:#bdc3c7;  
      --soft:#f8fafc;  
    }  
  
    *{ box-sizing:border-box; }  
  
    body{  
      margin:0;  
      font-family:'Cairo',sans-serif;  
      background:  
        radial-gradient(circle at top right, rgba(245,166,35,.08), transparent 24%),  
        radial-gradient(circle at top left, rgba(34,50,67,.05), transparent 30%),  
        var(--bg);  
      color:#111;  
    }  
  
    .company-header{  
      background-image:  
        linear-gradient(rgba(34,50,67,.3), rgba(34,50,67,.3)),  
        url('https://drive.google.com/thumbnail?id=1kGABjKDT_tHkUbce1CWMVVFfrbfJ1_P7&sz=w1400');  
      background-size:cover;  
      background-position:center;  
      padding:62px 5%;  
      display:flex;  
      align-items:center;  
      gap:22px;  
      color:#fff;  
      flex-wrap:wrap;  
      justify-content:center;  
      text-align:center;  
      box-shadow:0 10px 30px rgba(0,0,0,0.25);  
      position:relative;  
      overflow:hidden;  
    }  
  
    .company-logo{  
      width:100px;  
      height:100px;  
      background:#fff;  
      border-radius:50%;  
      padding:5px;  
      object-fit:contain;  
      display:block;  
      flex-shrink:0;  
      box-shadow:  
        -1px -1px 0 rgba(0,0,0,0.1),  
         1px -1px 0 rgba(0,0,0,0.1),  
        -1px  1px 0 rgba(0,0,0,0.1),  
         1px  1px 0 rgba(0,0,0,0.1),  
         0 1px 4px rgba(0,0,0,0.1) !important;  
    }  
  
    .header-text{  
      display:flex;  
      flex-direction:column;  
      align-items:center;  
      gap:6px;  
    }  
  
    .header-text h1{  
      color:#fff !important;  
      margin:0;  
      font-size:30px !important;  
      font-weight:900 !important;  
      text-shadow:  
        -1px -1px 0 rgba(0,0,0,0.9),  
         1px -1px 0 rgba(0,0,0,0.9),  
        -1px  1px 0 rgba(0,0,0,0.9),  
         1px  1px 0 rgba(0,0,0,0.9),  
         0 4px 10px rgba(0,0,0,0.8) !important;  
    }  
  
    .header-text p{  
      color:#fff !important;  
      margin:0;  
      font-size:18px !important;  
      font-weight:900 !important;  
      text-shadow:  
        -1px -1px 0 rgba(0,0,0,0.9),  
         1px -1px 0 rgba(0,0,0,0.9),  
        -1px  1px 0 rgba(0,0,0,0.9),  
         1px  1px 0 rgba(0,0,0,0.9),  
         0 4px 10px rgba(0,0,0,0.8) !important;  
    }  
  
    .page-content{  
      position:relative;  
      z-index:2;  
    }  
  
    .wrap{  
      padding:22px 5% 45px;  
      display:flex;  
      justify-content:center;  
      position:relative;  
      z-index:2;  
    }  
  
    .panel{  
      width:100%;  
      max-width:1275px;  
      background:rgba(255,255,255,0.88);  
      border-radius:22px;  
      box-shadow:0 18px 45px rgba(0,0,0,0.10);  
      margin-top:-48px;  
      overflow:hidden;  
      border:1px solid rgba(255,255,255,0.55);  
      backdrop-filter: blur(10px);  
      -webkit-backdrop-filter: blur(10px);  
      position:relative;  
      z-index:2;  
    }  
  
    .panel-head{  
      padding:18px 18px 14px;  
      display:flex;  
      align-items:flex-start;  
      justify-content:space-between;  
      gap:14px;  
      flex-wrap:wrap;  
      border-bottom:1px solid var(--line);  
      background:linear-gradient(180deg, rgba(243,156,18,0.08), transparent);  
    }  
  
    .panel-title{  
      font-weight:900;  
      font-size:16px;  
      color:#111;  
      display:flex;  
      align-items:center;  
      gap:10px;  
    }  
  
    .hint{  
      color:#111;  
      font-weight:900;  
      font-size:13px;  
      margin-top:6px;  
    }  
  
    .search{  
      display:flex;  
      gap:10px;  
      align-items:center;  
      flex-wrap:wrap;  
      justify-content:flex-end;  
      position:relative;  
      z-index:10;  
    }  
  
    #orderID{  
      font-size:24px;  
      font-weight:600;  
      text-align:center;  
      height:50px;  
      line-height:50px;  
    }  
  
    #orderID::placeholder{  
      font-size:15px;  
      font-weight:900;  
      text-align:center;  
    }  
  
    input{  
      padding:12px 14px;  
      border-radius:12px;  
      border:2px solid #e7eaee;  
      font-family:'Cairo';  
      font-weight:900;  
      text-align:center;  
      min-width:260px;  
      outline:none;  
      transition:.2s;  
      background:#fff;  
    }  
  
    input:focus{ border-color:var(--accent); }  
  
    .btn{  
      height:50px;  
      padding:0 12px;  
      font-size:18px;  
      font-weight:900;  
      display:inline-flex;  
      align-items:center;  
      justify-content:center;  
      border:none;  
      border-radius:12px;  
      font-family:'Cairo';  
      cursor:pointer;  
      gap:8px;  
      transition:.2s;  
      white-space:nowrap;  
    }  
  
    .btn:hover{ transform:translateY(-1px); opacity:.96; }  
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }  
  
    .btn-primary{ background:var(--primary); color:#fff; }  
    .btn-ghost{ background:#f3f5f7; color:#333; }  
  
    .info{  
      padding:16px 18px;  
      display:none;  
      gap:12px;  
      flex-wrap:wrap;  
      align-items:center;  
      justify-content:space-between;  
      border-bottom:1px solid var(--line);  
      background:#fff;  
    }  
  
    .chip{  
      display:inline-flex;  
      align-items:center;  
      gap:10px;  
      padding:10px 12px;  
      border-radius:14px;  
      font-weight:900;  
      background:#f6f8fa;  
      border:1px solid #eef1f4;  
      color:#111;  
    }  
  
    .chip .muted{ color:var(--muted); font-weight:900; }  
  
    .status-badge{  
      padding:10px 12px;  
      border-radius:14px;  
      font-weight:900;  
      border:1px solid #eef1f4;  
      background:#f6f8fa;  
      color:#111;  
      display:inline-flex;  
      align-items:center;  
      gap:10px;  
    }  
  
    .stepper-scroll{  
      padding:0px 2px;  
      overflow-x:auto;  
      overflow-y:hidden;  
      background:linear-gradient(180deg, rgba(44,62,80,0.03), transparent);  
    }  
  
    .stepper-scroll::-webkit-scrollbar{ height:10px; }  
    .stepper-scroll::-webkit-scrollbar-thumb{ background:#d9e1ea; border-radius:999px; }  
  
    .stepper{  
      display:flex;  
      flex-wrap:nowrap;  
      gap:10px;  
      width:max-content;  
      direction:rtl;  
      align-items:flex-start;  
      padding:6px 6px 10px;  
    }  
  
    .node{  
      flex:0 0 auto;  
      width:150px;  
      min-width:150px;  
      display:flex;  
      flex-direction:column;  
      align-items:center;  
      gap:10px;  
      position:relative;  
      padding:6px 4px 4px;  
      user-select:none;  
    }  
  
    .node:not(:first-child)::before{  
      content:"";  
      position:absolute;  
      top:35px;  
      right:-13px;  
      width:16px;  
      height:4px;  
      background:#dfe5ec;  
      z-index:0;  
      border-radius:999px;  
    }  
  
    .circle{  
      width:70px;  
      height:70px;  
      border-radius:50%;  
      background:var(--disabled);  
      color:#fff;  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      font-size:30px;  
      box-shadow:0 10px 22px rgba(0,0,0,0.10);  
      z-index:1;  
      transition:.2s;  
    }  
  
    .label{  
      text-align:center;  
      font-weight:900;  
      font-size:16px;  
      color:#111;  
      line-height:1.35;  
    }  
  
    .sub{  
      text-align:center;  
      font-weight:900;  
      margin-top:-6px;  
      min-height:40px;  
      line-height:1.25;  
      max-width:150px;  
      overflow:hidden;  
      text-overflow:ellipsis;  
    }  
  
    .sub-date{  
      font-size:15px;  
      font-weight:900;  
      color:#111;  
      direction:ltr;  
      white-space:nowrap;  
      overflow:hidden;  
      text-overflow:ellipsis;  
      max-width:150px;  
    }  
  
    .node.locked{ opacity:.85; }  
    .node.done .circle{ background:var(--ok); }  
    .node.next .circle{ background:var(--accent); transform:scale(1.06); }  
    .node.done:not(:first-child)::before{ background:var(--ok); }  
    .node.next:not(:first-child)::before{ background:var(--accent); }  
  
    .empty{  
      padding:26px 18px;  
      text-align:center;  
      color:var(--muted);  
      font-weight:900;  
    }  
  
    .workflow-note{  
      margin:10px 16px 16px;  
      padding:12px 14px;  
      border-radius:14px;  
      background:rgba(245,166,35,.12);  
      border:1px solid rgba(245,166,35,.28);  
      color:#7a5610;  
      font-weight:900;  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      gap:10px;  
      text-align:center;  
      position:relative;  
      z-index:2;  
    }  
  
    @media (max-width:820px){  
      .header-text h1{ font-size:22px; }  
      .header-text p{ font-size:16px; }  
      input{ min-width:220px; width:100%; }  
      .search{ width:100%; justify-content:stretch; }  
      .btn{ width:100%; justify-content:center; }  
      .panel-head{ align-items:stretch; }  
    }  
  </style>  </head>  <body>  

    <div class="page-shell">  <header class="company-header">  
  <img class="company-logo" src="https://drive.google.com/thumbnail?id=1NN7G2zhk7nhgXuPWGW4qE_pdGC-Ptjkt&sz=w500" alt="logo">  
  <div class="header-text">  
    <h1>الشركة العامة للفحص والتأهيل الهندسي</h1>  
    <p><i class="fas fa-route"></i> منصة تتبع اوامر العمل</p>  
  </div>  
</header>  

<div class="page-content">  
  <div class="wrap">  
    <div class="panel">  

      <div class="panel-head">  
        <div>  
          <div class="panel-title"><i class="fas fa-diagram-project"></i> تتبع حسب التسلسل</div>  
          <div class="hint">أدخل رقم أمر العمل ثم اضغط (تتبع)</div>  
        </div>  

        <div class="search">  
          <input id="orderID" type="text" placeholder="رقم أمر العمل" inputmode="numeric" />  
          <button type="button" class="btn btn-ghost" onclick="clearOrder()"><i class="fas fa-eraser"></i> مسح</button>  
          <button type="button" class="btn btn-primary" id="btnTrack" onclick="loadTracking()">  
            <i class="fas fa-magnifying-glass"></i> تتبع  
          </button>  
        </div>  
      </div>  

      <div class="info" id="infoBar">  
        <div class="chip"><i class="fas fa-building"></i> <span class="muted">الجهة:</span> <span id="clientName">—</span></div>  
        <div class="status-badge" id="typeBadge"><i class="fas fa-flask"></i> <span id="testTypeText">—</span></div>  
      </div>  

      <div id="stepperArea"></div>  

    </div>  
  </div>  
</div>

  </div>   <script>  
  const API_BASE = "https://script.google.com/macros/s/AKfycbxImZKJY45l7yU5wGVdJvIsQ7RN0vRV-lAy3uoUpm1eUg8AJzwpBHunCaz9FzmkATC2/exec";  
  
  function showError(msg){  
    alert(msg);  
    console.error(msg);  
  }  
  
  function clearOrder(){  
    document.getElementById('orderID').value = '';  
    document.getElementById('stepperArea').innerHTML = '';  
    document.getElementById('infoBar').style.display = 'none';  
  }  
  
  function normalizeOrderNo(value){  
    return String(value || "")  
      .replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d))  
      .replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d))  
      .replace(/\s+/g, "")  
      .trim();  
  }  
  
  function isReceiveDone(v){  
    v = String(v || "");  
    return v.includes("✅") && v.includes("استلام");  
  }  
  
  function isOkDone(v){  
    v = String(v || "");  
    return v.includes("✅");  
  }  
  
  function formatSub(val, done, cls){  
    if(!done){  
      return (cls.indexOf("next") !== -1)  
        ? '<div class="sub-date">الخطوة الحالية</div>'  
        : '<div class="sub-date">بانتظار</div>';  
    }  
  
    val = String(val || "");  
    val = val.replace("✅","")  
             .replace("استلام -","")  
             .replace("استلام","")  
             .trim();  
  
    val = val.replace(/.*?/g, "").trim();  
  
    var m = val.match(/\d{4}-\d{2}-\d{2}\s*\|\s*\d{2}:\d{2}/);  
  
    if(m && m[0]){  
      return '<div class="sub-date">' + m[0].trim() + '</div>';  
    }  
  
    return '<div class="sub-date">' + val + '</div>';  
  }  
  
  function buildStepper(data){  
    const pricingDone = isOkDone(data.pricing);  
    const testType = String(data.testType || "").trim();  
    const labPath = String(data.labPath || "").trim();  
  
    const workflowReady = pricingDone && !!testType;  
  
    let steps = [  
      {key:"inspection", label:"استلام المعاملة", icon:"fa-handshake", doneFn:isReceiveDone},  
      {key:"pricing",    label:"التسعيرة",        icon:"fa-receipt", doneFn:isOkDone}  
    ];  
  
    if(workflowReady){  
      steps.push({key:"payment", label:"التسديد", icon:"fa-sack-dollar", doneFn:isOkDone});  
  
      if(testType === "مصاعد"){  
        steps.push({key:"elev", label:"المصاعد", icon:"fa-elevator", doneFn:isReceiveDone});  
      }else{  
        steps.push({key:"lab1", label:"المختبرات", icon:"fa-microscope", doneFn:isReceiveDone});  
        if(labPath !== "مختبرات فقط"){  
          steps.push({key:"workshop", label:"الورشة", icon:"fa-screwdriver-wrench", doneFn:isReceiveDone});  
          steps.push({key:"lab2", label:"المختبرات", icon:"fa-flask-vial", doneFn:isReceiveDone});  
        }  
      }  
  
      steps.push({key:"testResults", label:"نتائج الفحص", icon:"fa-clipboard-check", doneFn:isReceiveDone});  
      steps.push({key:"official",    label:"الكتاب",      icon:"fa-file-signature", doneFn:isReceiveDone});  
      steps.push({key:"barcode",     label:"الباركود",    icon:"fa-qrcode", doneFn:isReceiveDone});  
      steps.push({key:"email",       label:"الايميل",     icon:"fa-paper-plane", doneFn:isReceiveDone});  
      steps.push({key:"final",       label:"استلام النتائج", icon:"fa-flag-checkered", doneFn:isReceiveDone});  
    }  
  
    let firstPending = false;  
    let html = '<div class="stepper-scroll"><div class="stepper">';  
  
    steps.forEach(s => {  
      const val = String((data && data[s.key]) || "");  
      const done = s.doneFn(val);  
  
      let cls = "node";  
      if(done){  
        cls += " done";  
      }else if(!firstPending){  
        cls += " next";  
        firstPending = true;  
      }else{  
        cls += " locked";  
      }  
  
      const subHtml = formatSub(val, done, cls);  
  
      html += `  
        <div class="${cls}">  
          <div class="circle"><i class="fas ${s.icon}"></i></div>  
          <div class="label">${s.label}</div>  
          <div class="sub">${subHtml}</div>  
        </div>  
      `;  
    });  
  
    html += '</div></div>';  
  
    if(!workflowReady){  
      html += `  
        <div class="workflow-note" id="workflowNote">  
          <i class="fas fa-circle-info"></i>  
          تظهر بقية المراحل بعد تثبيت التسعيرة ونوع الفحص  
        </div>  
      `;  
    }  
  
    document.getElementById("stepperArea").innerHTML = html;  
  
    const next = document.querySelector('.node.next');  
    if(next){  
      next.scrollIntoView({  
        behavior:'smooth',  
        inline:'center',  
        block:'nearest'  
      });  
    }else{  
      const nodes = document.querySelectorAll('.node');  
      const last = nodes[nodes.length - 1];  
      if(last){  
        last.scrollIntoView({  
          behavior:'smooth',  
          inline:'end',  
          block:'nearest'  
        });  
      }  
    }  
  }  
  
  async function fetchTrackingData(orderId){  
  if(!API_BASE || API_BASE.includes("PUT_YOUR_WEB_APP_EXEC_URL_HERE")){  
    throw new Error("لم يتم وضع رابط Web App داخل المتغير API_BASE");  
  }  
  
  const res = await fetch(API_BASE, {  
    method: "POST",  
    headers: {  
      "Content-Type": "text/plain;charset=utf-8"  
    },  
    body: JSON.stringify({  
      action: "trackingDataFromTrackingOnly",  
      order: orderId,  
      _t: Date.now()  
    })  
  });  
  
  if(!res.ok){  
    throw new Error("فشل الاتصال بالسيرفر");  
  }  
  
  const text = await res.text();  
  
  let data;  
  try{  
    data = JSON.parse(text);  
  }catch(err){  
    throw new Error("رد غير صالح من السيرفر");  
  }  
  
  if(data && data.ok === false && data.error){  
    throw new Error(data.error);  
  }  
  
  return data;  
}  
  
  async function loadTracking(){  
    const orderID = document.getElementById("orderID");  
    const btn = document.getElementById("btnTrack");  
    const id = normalizeOrderNo(orderID.value || "");  
  
    if(!id) return showError("ادخل رقم المعاملة");  
  
    btn.disabled = true;  
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';  
  
    try{  
      const data = await fetchTrackingData(id);  
  
      btn.disabled = false;  
      btn.innerHTML = '<i class="fas fa-magnifying-glass"></i> تتبع';  
  
      if(!data || data.ok === false || data.found === false){  
        document.getElementById("infoBar").style.display = 'none';  
        document.getElementById("stepperArea").innerHTML =  
          '<div class="empty"><i class="fas fa-circle-exclamation"></i> المعاملة غير موجودة</div>';  
        return;  
      }  
  
      document.getElementById("infoBar").style.display = 'flex';  
      document.getElementById("clientName").innerText = data.clientName || "—";  
  
      const type = String(data.testType || "").trim();  
      const pricingDone = isOkDone(data.pricing);  
      const badge = document.getElementById("typeBadge");  
  
      if(!pricingDone || !type){  
        badge.innerHTML = '<i class="fas fa-hourglass-half"></i> <span id="testTypeText">بانتظار التسعيرة وتحديد الفحص</span>';  
      }else if(type === "مصاعد"){  
        badge.innerHTML = '<i class="fas fa-elevator"></i> <span id="testTypeText">مصاعد</span>';  
      }else if(type === "مختبرات"){  
        badge.innerHTML = '<i class="fas fa-microscope"></i> <span id="testTypeText">مختبرات</span>';  
      }else{  
        badge.innerHTML = '<i class="fas fa-triangle-exclamation"></i> <span id="testTypeText">نوع الفحص غير محدد</span>';  
      }  
  
      buildStepper(data);  
    }catch(err){  
      btn.disabled = false;  
      btn.innerHTML = '<i class="fas fa-magnifying-glass"></i> تتبع';  
      const msg = (err && err.message) ? err.message : String(err || "Unknown error");  
      showError("❌ خطأ:\n" + msg);  
    }  
  }  
  
  window.addEventListener("load", () => {  
    const inp = document.getElementById("orderID");  
    if(inp){  
      inp.addEventListener("keydown", (e) => {  
        if(e.key === "Enter") loadTracking();  
      });  
    }  
  });  
  
  window.loadTracking = loadTracking;  
  window.clearOrder = clearOrder;  
</script>  </body>  
</html>
